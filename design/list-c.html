<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>시안 C — 섹션 펼침형</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Jua","Malgun Gothic",sans-serif; color: #f3ecff; min-height: 100vh;
    background: linear-gradient(180deg, #0d0a2b 0%, #1c1250 45%, #45227a 82%, #7a3f8f 100%) fixed; padding: 20px 24px 60px; }
  a { color: inherit; text-decoration: none; }
  .tag { position: fixed; top: 10px; left: 10px; z-index: 99; background: #ffd93d; color: #2a2005;
    font-size: 0.85rem; padding: 5px 12px; border-radius: 999px; box-shadow: 0 0 14px #ffd93daa; }
  main { max-width: 960px; margin: 40px auto 0; }
  .sec { margin-bottom: 26px; }
  .sec-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .sec-head h2 { font-family: "Black Han Sans","Jua",sans-serif; font-size: 1.35rem; color: #fff;
    text-shadow: 0 0 12px var(--nc); letter-spacing: 1px; }
  .sec-head .more { font-size: 0.82rem; color: #8f7fc0; }
  .tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; }
  .tile { background: rgba(23,14,58,0.6); border: 1.5px solid color-mix(in srgb, var(--nc) 60%, transparent);
    border-radius: 14px; padding: 14px 10px; text-align: center;
    box-shadow: 0 0 8px color-mix(in srgb, var(--nc) 25%, transparent); }
  .tile .em { font-size: 1.6rem; display: block; margin-bottom: 6px; filter: drop-shadow(0 0 7px var(--nc)); }
  .tile .nm { font-size: 0.9rem; color: #e6dcff; }
  .s1 { --nc: #9d6bff; } .s2 { --nc: #6bffa0; } .s3 { --nc: #ffd93d; } .s4 { --nc: #ff6ec7; }
</style>
</head>
<body>
<span class="tag">시안 C — 섹션 펼침형</span>
<main>
  <section class="sec s1">
    <div class="sec-head"><h2>🔮 운세</h2><span class="more">사주 프로필 하나로 전부</span></div>
    <div class="tiles">
      <a class="tile" href="#"><span class="em">🌞</span><span class="nm">오늘의 운세</span></a>
      <a class="tile" href="#"><span class="em">🔮</span><span class="nm">사주팔자 심층</span></a>
      <a class="tile" href="#"><span class="em">💑</span><span class="nm">우리 궁합</span></a>
      <a class="tile" href="#"><span class="em">🃏</span><span class="nm">타로</span></a>
      <a class="tile" href="#"><span class="em">🥠</span><span class="nm">포춘쿠키</span></a>
      <a class="tile" href="#"><span class="em">🌀</span><span class="nm">전생 대환장 파티</span></a>
    </div>
  </section>
  <section class="sec s2">
    <div class="sec-head"><h2>🧪 대환장 테스트</h2><span class="more">내 유형 다 털림</span></div>
    <div class="tiles">
      <a class="tile" href="#"><span class="em">🍞</span><span class="nm">대환장 MBTI</span></a>
      <a class="tile" href="#"><span class="em">💘</span><span class="nm">연애세포</span></a>
      <a class="tile" href="#"><span class="em">🌋</span><span class="nm">스트레스 몬스터</span></a>
      <a class="tile" href="#"><span class="em">🧟</span><span class="nm">좀비 생존 유형</span></a>
      <a class="tile" href="#"><span class="em">💬</span><span class="nm">단톡방 캐릭터</span></a>
      <a class="tile" href="#"><span class="em">🍜</span><span class="nm">음식형 인간</span></a>
    </div>
  </section>
  <section class="sec s3">
    <div class="sec-head"><h2>🎲 미니 놀이터</h2><span class="more">심심할 때 툭!</span></div>
    <div class="tiles">
      <a class="tile" href="#"><span class="em">🎡</span><span class="nm">복불복 룰렛</span></a>
      <a class="tile" href="#"><span class="em">🎴</span><span class="nm">질문 카드</span></a>
      <a class="tile" href="#"><span class="em">📛</span><span class="nm">고블럽 작명소</span></a>
      <a class="tile" href="#"><span class="em">🕳️</span><span class="nm">몬스터 팡팡</span></a>
      <a class="tile" href="#"><span class="em">⚡</span><span class="nm">반응속도</span></a>
      <a class="tile" href="#"><span class="em">🎱</span><span class="nm">로또 번호 뱉기</span></a>
    </div>
  </section>
  <section class="sec s4">
    <div class="sec-head"><h2>👾 그 외 즐길거리</h2></div>
    <div class="tiles">
      <a class="tile" href="#"><span class="em">👾</span><span class="nm">고블럽 키우기</span></a>
      <a class="tile" href="#"><span class="em">🎫</span><span class="nm">프로필 카드</span></a>
      <a class="tile" href="#"><span class="em">⚡</span><span class="nm">결정의 신</span></a>
      <a class="tile" href="#"><span class="em">⚖️</span><span class="nm">밸런스 게임</span></a>
      <a class="tile" href="#"><span class="em">💌</span><span class="nm">마음 배달</span></a>
      <a class="tile" href="#"><span class="em">📱</span><span class="nm">앱 다운로드</span></a>
    </div>
  </section>
</main>
</body>
</html>
