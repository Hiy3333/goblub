<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>goblub — 와서 놀다 가세요</title>
  <meta name="description" content="사주, 심리테스트, 미니게임, 마음 배달까지 — 와서 놀다 가는 곳 고브럽" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=nb4" />
  <style>
    /* ===== 홈: 파스텔 클레이 놀이공원 (B컨셉) ===== */
    html { background: #e2ddf8; }
    :root {
      --cl-ink: #4a3d68;
      --cl-ink-soft: #7a6b99;
      --cl-lilac: #d9c9f6;
      --cl-mint: #c2ecd3;
      --cl-peach: #ffd9bd;
      --cl-butter: #ffeaa9;
      --cl-sky: #c4e4f8;
      --cl-pink: #f8c9d9;
      --cl-white: #ffffff;
    }
    body.home-clay {
      background:
        radial-gradient(900px 500px at 85% -10%, rgba(255, 214, 235, .55), transparent 60%),
        radial-gradient(800px 520px at -10% 30%, rgba(196, 228, 248, .6), transparent 58%),
        radial-gradient(700px 480px at 105% 78%, rgba(255, 226, 200, .5), transparent 60%),
        linear-gradient(165deg, #e7dcfa 0%, #dbe7fb 42%, #fbdfe7 100%) fixed !important;
      color: var(--cl-ink);
      font-family: "Jua", "Malgun Gothic", sans-serif;
      overflow-x: hidden;
    }

    /* 헤더: 떠 있는 말랑 알약 */
    body.home-clay .site-header {
      max-width: 1080px; margin: 14px auto 0; padding: 10px 20px;
      background: rgba(255,255,255,.72); border-radius: 999px;
      box-shadow: 0 12px 28px rgba(140,120,200,.18), inset 0 2px 4px rgba(255,255,255,.95);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      width: calc(100% - 32px);
    }
    body.home-clay .logo span { text-shadow: 0 2px 0 rgba(255,255,255,.9); }
    body.home-clay .site-nav a {
      color: var(--cl-ink-soft); font-size: .95rem; margin-left: 8px;
      background: rgba(255,255,255,.85); border-radius: 999px; padding: 6px 14px;
      box-shadow: 0 5px 12px rgba(140,120,200,.16), inset 0 1.5px 0 #fff;
      transition: transform .12s, box-shadow .12s, color .12s;
    }
    body.home-clay .site-nav a:hover {
      color: #8a6fd8; transform: translateY(-2px);
      box-shadow: 0 9px 18px rgba(140,120,200,.24), inset 0 1.5px 0 #fff;
    }

    body.home-clay main { max-width: 1080px; padding: 20px 22px 70px; position: relative; }

    /* 떠다니는 구름·별 장식 */
    .cl-deco { position: absolute; pointer-events: none; z-index: 0; }
    .cl-cloud { width: 120px; height: 42px; background: rgba(255,255,255,.85); border-radius: 999px;
      box-shadow: 0 10px 22px rgba(150,130,210,.14); animation: cl-drift 9s ease-in-out infinite; }
    .cl-cloud::before, .cl-cloud::after { content: ""; position: absolute; background: inherit; border-radius: 50%; }
    .cl-cloud::before { width: 52px; height: 52px; left: 18px; top: -24px; }
    .cl-cloud::after { width: 38px; height: 38px; right: 22px; top: -15px; }
    .cl-c1 { top: 30px; left: -30px; transform: scale(.8); }
    .cl-c2 { top: 90px; right: -20px; transform: scale(1.05); animation-delay: -3.5s; }
    .cl-c3 { bottom: 110px; left: 40%; transform: scale(.55); opacity: .7; animation-delay: -6s; }
    @keyframes cl-drift { 0%,100%{ margin-top: 0; } 50%{ margin-top: -14px; } }
    .cl-star { font-size: 1.1rem; color: #c9b6f4; animation: cl-tw 2.6s ease-in-out infinite; }
    .cl-s1 { top: 60px; left: 24%; } .cl-s2 { top: 180px; right: 14%; font-size: .85rem; animation-delay: -.9s; color: #f3b9d3; }
    .cl-s3 { top: 320px; left: 8%; font-size: .8rem; animation-delay: -1.7s; color: #a9d4f2; }
    @keyframes cl-tw { 0%,100%{ opacity: .35; transform: scale(.85);} 50%{ opacity: 1; transform: scale(1.15);} }

    /* ── 히어로: 구름 위 마스코트 + 버블 워드마크 ── */
    .cl-hero { position: relative; z-index: 1; display: grid;
      grid-template-columns: minmax(0, .95fr) minmax(0, 1.05fr);
      align-items: center; gap: 10px; padding: 26px 6px 34px; }
    .cl-mascot { position: relative; text-align: center; padding-bottom: 34px; }
    .cl-mascot img { width: 100%; max-width: 300px; height: auto; position: relative; z-index: 2;
      filter: drop-shadow(0 16px 22px rgba(120,95,190,.22));
      animation: cl-bob 4.2s ease-in-out infinite; }
    @keyframes cl-bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-12px);} }
    /* 받침 구름 */
    .cl-seat { position: absolute; left: 50%; bottom: 6px; transform: translateX(-50%);
      width: 240px; height: 64px; background: linear-gradient(180deg, #ffffff, #dbeefc);
      border-radius: 999px; z-index: 1;
      box-shadow: 0 16px 30px rgba(130,110,200,.2), inset 0 4px 8px rgba(255,255,255,1); }
    .cl-seat::before, .cl-seat::after { content: ""; position: absolute; background: inherit; border-radius: 50%; }
    .cl-seat::before { width: 84px; height: 84px; left: 26px; top: -34px; }
    .cl-seat::after { width: 62px; height: 62px; right: 34px; top: -22px; }

    .cl-word { text-align: center; }
    .cl-word h1 {
      font-family: "Jua", sans-serif; font-size: clamp(3.2rem, 9.5vw, 5.8rem); line-height: 1.04;
      background: linear-gradient(180deg, #cdbcf2 0%, #a993e2 55%, #937bd6 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 4px 0 rgba(255,255,255,.85)) drop-shadow(0 12px 18px rgba(140,115,210,.3));
      letter-spacing: .02em;
    }
    .cl-word .tag {
      display: inline-block; margin-top: 18px; position: relative;
      background: linear-gradient(180deg, #ffffff, #eef4ff);
      color: var(--cl-ink); font-size: clamp(1.05rem, 3vw, 1.5rem);
      border-radius: 999px; padding: 11px 28px;
      box-shadow: 0 12px 24px rgba(140,120,200,.2), inset 0 2px 5px rgba(255,255,255,1), inset 0 -5px 10px rgba(160,140,220,.14);
    }

    /* ── 말랑 카드 그리드 ── */
    .cl-grid { position: relative; z-index: 1; display: grid;
      grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .cl-card {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 22px 14px 18px; border-radius: 26px; cursor: pointer; color: var(--cl-ink);
      box-shadow: 0 16px 30px rgba(140,115,200,.2), inset 0 4px 9px rgba(255,255,255,.95), inset 0 -8px 14px rgba(120,90,190,.12);
      transition: transform .16s ease, box-shadow .16s ease;
    }
    .cl-card:hover { transform: translateY(-6px) scale(1.015);
      box-shadow: 0 24px 40px rgba(140,115,200,.28), inset 0 4px 9px rgba(255,255,255,.95), inset 0 -8px 14px rgba(120,90,190,.12); }
    .cl-card:active { transform: translateY(1px) scale(.99); }
    .cl-card .ic { font-size: 2.5rem; line-height: 1; margin-bottom: 10px;
      filter: drop-shadow(0 6px 8px rgba(120,90,190,.2)); }
    .cl-card .ic .goblub-svg { width: 52px; height: auto; }
    .cl-card h2 { font-size: 1.22rem; margin-bottom: 4px; letter-spacing: .01em; }
    .cl-card p { font-size: .82rem; line-height: 1.5; color: var(--cl-ink-soft); }
    .bg-lilac { background: linear-gradient(180deg, #e6dbfa, var(--cl-lilac)); }
    .bg-mint { background: linear-gradient(180deg, #d7f4e3, var(--cl-mint)); }
    .bg-peach { background: linear-gradient(180deg, #ffe7d6, var(--cl-peach)); }
    .bg-butter { background: linear-gradient(180deg, #fff3c9, var(--cl-butter)); }
    .bg-sky { background: linear-gradient(180deg, #ddf0fd, var(--cl-sky)); }
    .bg-pink { background: linear-gradient(180deg, #fcdde8, var(--cl-pink)); }

    /* 보조 카드(작은 말랑) */
    .cl-sub { margin-top: 18px; grid-template-columns: repeat(3, 1fr); }
    .cl-sub .cl-card { padding: 16px 12px 14px; border-radius: 22px;
      background: linear-gradient(180deg, #ffffff, #f0ecfb); }
    .cl-sub .cl-card .ic { font-size: 1.9rem; margin-bottom: 7px; }
    .cl-sub .cl-card h2 { font-size: 1.02rem; }
    .cl-sub .cl-card .badge-soon { position: static; margin-bottom: 6px;
      background: #cbb9f0; color: #4a3d68; font-size: .68rem; padding: 3px 10px;
      border-radius: 999px; box-shadow: inset 0 1.5px 0 rgba(255,255,255,.8); }

    body.home-clay .site-footer {
      max-width: 620px; margin: 0 auto 22px; padding: 12px;
      background: rgba(255,255,255,.6); border-radius: 999px; color: var(--cl-ink-soft);
      box-shadow: 0 8px 18px rgba(140,120,200,.12), inset 0 2px 4px rgba(255,255,255,.9);
    }
    /* 홈에서는 떠다니는 버디 숨김(히어로 마스코트와 중복) */
    body.home-clay .gbd-wrap, body.home-clay .gbd-min { display: none !important; }

    /* 반응형 */
    @media (max-width: 860px) {
      .cl-hero { grid-template-columns: 1fr; gap: 2px; padding: 12px 0 26px; }
      .cl-mascot img { max-width: 215px; }
      .cl-seat { width: 190px; height: 52px; }
      .cl-seat::before { width: 64px; height: 64px; left: 22px; top: -26px; }
      .cl-seat::after { width: 48px; height: 48px; right: 26px; top: -18px; }
      .cl-grid { grid-template-columns: repeat(2, 1fr); gap: 13px; }
      .cl-sub { grid-template-columns: repeat(2, 1fr); }
      .cl-card { padding: 17px 11px 15px; border-radius: 22px; }
      .cl-card .ic { font-size: 2.1rem; }
      .cl-card h2 { font-size: 1.05rem; }
      .cl-card p { font-size: .76rem; }
      .cl-c3 { display: none; }
    }
    @media (max-width: 340px) {
      .cl-grid, .cl-sub { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="home-clay">
  <div id="site-header"></div>

  <main>
    <span class="cl-deco cl-cloud cl-c1"></span>
    <span class="cl-deco cl-cloud cl-c2"></span>
    <span class="cl-deco cl-cloud cl-c3"></span>
    <span class="cl-deco cl-star cl-s1">✦</span>
    <span class="cl-deco cl-star cl-s2">✦</span>
    <span class="cl-deco cl-star cl-s3">✦</span>

    <section class="cl-hero">
      <div class="cl-mascot">
        <img src="design/img/home/goblub-hero.webp" alt="고브럽 마스코트" width="300" height="257" />
        <span class="cl-seat"></span>
      </div>
      <div class="cl-word">
        <h1>고브럽</h1>
        <span class="tag">☁️ 와서 놀다 가세요</span>
      </div>
    </section>

    <section class="cl-grid">
      <a class="cl-card bg-lilac" href="play/fortune-hub.html">
        <span class="ic">🔮</span>
        <h2>운세</h2>
        <p>사주·궁합·타로·전생·부적까지</p>
      </a>
      <a class="cl-card bg-mint" href="play/tests.html">
        <span class="ic">🧠</span>
        <h2>대환장 테스트</h2>
        <p>내 유형 다 털리는 심리테스트</p>
      </a>
      <a class="cl-card bg-peach" href="play/mini.html">
        <span class="ic">🎠</span>
        <h2>미니 놀이터</h2>
        <p>심심할 때 툭! 룰렛·작명·로또</p>
      </a>
      <a class="cl-card bg-butter" href="play/letter.html">
        <span class="ic">💌</span>
        <h2>마음 배달</h2>
        <p>고백·사과·한잔을 링크로</p>
      </a>
      <a class="cl-card bg-sky" href="play/goblub.html">
        <span class="ic" data-goblub="52"></span>
        <h2>고브럽 키우기</h2>
        <p>놀수록 자라는 나의 고브럽</p>
      </a>
      <a class="cl-card bg-pink" href="play/decide.html">
        <span class="ic">⚡</span>
        <h2>결정의 신</h2>
        <p>짜장 vs 짬뽕, 신이 정해줌</p>
      </a>
    </section>

    <section class="cl-grid cl-sub">
      <a class="cl-card" href="play/profile-card.html">
        <span class="ic">🎫</span>
        <h2>프로필 카드</h2>
        <p>흩어진 내 결과를 한 장으로</p>
      </a>
      <a class="cl-card" href="play/balance.html">
        <span class="ic">⚖️</span>
        <h2>밸런스 게임</h2>
        <p>극한의 양자택일 12연속</p>
      </a>
      <a class="cl-card" href="apps.html">
        <span class="badge-soon">오픈 준비 중</span>
        <span class="ic">📱</span>
        <h2>앱 다운로드</h2>
        <p>직접 만든 앱들을 모아둔 곳</p>
      </a>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="play/js/goblub-art.js"></script>
  <script src="js/common.js?v=5" data-root="."></script>
</body>
</html>
