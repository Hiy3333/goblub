  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .cat-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .cat-tab {
      font-family: inherit; font-size: 0.95rem; padding: 10px 16px; border-radius: 999px;
      border: 2px solid #e8e2d4; background: var(--cream); color: var(--ink-soft); cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .cat-tab:hover { border-color: var(--coral); }
    .cat-tab.active {
      background: var(--coral); border-color: var(--coral); color: #fff; font-weight: bold;
    }

    .card-stage { perspective: 1000px; margin: 8px 0 22px; }
    .q-card {
      background: var(--cream); border-radius: 20px; padding: 46px 26px;
      min-height: 180px; display: flex; align-items: center; justify-content: center;
      text-align: center; box-shadow: 0 4px 0 rgba(56, 53, 47, 0.08);
    }
    .q-card p {
      font-size: 1.35rem; line-height: 1.6; color: var(--ink); font-weight: bold; margin: 0;
    }
    .q-card.flip { animation: cardFlip 0.5s ease; }
    @keyframes cardFlip {
      0% { transform: rotateY(0deg) scale(1); opacity: 1; }
      45% { transform: rotateY(90deg) scale(0.92); opacity: 0.3; }
      55% { transform: rotateY(90deg) scale(0.92); opacity: 0.3; }
      100% { transform: rotateY(0deg) scale(1); opacity: 1; }
    }

    .q-meta { text-align: center; color: var(--ink-soft); font-size: 0.85rem; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <h1>🎴 우리 사이 질문 카드</h1>
      <p>커플, 친구, 진실게임까지 — 카드 한 장으로 대화를 열어보세요</p>
    </section>

    <section class="panel">
      <div class="cat-tabs" id="cat-tabs">
        <button class="cat-tab active" data-cat="couple">💑 커플</button>
        <button class="cat-tab" data-cat="friend">🤝 친구</button>
        <button class="cat-tab" data-cat="random">🎲 랜덤</button>
        <button class="cat-tab" data-cat="truth">🔥 진실게임</button>
      </div>

      <p class="q-meta" id="q-meta">💑 커플 카드</p>

      <div class="card-stage">
        <div class="q-card" id="q-card">
          <p id="q-text">버튼을 눌러 질문을 뽑아보세요!</p>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn-primary" id="btn-draw">🎴 다음 질문</button>
        <a class="btn-ghost" href="../index.html">🎡 다른 즐길거리 보기</a>
      </div>
    </section>

    <p class="fine-print">답하기 싫은 질문은 패스해도 괜찮아요. 즐겁게, 편하게! 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>

          ? QUESTIONS.couple.concat(QUESTIONS.friend, QUESTIONS.truth)
          : QUESTIONS[cat];

        couple: "💑 커플 카드",

        truth: "🔥 진실게임 카드"
      };

      function draw() {
        var arr = pool();
        if (!arr.length) return;
        var n;
        do {
          n = Math.floor(Math.random() * arr.length);
        } while (arr.length > 1 && arr[n] === lastQ);
        lastQ = arr[n];

        var card = $("q-card");
        card.classList.remove("flip");
        // 강제 리플로우로 애니메이션 재실행
        void card.offsetWidth;
        card.classList.add("flip");
        $("q-text").textContent = lastQ;

        if (window.GoblubFeed && !granted) {
          GoblubFeed.grant("questions");
          granted = true;
        }
      }

      $("btn-draw").onclick = draw;

      var tabs = document.querySelectorAll(".cat-tab");
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].onclick = function () {
          for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove("active");
          this.classList.add("active");
          cat = this.getAttribute("data-cat");
          $("q-meta").textContent = META[cat];
          lastQ = null;
          draw();
        };
      }

</body>
</html>
