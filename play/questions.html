        couple: "💑 커플 카드",
        friend: "🤝 친구 카드",
        spicy: "🔞 19금 스파이시 카드 (성인 전용)"
      };
      function adultOk() { try { return localStorage.getItem("goblub_adult19") === "yes"; } catch (e) { return false; } }

      function draw() {
        var arr = pool();
        if (!arr.length) return;
        var n;
        do {
          n = Math.floor(Math.random() * arr.length);
        } while (arr.length > 1 && arr[n] === lastQ);
        lastQ = arr[n];

        var card = $("q-card");
        card.classList.remove("flip");
        // 강제 리플로우로 애니메이션 재실행
        void card.offsetWidth;
        card.classList.add("flip");
        $("q-text").textContent = lastQ;

        if (window.GoblubFeed && !granted) {
          GoblubFeed.grant("questions");
          granted = true;
        }
      }

      $("btn-draw").onclick = draw;

      var tabs = document.querySelectorAll(".cat-tab");
      function activate(tab) {
        for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove("active");
        tab.classList.add("active");
        cat = tab.getAttribute("data-cat");
        $("q-meta").textContent = META[cat];
        lastQ = null;
        draw();
      }
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].onclick = function () {
          if (this.getAttribute("data-cat") === "spicy" && !adultOk()) {
            pendingTab = this;
            $("age-back").style.display = "flex";
            return;
          }
          activate(this);
        };
      }

      // 성인 인증 모달
      var pendingTab = null;
      $("age-yes").onclick = function () {
        try { localStorage.setItem("goblub_adult19", "yes"); } catch (e) {}
        $("age-back").style.display = "none";
        if (pendingTab) activate(pendingTab);
      };
      $("age-no").onclick = function () {
        $("age-back").style.display = "none";
        pendingTab = null;
      };
      $("age-back").onclick = function (e) { if (e.target === $("age-back")) { $("age-back").style.display = "none"; pendingTab = null; } };
    })();
  </script>
</body>
</html>
