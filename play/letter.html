<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마음 배달 — goblub</title>
  <meta name="description" content="데이트 신청·사과·술 한잔을 링크로 보내고, 답장까지 받는 마음 배달" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass5" />
  <style>
    .type-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px; }
    .type-tile { background: var(--cream); border: 2px solid transparent; border-radius: 16px;
      padding: 18px 6px; text-align: center; cursor: pointer; font-family: inherit; font-size: 0.98rem; color: var(--ink); }
    .type-tile .em { font-size: 2.4rem; display: block; margin-bottom: 6px; }
    .type-tile.sel { border-color: var(--coral); background: rgba(255,110,199,0.16); }
    .txt-input { width: 100%; font-family: inherit; font-size: 1rem; padding: 12px;
      border: 2px solid var(--line); border-radius: 12px; background: var(--cream); color: var(--ink); margin-bottom: 12px; }
    .txt-input::placeholder { color: var(--ink-soft); opacity: .85; }
    .link-box { word-break: break-all; background: var(--cream); border-radius: 12px; padding: 12px;
      font-size: 0.85rem; color: var(--ink-soft); margin: 12px 0; display: none; }
    /* ===== 편지 배달 애니메이션 ===== */
    .deliver-stage { position: relative; height: 200px; margin: 6px 0 4px; overflow: hidden; }
    .goblub-char { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%) translateY(140px);
      font-size: 84px; line-height: 1; animation: gob-in .7s cubic-bezier(.34,1.56,.64,1) .1s forwards; }
    .goblub-char.chew { animation: gob-chew .5s ease 2; }
    @keyframes gob-in { to { transform: translateX(-50%) translateY(0); } }
    @keyframes gob-chew {
      0%,100% { transform: translateX(-50%) translateY(0) scale(1,1); }
      35% { transform: translateX(-50%) translateY(4px) scale(1.14,.86); }
      70% { transform: translateX(-50%) translateY(-6px) scale(.9,1.12); }
    }
    .envelope { position: absolute; left: 50%; top: 44%; font-size: 20px; opacity: 0;
      transform: translate(-50%,-50%) scale(.2); }
    .envelope.fly { animation: env-fly 1s cubic-bezier(.22,.9,.3,1) forwards; }
    @keyframes env-fly {
      0% { opacity: 0; top: 70%; transform: translate(-50%,-50%) scale(.2) rotate(-20deg); }
      25% { opacity: 1; }
      60% { top: 30%; transform: translate(-50%,-50%) scale(1.4) rotate(12deg); }
      80% { top: 40%; transform: translate(-50%,-50%) scale(2.4) rotate(-6deg); }
      100% { opacity: 1; top: 40%; font-size: 74px; transform: translate(-50%,-50%) scale(1) rotate(0deg); }
    }
    /* 펼친 편지: opacity·크기는 static으로 고정(애니메이션 종료 후에도 유지), 팝은 transform만 */
    .envelope.open { opacity: 1; font-size: 74px; }
    .envelope.pop { animation: env-pop .5s ease forwards; }
    @keyframes env-pop {
      0% { transform: translate(-50%,-50%) scale(1); }
      45% { transform: translate(-50%,-52%) scale(1.22) rotate(-5deg); }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0); }
    }
    .puff { position: absolute; left: 50%; bottom: 70px; font-size: 30px; opacity: 0; transform: translateX(-50%); }
    .puff.show { animation: puff .5s ease forwards; }
    @keyframes puff { 0% { opacity: 0; transform: translateX(-50%) scale(.4); } 40% { opacity: .9; } 100% { opacity: 0; transform: translateX(-50%) translateY(-24px) scale(1.3); } }
    .deliver-caption { text-align: center; color: var(--ink-soft); min-height: 1.6em; font-size: 0.98rem; transition: opacity .3s; }
    .msg-tag { text-align: center; margin: 2px 0 4px; }
    .msg-tag span { display: inline-block; background: rgba(255,110,199,0.16); color: var(--coral); border-radius: 999px; padding: 5px 14px; font-size: 0.95rem; max-width: 90%; word-break: break-word; }
    @media (prefers-reduced-motion: reduce) {
      .goblub-char, .goblub-char.chew, .envelope.fly, .envelope.pop, .puff.show { animation-duration: .01s !important; }
    }
    .ask { font-size: clamp(20px,5vw,26px); color: var(--ink); font-weight: 700; margin: 14px 0; opacity: 0; }
    .ask.show { opacity: 1; }
    .yn { position: relative; height: 72px; display: flex; align-items: center; justify-content: center; gap: 16px; opacity: 0; }
    .yn.show { opacity: 1; }
    #no { position: relative; transition: left .22s cubic-bezier(.22,.61,.36,1), top .22s cubic-bezier(.22,.61,.36,1); }
    .choice-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .choice { background: var(--cream); border: 2px solid transparent; border-radius: 14px; padding: 16px 8px;
      cursor: pointer; font-family: inherit; font-size: 0.98rem; color: var(--ink); display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .choice .em { font-size: 1.8rem; }
    .choice:hover { border-color: var(--sky); }
    .cal-head, .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; }
    .cal-head span { text-align: center; font-size: 0.8rem; color: var(--ink-soft); padding: 4px 0; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .cal-nav button { background: var(--cream); border: none; border-radius: 8px; padding: 6px 12px; font-family: inherit; cursor: pointer; }
    .cal-grid .day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      background: var(--cream); border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 0.95rem; }
    .cal-grid .day.blank { background: transparent; cursor: default; }
    .cal-grid .day.past { color: #b3b9d6; cursor: not-allowed; background: rgba(140,150,210,.12); }
    .cal-grid .day:not(.blank):not(.past):hover { border-color: var(--mint); }
    .cal-grid .day.sel { background: var(--mint); color: #17103e; font-weight: 700; }
    .time-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 8px; }
    .time-grid .slot { background: var(--cream); border: 2px solid transparent; border-radius: 10px; padding: 10px 0; text-align: center; cursor: pointer; font-family: inherit; }
    .time-grid .slot:hover { border-color: var(--mint); }
    .time-grid .slot.sel { background: var(--mint); color: #17103e; font-weight: 700; }
    .step-q { font-size: 1.1rem; color: var(--ink); font-weight: 700; margin: 8px 0 14px; }
    .step-q.mt { margin-top: 22px; }
    .heart { position: fixed; top: -40px; font-size: 26px; pointer-events: none; animation: fall linear forwards; z-index: 50; }
    @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: .2; } }
    .out-card { background: var(--cream); border-radius: 14px; padding: 18px; line-height: 2; margin: 12px 0; }
    /* ===== 게이지 스텝 ===== */
    .gauge-ask { text-align: center; color: var(--ink-soft); margin-bottom: 12px; }
    .gauge-val { text-align: center; font-size: 2.7rem; color: var(--ink); text-shadow: 0 2px 8px rgba(255,90,118,.25); line-height: 1.2; }
    .gauge-band { text-align: center; color: var(--coral); font-size: 1.05rem; min-height: 1.6em; margin: 4px 0 14px; }
    .gauge-range { width: 100%; -webkit-appearance: none; appearance: none; height: 14px; border-radius: 999px;
      background: linear-gradient(90deg, #dfe4f5, var(--coral) 60%, var(--yellow)); outline: none; }
    .gauge-range::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 34px; height: 34px; border-radius: 50%;
      background: #fff; border: 3px solid var(--coral); box-shadow: 0 0 14px var(--coral); cursor: pointer; }
    .gauge-range::-moz-range-thumb { width: 30px; height: 30px; border-radius: 50%;
      background: #fff; border: 3px solid var(--coral); box-shadow: 0 0 14px var(--coral); cursor: pointer; }
    /* ===== 답장 스텝 ===== */
    .reply-list { display: flex; flex-direction: column; gap: 9px; }
    .reply-opt { background: var(--cream); border: 2px solid transparent; border-radius: 12px; padding: 13px 14px;
      text-align: left; cursor: pointer; font-family: inherit; font-size: 0.98rem; color: var(--ink); }
    .reply-opt:hover { border-color: var(--coral); }
    .reply-opt.write { color: var(--sky); text-align: center; }
    /* ===== NO 버튼 도망 개그 ===== */
    .no-taunt { text-align: center; color: var(--ink-soft); min-height: 1.5em; font-size: 0.92rem; margin-top: 8px; opacity: 0; transition: opacity .3s; }
    .no-taunt.show { opacity: 1; }
    .gob-eater { position: fixed; z-index: 70; pointer-events: none; }
    .gob-eater.chomp { animation: eat-chomp .4s ease 3; }
    @keyframes eat-chomp { 0%,100% { transform: scale(1,1); } 35% { transform: scale(1.15,.8); } 70% { transform: scale(.9,1.12); } }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <h1>💌 마음 배달</h1>
      <p id="hero-sub">데이트 신청·사과·술 한잔을 링크로 보내고, 답장까지 받아요</p>
    </section>

    <section class="panel" id="make-panel" style="display:none"></section>
    <section class="panel" id="play-panel" style="display:none"></section>
    <section class="panel" id="result-panel" style="display:none"></section>

  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=5" data-root=".."></script>
  <script src="js/feed.js?v=4"></script>
  <script src="js/goblub-art.js"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };

      // ---- base64url(JSON) 인코딩 ----
      function enc(obj) {
        return btoa(encodeURIComponent(JSON.stringify(obj)))
          .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
      }
      function dec(s) {
        try {
          var b = s.replace(/-/g, "+").replace(/_/g, "/");
          return JSON.parse(decodeURIComponent(atob(b)));
        } catch (e) { return null; }
      }
      function parseHash() {
        var h = (location.hash || "").replace(/^#/, "");
        var out = { d: null, r: null };
        h.split("&").forEach(function (kv) {
          var i = kv.indexOf("=");
          if (i < 0) return;
          var k = kv.slice(0, i), v = kv.slice(i + 1);
          if (k === "d") out.d = dec(v);
          if (k === "r") out.r = dec(v);
        });
        return out;
      }

      var TYPES = {
        date: { emoji: "💚", label: "데이트 신청", q: "나랑 데이트 갈래?",
          yes: "응! 좋아 💚", no: "싫어", success: "데이트 성사! 🎉",
          steps: ["menu", "date", "time", "gauge", "reply"],
          menuQ: "🍴 뭐 먹으러 갈까?", menuLine: "🍴 메뉴",
          gauge: { name: "💘 호감도 게이지", ask: "이 데이트, 기대치는 얼마?",
            bands: [[20,"🫥 아직 간 보는 중"],[45,"😊 은근 기대되는데?"],[70,"😆 벌써 설레기 시작"],[95,"🫀 심장 과부하 주의"],[100,"💥 심쿵 임계점 돌파!"]] },
          replies: ["완전 기대돼, 늦지 마! 💚","좋아, 근데 네가 사는 거다? 😏","가는 길에 심장 챙겨 와, 떨어질 수도 있음 🫀","늦으면 벌금 만원이다 ⏰"] },
        apology: { emoji: "🍎", label: "사과하기", q: "내 사과 받아줄래?",
          yes: "사과 받을게 🍎", no: "안 받아", success: "사과 수락! 🍎",
          steps: ["cond", "gauge", "reply"],
          gauge: { name: "🧊 삐짐 해동 게이지", ask: "꽁했던 마음, 얼마나 녹았어?",
            bands: [[20,"🧊 아직 냉동실이야"],[45,"🍧 겉만 살짝 녹음"],[70,"💧 거의 다 녹았어"],[95,"♨️ 몽글몽글 해동 완료"],[100,"♨️ 완전 해동 + 마음 보글보글"]] },
          replies: ["이번만 특별히 봐준다 😤","조건 꼭 지켜라? 안 지키면 2배 🧾","사실 나도 좀 미안했어… 🥲","다음에 또 그러면 국물도 없다 🍜"] },
        drink: { emoji: "🍻", label: "술 한잔", q: "오늘 나랑 한잔 어때?",
          yes: "콜! 🍻", no: "안 마셔", success: "술 약속 성사! 🍻",
          steps: ["menu", "date", "time", "gauge", "reply"],
          menuQ: "🍻 뭐로 달릴까?", menuLine: "🍻 오늘의 술",
          gauge: { name: "🍻 오늘 달릴 각 게이지", ask: "오늘 어디까지 달릴 수 있어?",
            bands: [[20,"🍺 딱 한 잔 각"],[45,"🍻 기분 좋게 알딸딸 각"],[70,"🔥 2차까지 달릴 각"],[95,"🌙 막차 아슬아슬 각"],[100,"🌅 해 뜰 때까지 완주 각"]] },
          replies: ["콜! 오늘 막차는 없는 걸로 🍻","1차는 네가 쏘는 거다? 😎","딱 한 잔만 한다 (아마 거짓말) 🤥","안주 선택권은 나한테 있다 🍗"] }
      };
      var MENUS = [["🍚","한식"],["🥢","중식"],["🍣","일식"],["🍝","양식"],["🍜","분식"],["☕","카페"]];
      var TIMES = ["11:00","12:00","13:00","14:00","17:00","18:00","19:00","20:00"];
      var DRINKS = [["🍺","맥주"],["🍶","소주"],["🥂","소맥"],["🍷","와인"],["🥛","막걸리"],["🍹","하이볼"]];
      var CONDS = [["🍜","맛있는 거 사기"],["☕","일주일 커피 셔틀"],["🥺","애교 3번 시전"],["🎁","소원 1개 들어주기"],["📸","굴욕샷 1장 제출"],["🆓","무조건 용서 (대인배)"]];

      function gaugeBand(t, v) {
        var bands = (t.gauge && t.gauge.bands) || [];
        for (var i = 0; i < bands.length; i++) if (v <= bands[i][0]) return bands[i][1];
        return bands.length ? bands[bands.length - 1][1] : "";
      }

      window.LETTER = { enc: enc, dec: dec, parseHash: parseHash, TYPES: TYPES, MENUS: MENUS, DRINKS: DRINKS, CONDS: CONDS, TIMES: TIMES, $: $ };

      function show(which) {
        $("make-panel").style.display = which === "make" ? "block" : "none";
        $("play-panel").style.display = which === "play" ? "block" : "none";
        $("result-panel").style.display = which === "result" ? "block" : "none";
      }

      // ================= 만들기 모드 =================
      function renderMake() {
        var p = $("make-panel");
        p.innerHTML =
          '<h2>누구에게, 어떤 마음을 보낼까요?</h2>' +
          '<div class="type-grid" id="type-grid"></div>' +
          '<input class="txt-input" id="in-name" maxlength="20" placeholder="받는 사람 이름 (필수)" />' +
          '<input class="txt-input" id="in-from" maxlength="20" placeholder="보내는 사람 이름 (선택)" />' +
          '<input class="txt-input" id="in-q" maxlength="40" placeholder="" />' +
          '<input class="txt-input" id="in-msg" maxlength="60" placeholder="한 줄 메시지 (선택 — 비워도 돼요)" />' +
          '<button class="btn-primary" id="btn-make">🔗 공유 링크 만들기</button>' +
          '<p class="error-msg" id="mk-err"></p>' +
          '<div class="link-box" id="link-box"></div>' +
          '<div class="result-actions" id="mk-actions" style="display:none">' +
          '<button class="btn-ghost" id="btn-preview">👀 미리보기</button></div>';
        var tg = $("type-grid");
        var chosen = "date";
        function updQ() { $("in-q").placeholder = '질문 문구 바꾸기 (기본: "' + TYPES[chosen].q + '")'; }
        Object.keys(TYPES).forEach(function (k) {
          var t = TYPES[k];
          var b = document.createElement("button");
          b.className = "type-tile" + (k === chosen ? " sel" : "");
          b.innerHTML = '<span class="em">' + t.emoji + "</span>" + t.label;
          b.onclick = function () {
            chosen = k;
            tg.querySelectorAll(".type-tile").forEach(function (x) { x.classList.remove("sel"); });
            b.classList.add("sel");
            updQ();
          };
          tg.appendChild(b);
        });
        updQ();
        var madeUrl = "";
        $("btn-make").onclick = function () {
          var name = $("in-name").value.trim();
          var from = $("in-from").value.trim();
          var q = $("in-q").value.trim();
          var msg = $("in-msg").value.trim();
          var err = $("mk-err");
          if (!name) { err.textContent = "받는 사람 이름을 적어주세요!"; err.style.display = "block"; return; }
          err.style.display = "none";
          var d = { t: chosen, n: name.slice(0, 20) };
          if (from) d.f = from.slice(0, 20);
          if (q) d.q = q.slice(0, 40);
          if (msg) d.m = msg.slice(0, 60);
          madeUrl = location.origin + location.pathname + "#d=" + enc(d);
          var lb = $("link-box");
          lb.textContent = madeUrl;
          lb.style.display = "block";
          $("mk-actions").style.display = "flex";
          var btn = $("btn-make");
          (navigator.clipboard ? navigator.clipboard.writeText(madeUrl) : Promise.reject())
            .then(function () { btn.textContent = "✅ 링크 복사됨! 상대에게 보내세요"; })
            .catch(function () { btn.textContent = "아래 링크를 복사해 보내세요"; });
        };
        $("btn-preview").onclick = function () { if (madeUrl) window.open(madeUrl, "_blank"); };
        show("make");
      }

      // ================= 플레이 모드 =================
      var choice = { menu: null, day: null, time: null, cond: null, g: null, rm: null };
      var playData = null;

      function renderPlay(d) {
        playData = d;
        var t = TYPES[d.t] || TYPES.date;
        var p = $("play-panel");
        p.innerHTML =
          '<div class="deliver-stage" id="stage">' +
          '<div class="goblub-char" id="gob">' + (window.GoblubArt ? GoblubArt.svg(88) : "👾") + "</div>" +
          '<div class="puff" id="puff">💨</div>' +
          '<div class="envelope" id="env">💌</div>' +
          '</div>' +
          '<div class="deliver-caption" id="cap"></div>' +
          '<div class="msg-tag" id="msgtag"></div>' +
          '<div class="ask" id="ask"></div>' +
          '<div class="yn" id="yn"><button class="btn-primary" id="yes"></button>' +
          '<button class="btn-ghost" id="no"></button></div>' +
          '<div class="no-taunt" id="taunt"></div>' +
          '<div id="steps"></div>' +
          '<p class="fine-print" style="margin-top:22px">💜 이 편지는 <b>goblub</b>(무료 운세·테스트·미니게임 놀이터)의 마음 배달로 만들어졌어요 · 로그인·개인정보 수집 없음, 링크 속 내용은 보낸 사람만 알아요</p>';
        show("play");
        $("yes").textContent = t.yes;
        $("no").textContent = t.no;

        // ---- 편지 배달 애니메이션 시퀀스 ----
        var gob = $("gob"), env = $("env"), puff = $("puff"), cap = $("cap");
        function caption(txt) { cap.style.opacity = "0"; setTimeout(function () { cap.textContent = txt; cap.style.opacity = "1"; }, 200); }
        caption("고블럽이 " + t.label + " 편지를 물고 오는 중...");
        // 1) 고블럽 등장(0.8s) → 2) 씹기(0.9s) 시작하며 편지 뱉기
        setTimeout(function () {
          gob.classList.add("chew");
          puff.classList.add("show");
          env.classList.add("fly");
          caption("😤 우웩— 편지를 뱉는 중!");
        }, 850);
        // 3) 편지 도착 + 메시지 태그
        setTimeout(function () {
          caption("💌 " + d.n + "님에게 편지 도착!");
          if (d.m) $("msgtag").innerHTML = '<span>💬 "' + d.m + '"</span>';
        }, 1950);
        // 4) 편지 펼치기 → 질문 등장
        setTimeout(function () {
          env.classList.remove("fly");
          env.classList.add("open"); env.classList.add("pop");
          caption("");
          $("ask").textContent = d.q || t.q;

      function setupRunaway(t) {
        var no = $("no"), yes = $("yes"), yn = $("yn");
        var TRIGGER = 140, SAFE = 120, fixed = false;
        var dodge = 0, lastDodge = 0, eaten = false;
        var TAUNTS = { 2: "🫢 앗, 버튼이 미끄러졌네?", 3: "😏 어딜 도망가~",
          5: "🤣 벌써 5번째… 포기하면 편해요", 7: "😮‍💨 고블럽: 나 슬슬 배고픈데…",
          9: "👀 고블럽이 '" + t.no + "' 버튼을 노려보기 시작했다…" };
        function taunt(msg) {
          var el = $("taunt"); if (!el) return;

        }
        function eatNo() {
          eaten = true;

          var g2 = document.createElement("div");

          document.body.appendChild(g2);

          setTimeout(function () {
            g2.remove();

            yes.style.boxShadow = "0 0 22px var(--coral)";
          }, 1800);
        }
        function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
        function ensureFixed() {
          if (fixed) return;
          // 도망 직전, YES를 지금 자리에 고정 → NO가 빠져도 YES가 중앙으로 튀지 않음
          var yr = yes.getBoundingClientRect();

          no.style.left = nr.left + "px"; no.style.top = nr.top + "px";
          fixed = true;
        }
        function glide(px, py) {
          if (eaten || no.style.display === "none" || !yn.classList.contains("show")) return;
          var nb = no.getBoundingClientRect();
          var cx = nb.left + nb.width / 2, cy = nb.top + nb.height / 2;
          var dx = cx - px, dy = cy - py, dist = Math.hypot(dx, dy);
          if (dist > TRIGGER) return;
          ensureFixed();
          var now = Date.now();
          if (now - lastDodge > 450) {
            lastDodge = now;
            dodge++;
            if (dodge >= 10) { eatNo(); return; }
            if (TAUNTS[dodge]) taunt(TAUNTS[dodge]);

          if (dist < 0.001) { dx = 1; dy = 0; dist = 1; }
          var m = 12, maxL = window.innerWidth - nb.width - m, maxT = window.innerHeight - nb.height - m;
          var ux = dx / dist, uy = dy / dist;
          var left = px + ux * SAFE - nb.width / 2, top = py + uy * SAFE - nb.height / 2;
          var cl = clamp(left, m, maxL), ct = clamp(top, m, maxT);
          if (cl !== left || ct !== top) {

            cl = clamp(left, m, maxL); ct = clamp(top, m, maxT);

          no.style.left = cl + "px"; no.style.top = ct + "px";

        document.addEventListener("mousemove", function (e) { glide(e.clientX, e.clientY); });
        no.addEventListener("mouseover", function (e) { glide(e.clientX, e.clientY); });
        no.addEventListener("click", function (e) { e.preventDefault(); glide(e.clientX, e.clientY); });
        no.addEventListener("touchstart", function (e) { e.preventDefault(); var tt = e.touches[0]; glide(tt.clientX, tt.clientY); }, { passive: false });
        no.addEventListener("pointerdown", function (e) { if (e.pointerType !== "mouse") { e.preventDefault(); glide(e.clientX, e.clientY); } });
      }

        var W = 720, H = 1280, neon = "#ff6ec7";
        function rr(x, y2, w, h, rad) {
          g.beginPath(); g.moveTo(x + rad, y2);
          g.arcTo(x + w, y2, x + w, y2 + h, rad); g.arcTo(x + w, y2 + h, x, y2 + h, rad);

        g.globalAlpha = 0.55; g.fillStyle = sun; g.fillRect(W / 2 - 170, 230, 340, 340);

        g.restore();
        // 시티 스카이라인

        // 답장 — 시안 글로우
        if (r.rm) {
          g.fillStyle = "#9df3ef"; g.font = "28px 'Jua', 'Malgun Gothic', sans-serif";
          g.save(); g.shadowColor = "#4deeea"; g.shadowBlur = 14;
          g.fillText("📨 답장 “" + r.rm + "”", W / 2, y);
          g.restore();
          y += 50;
        }
        if (d.f) {
          g.fillStyle = "#cdbdf6"; g.font = "28px 'Jua', 'Malgun Gothic', sans-serif";
          g.fillText("✍️ From. " + d.f, W / 2, y);
        }
        // 하단 CTA
        g.font = "26px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#b9a8e8";
        g.fillText("🌃 goblub · 대환장 놀이터", W / 2, H - 116);
        g.font = "28px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#4deeea";
        g.save(); g.shadowColor = "#4deeea"; g.shadowBlur = 12;
        g.fillText("나도 해보기 ▶ goblub.vercel.app", W / 2, H - 72);
        g.restore();
        c.toBlob(function (blob) {
          if (!blob) { window.open(c.toDataURL("image/png")); return; }
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "goblub-letter-" + d.t + ".png";
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
        }, "image/png");
      }

      // ================= 라우팅 =================
      var st = parseHash();
      var route = (st.d && st.r) ? "result" : (st.d ? "play" : "make");
      if (route === "make") renderMake();
      else if (route === "play") renderPlay(st.d);
      else renderResult(st.d, st.r, false);
      window.__st = st; window.__route = route;
    })();
  </script>
</body>
</html>
