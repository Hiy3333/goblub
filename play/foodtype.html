<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나는 무슨 음식형 인간? — goblub</title>
  <meta name="description" content="10가지 질문으로 알아보는 나의 음식형 — 마라탕·물냉면·국밥·민초·떡볶이·도시락" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=neon6" />
  <style>
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0 4px; }
    .tag { background: var(--cream); border: 1.5px solid var(--line); border-radius: 999px; padding: 5px 12px; font-size: 0.9rem; color: var(--ink-soft); }
    .match-line { margin-top: 12px; color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/feed.js?v=2"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var TYPES = {
      mala:       { emoji:"🌶️", name:"화끈 중독성 마라탕형",         short:"마라탕",  desc:"한번 빠지면 헤어나올 수 없는 강렬한 매력의 소유자. 평소엔 잔잔하다가도 꽂히면 그 열정이 주변까지 얼얼하게 만듭니다. 호불호는 갈려도 한번 맛본 사람은 꼭 다시 찾아요.",
        tags:["자극추구","화끈해","직진본능","심심한건못참아"], match:"tteokbokki", clash:"naengmyeon" },
      naengmyeon: { emoji:"🧊", name:"시원 쿨한 물냉면형",           short:"물냉면",  desc:"어떤 상황에서도 좀처럼 동요하지 않는 쿨함의 정석. 겉으론 심심해 보여도 알고 보면 깊은 육수 같은 매력이 있어서, 알아갈수록 자꾸 생각나는 타입입니다.",
        tags:["쿨거지","츤데레감성","은근진국","동요는없다"], match:"gukbap", clash:"mala" },
      gukbap:     { emoji:"🍲", name:"든든 정 많은 국밥형",           short:"국밥",    desc:"언제 만나도 편하고 든든한, 정 많은 사람. 화려하진 않아도 곁에 있으면 마음이 놓이는 존재감이라 다들 은근히 자주 찾게 됩니다.",
        tags:["정많음","든든존재감","어디서든무난","새벽에도콜"], match:"naengmyeon", clash:"mintcho" },
      mintcho:    { emoji:"🍫", name:"호불호 확실 민초형",           short:"민초",    desc:"취향이 확고하고 자기 색이 뚜렷한 타입. 누가 뭐래도 내 스타일을 밀고 나가는 소신파라, 싫어하는 사람도 있지만 좋아하는 사람은 진심으로 좋아합니다.",
        tags:["소신발언","호불호극혐","내길간다","논쟁각오완료"], match:"dosirak", clash:"gukbap" },
      tteokbokki: { emoji:"❤️", name:"만인의 인싸 떡볶이형",         short:"떡볶이",  desc:"누구와도 금방 친해지는 만인의 인기스타. 어디에 있어도 분위기를 화기애애하게 만드는 힘이 있어서, 모임에 꼭 있어야 할 존재로 통합니다.",
        tags:["인싸력만렙","분위기메이커","매콤달콤","핵인싸"], match:"mala", clash:"dosirak" },
      dosirak:    { emoji:"🍱", name:"가성비 효율 편의점 도시락형",   short:"도시락",  desc:"군더더기 없이 실속을 챙기는 효율의 아이콘. 필요한 걸 빠르고 정확하게 해결하는 타입이라, 함께 일하거나 지내면 은근히 편하고 믿음직합니다.",
        tags:["효율극대화","군더더기없음","계획적인생","혼밥능력자"], match:"mintcho", clash:"tteokbokki" }
    };
    var ORDER = ["mala","naengmyeon","gukbap","mintcho","tteokbokki","dosirak"];

    var QUESTIONS = [
      { q: "무인도에 떨어졌다. 구조 요정이 나타나 '평생 한 가지 음식 무한 제공' 소원을 들어준단다.", choices: [
        { text: "물냉면. 무인도 더위엔 살얼음 육수가 답이다", scores: { naengmyeon: 2 } },
        { text: "국밥. 어디서든 속이 든든해야 버틴다", scores: { gukbap: 2 } },
        { text: "편의점 도시락. 반찬 구성 완벽, 영양 균형, 효율 갑", scores: { dosirak: 2 } },
        { text: "민초 아이스크림. 논쟁할 사람이 없는 게 좀 아쉽지만", scores: { mintcho: 2 } } ] },
      { q: "내 인생이 요리 서바이벌 프로그램이라면, 심사위원의 평가는?", choices: [
        { text: "'자극적인데… 자꾸 손이 갑니다. 이거 위험한데요'", scores: { mala: 2 } },
        { text: "'첫맛은 밍밍한데 끝에서 깊은 육수가 올라옵니다'", scores: { naengmyeon: 2 } },
        { text: "'전 국민 취향 저격. 이 맛은 미워할 수가 없어요'", scores: { tteokbokki: 2 } },
        { text: "'심사위원단 의견이 갈립니다. 지금 싸우고 있습니다'", scores: { mintcho: 2 } } ] },
      { q: "새벽 냉장고에서 요정이 튀어나왔다. '네 성격을 온도로 표현해봐라.'", choices: [
        { text: "'영하 1도. 살얼음 동동, 시원한 게 최고'", scores: { naengmyeon: 2 } },
        { text: "'화산 온도. 만지면 데이니까 조심하도록'", scores: { mala: 2 } },
        { text: "'뚝배기 온도. 늦게 데워져도 끝까지 안 식음'", scores: { gukbap: 2 } },
        { text: "'전자레인지 2분. 필요할 때 딱 맞게 데워짐'", scores: { dosirak: 2 } } ] },
      { q: "친구 넷이 배달 메뉴로 1시간째 전쟁 중이다. 나의 등판!", choices: [
        { text: "'떡볶이 세트 시켜서 다 같이 나눠 먹자!' 만장일치 유도", scores: { tteokbokki: 2 } },
        { text: "'난 이거 먹을래.' 혼자 다른 가게에서 단독 주문", scores: { mintcho: 2 } },
        { text: "각자 시키는 게 배달비 포함 총비용이 최소임을 3줄로 증명", scores: { dosirak: 2 } },
        { text: "'난 아무거나 다 좋아~' 하며 네 명 의견 다 받아줌", scores: { gukbap: 2 } } ] },
      { q: "로또 1등 당첨! 통장에 찍힌 숫자를 본 직후 나의 행동은?", choices: [
        { text: "심장 화끈. 그날 밤 일단 뭐라도 지르고 봄", scores: { mala: 2 } },
        { text: "예적금·투자 포트폴리오 엑셀부터 작성", scores: { dosirak: 2 } },
        { text: "친구들 전원 소집. '오늘 다 내가 쏜다!!'", scores: { tteokbokki: 2 } },
        { text: "아무한테도 말 안 하고 평소처럼 출근 (지만 속으로 민초 평생 구독권 결제함)", scores: { mintcho: 2 } } ] },
      { q: "외계인이 '지구 대표 음식 인간'으로 나를 납치했다. 자기소개를 해보자.", choices: [
        { text: "'지구인들이 힘들 때 가장 먼저 찾는 존재입니다'", scores: { gukbap: 2 } },
        { text: "'저 하나로 지구가 두 편으로 갈라져 싸웁니다'", scores: { mintcho: 2 } },
        { text: "'지구인 화합의 상징. 저를 싫어하는 사람을 못 봤습니다'", scores: { tteokbokki: 2 } },
        { text: "'중독성 지구 1위. 취급주의 라벨이 붙어 있습니다'", scores: { mala: 2 } } ] },
      { q: "첫 데이트. 상대가 '아무거나 괜찮아요'라고 말했다. 나의 진짜 대응은?", choices: [
        { text: "리뷰 4.8 이상 · 웨이팅 없음 · 역에서 3분 식당을 3초 만에 검색 완료", scores: { dosirak: 2 } },
        { text: "'그럼 맵기 테스트부터 갑시다.' 마라탕집으로 직행", scores: { mala: 2 } },
        { text: "실패 확률 0%의 따뜻한 국물집으로 안내", scores: { gukbap: 2 } },
        { text: "'그럼 정해지면 알려주세요.' 쿨하게 산책 시작", scores: { naengmyeon: 2 } } ] },
      { q: "단체 사진이 나왔다. 사진 속 나를 찾는 방법은?", choices: [
        { text: "가운데에서 브이. 어느 사진이든 무조건 가운데", scores: { tteokbokki: 2 } },
        { text: "맨 끝에서 시크하게 반쯤 잘려 있음", scores: { naengmyeon: 2 } },
        { text: "혼자 아무도 이해 못 할 컨셉 포즈 중", scores: { mintcho: 2 } },
        { text: "맨 뒷줄에서 다 받쳐주는 든든한 배경 담당", scores: { gukbap: 2 } } ] },
      { q: "졸업앨범 한 줄 소개에 뭐라고 적혀 있을까?", choices: [
        { text: "'건드리면 매운맛'", scores: { mala: 2 } },
        { text: "'전교생의 밥친구'", scores: { gukbap: 2 } },
        { text: "'준비물은 쟤한테 빌리면 됨'", scores: { dosirak: 2 } },
        { text: "'독보적 취향. 아무도 못 말림'", scores: { mintcho: 2 } } ] },
      { q: "성격 감정 결과지 마지막 줄, 나에게 붙은 경고 문구는?", choices: [
        { text: "'⚠️ 과다 섭취 시 얼얼함 주의'", scores: { mala: 2 } },
        { text: "'⚠️ 첫입은 밍밍해도 끊을 수 없음'", scores: { naengmyeon: 2 } },
        { text: "'⚠️ 주변인을 살찌움 (행복으로)'", scores: { tteokbokki: 2 } },
        { text: "'⚠️ 데우기 전엔 차가워 보일 수 있음'", scores: { dosirak: 2 } } ] }
    ];

    function renderResult(totals, el, api) {
      var key = Quiz.top(totals, ORDER);
      var r = TYPES[key];
      var tagsHtml = '<div class="tags">' + r.tags.map(function (t) { return '<span class="tag">#' + t + '</span>'; }).join("") + '</div>';
      el.innerHTML =
        '<span class="result-emoji">' + r.emoji + "</span>" +
        '<p class="result-name">' + r.name + "</p>" +
        '<p class="result-desc">' + r.desc + "</p>" + tagsHtml +
        '<p class="match-line">💛 찰떡궁합: <b>' + TYPES[r.match].short + '</b> &nbsp;·&nbsp; ⚡ 상극: <b>' + TYPES[r.clash].short + '</b></p>' +
        '<div id="card-slot"></div>' +
        '<div class="result-actions">' +
        '<button class="btn-primary" id="qz-retry">다시하기</button>' +
        '<button class="btn-ghost" id="qz-share">링크 복사</button></div>';
      el.querySelector("#card-slot").appendChild(ShareCard.render({
        palette: "purple", emoji: r.emoji, badge: "음식형 인간", title: r.name,
        lines: [r.desc, "#" + r.tags.slice(0, 3).join(" #")]
      }));
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#qz-share").onclick = function () { api.shareLink(el.querySelector("#qz-share")); };
      if (window.GoblubFeed && GoblubFeed.record) GoblubFeed.record("foodtype", { emoji: r.emoji, title: (r.short || r.name), tags: r.tags });
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "🍜", title: "나는 무슨 음식형 인간?",
      intro: "성격을 음식에 비유하면 어떤 맛일까? 10가지 질문으로 나의 음식형을 찾아봐요.",
      feedSrc: "foodtype", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
