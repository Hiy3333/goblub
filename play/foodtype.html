<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나는 무슨 음식형 인간? — goblub</title>
  <meta name="description" content="10가지 질문으로 알아보는 나의 음식형 — 마라탕·물냉면·국밥·민초·떡볶이·도시락" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0 4px; }
    .tag { background: var(--cream); border: 1.5px solid #e8e2d4; border-radius: 999px; padding: 5px 12px; font-size: 0.9rem; color: var(--ink-soft); }
    .match-line { margin-top: 12px; color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/feed.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var TYPES = {
      mala:       { emoji:"🌶️", name:"화끈 중독성 마라탕형",         short:"마라탕",  desc:"한번 빠지면 헤어나올 수 없는 강렬한 매력의 소유자. 평소엔 잔잔하다가도 꽂히면 그 열정이 주변까지 얼얼하게 만듭니다. 호불호는 갈려도 한번 맛본 사람은 꼭 다시 찾아요.",
        tags:["자극추구","화끈해","직진본능","심심한건못참아"], match:"tteokbokki", clash:"naengmyeon" },
      naengmyeon: { emoji:"🧊", name:"시원 쿨한 물냉면형",           short:"물냉면",  desc:"어떤 상황에서도 좀처럼 동요하지 않는 쿨함의 정석. 겉으론 심심해 보여도 알고 보면 깊은 육수 같은 매력이 있어서, 알아갈수록 자꾸 생각나는 타입입니다.",
        tags:["쿨거지","츤데레감성","은근진국","동요는없다"], match:"gukbap", clash:"mala" },
      gukbap:     { emoji:"🍲", name:"든든 정 많은 국밥형",           short:"국밥",    desc:"언제 만나도 편하고 든든한, 정 많은 사람. 화려하진 않아도 곁에 있으면 마음이 놓이는 존재감이라 다들 은근히 자주 찾게 됩니다.",
        tags:["정많음","든든존재감","어디서든무난","새벽에도콜"], match:"naengmyeon", clash:"mintcho" },
      mintcho:    { emoji:"🍫", name:"호불호 확실 민초형",           short:"민초",    desc:"취향이 확고하고 자기 색이 뚜렷한 타입. 누가 뭐래도 내 스타일을 밀고 나가는 소신파라, 싫어하는 사람도 있지만 좋아하는 사람은 진심으로 좋아합니다.",
        tags:["소신발언","호불호극혐","내길간다","논쟁각오완료"], match:"dosirak", clash:"gukbap" },
      tteokbokki: { emoji:"❤️", name:"만인의 인싸 떡볶이형",         short:"떡볶이",  desc:"누구와도 금방 친해지는 만인의 인기스타. 어디에 있어도 분위기를 화기애애하게 만드는 힘이 있어서, 모임에 꼭 있어야 할 존재로 통합니다.",
        tags:["인싸력만렙","분위기메이커","매콤달콤","핵인싸"], match:"mala", clash:"dosirak" },
      dosirak:    { emoji:"🍱", name:"가성비 효율 편의점 도시락형",   short:"도시락",  desc:"군더더기 없이 실속을 챙기는 효율의 아이콘. 필요한 걸 빠르고 정확하게 해결하는 타입이라, 함께 일하거나 지내면 은근히 편하고 믿음직합니다.",
        tags:["효율극대화","군더더기없음","계획적인생","혼밥능력자"], match:"mintcho", clash:"tteokbokki" }
    };
    var ORDER = ["mala","naengmyeon","gukbap","mintcho","tteokbokki","dosirak"];

    var QUESTIONS = [
      { q: "친구들과의 약속, 나의 스타일은?", choices: [
        { text: "불금엔 무조건 화끈하게 놀아야지", scores: { mala: 2 } },
        { text: "조용한 카페에서 여유롭게", scores: { naengmyeon: 2 } },
        { text: "다 같이 밥 한끼 먹으면서 정 나누기", scores: { gukbap: 2 } },
        { text: "굳이 안 나가도 그만, 내 시간이 더 중요", scores: { mintcho: 1, dosirak: 1 } } ] },
      { q: "새로운 사람들과의 모임 자리, 나는?", choices: [
        { text: "먼저 말 걸고 분위기 띄우는 편", scores: { tteokbokki: 2 } },
        { text: "친해지기 전까진 적당히 거리 유지", scores: { naengmyeon: 2 } },
        { text: "내 취향 아니면 굳이 안 맞춰줌", scores: { mintcho: 2 } },
        { text: "필요한 얘기만 하고 효율적으로 마무리", scores: { dosirak: 2 } } ] },
      { q: "갈등이 생겼을 때 나의 대처법은?", choices: [
        { text: "일단 화끈하게 부딪혀서 끝장 봄", scores: { mala: 2 } },
        { text: "감정 빼고 냉정하게 정리부터", scores: { naengmyeon: 2 } },
        { text: "밥이나 한끼 하면서 풀자고 함", scores: { gukbap: 2 } },
        { text: "내 입장은 확실히 밝히고 안 굽힘", scores: { mintcho: 2 } } ] },
      { q: "주말 계획을 세울 때 나는?", choices: [
        { text: "즉흥적으로 끌리는 대로 신나게", scores: { mala: 1, tteokbokki: 1 } },
        { text: "미리 다 계획해서 낭비 없이", scores: { dosirak: 2 } },
        { text: "집에서 푹 쉬면서 재충전", scores: { naengmyeon: 1, mintcho: 1 } },
        { text: "가족이나 친한 사람들과 소소하게", scores: { gukbap: 2 } } ] },
      { q: "옷을 고를 때 나의 기준은?", choices: [
        { text: "튀어도 좋으니 개성 있게", scores: { mintcho: 2 } },
        { text: "무난하고 실용적인 게 최고", scores: { dosirak: 2 } },
        { text: "화려하고 눈에 띄는 컬러 선호", scores: { mala: 1, tteokbokki: 1 } },
        { text: "심플하고 깔끔한 톤 선호", scores: { naengmyeon: 2 } } ] },
      { q: "연애할 때 나의 스타일은?", choices: [
        { text: "만나자마자 화끈하게 직진", scores: { mala: 2 } },
        { text: "은근하지만 늘 곁에서 챙겨주는 편", scores: { gukbap: 2 } },
        { text: "내 취향 확고해서 맞는 사람만 만남", scores: { mintcho: 2 } },
        { text: "누구에게나 다정해서 인기 많음", scores: { tteokbokki: 1, gukbap: 1 } } ] },
      { q: "스트레스 받을 때 푸는 방법은?", choices: [
        { text: "매운 거 먹고 땀 빼면서 스트레스 날림", scores: { mala: 2 } },
        { text: "혼자 시원한 곳에서 머리 식히기", scores: { naengmyeon: 2 } },
        { text: "친한 사람 불러서 수다 떨며 풀기", scores: { tteokbokki: 1, gukbap: 1 } },
        { text: "일단 할 일부터 빠르게 해치우고 쉼", scores: { dosirak: 2 } } ] },
      { q: "회식이나 모임에서 나의 포지션은?", choices: [
        { text: "분위기 메이커, 다들 나만 쳐다봄", scores: { tteokbokki: 2 } },
        { text: "묵묵히 자리 지키며 든든하게 있어줌", scores: { gukbap: 2 } },
        { text: "적당히 있다가 조용히 먼저 빠짐", scores: { naengmyeon: 1, dosirak: 1 } },
        { text: "내 얘기하고 싶을 때만 화끈하게 참전", scores: { mala: 1, mintcho: 1 } } ] },
      { q: "MBTI로 치면 나는?", choices: [
        { text: "E, 에너지 넘치고 사람들과 함께일 때 살아남", scores: { tteokbokki: 2 } },
        { text: "I, 혼자 있을 때 제일 편하고 효율적", scores: { dosirak: 1, naengmyeon: 1 } },
        { text: "T, 논리적이고 쿨하게 판단", scores: { naengmyeon: 2 } },
        { text: "F, 정 많고 따뜻하게 챙겨줌", scores: { gukbap: 2 } } ] },
      { q: "누가 내 취향을 비웃으면 나는?", choices: [
        { text: "'네 입맛이나 잘 챙겨' 하고 신경 안 씀", scores: { mintcho: 2 } },
        { text: "화끈하게 받아쳐서 논쟁 승리", scores: { mala: 2 } },
        { text: "굳이 설명 안 하고 웃어넘김", scores: { gukbap: 1, dosirak: 1 } },
        { text: "쿨하게 '취향 존중'이라며 넘어감", scores: { naengmyeon: 2 } } ] }
    ];

    function renderResult(totals, el, api) {
      var key = Quiz.top(totals, ORDER);
      var r = TYPES[key];
      var tagsHtml = '<div class="tags">' + r.tags.map(function (t) { return '<span class="tag">#' + t + '</span>'; }).join("") + '</div>';
      el.innerHTML =
        '<span class="result-emoji">' + r.emoji + "</span>" +
        '<p class="result-name">' + r.name + "</p>" +
        '<p class="result-desc">' + r.desc + "</p>" + tagsHtml +
        '<p class="match-line">💛 찰떡궁합: <b>' + TYPES[r.match].short + '</b> &nbsp;·&nbsp; ⚡ 상극: <b>' + TYPES[r.clash].short + '</b></p>' +
        '<div id="card-slot"></div>' +
        '<div class="result-actions">' +
        '<button class="btn-primary" id="qz-retry">다시하기</button>' +
        '<button class="btn-ghost" id="qz-share">링크 복사</button></div>';
      el.querySelector("#card-slot").appendChild(ShareCard.render({
        palette: "purple", emoji: r.emoji, badge: "음식형 인간", title: r.name,
        lines: [r.desc, "#" + r.tags.slice(0, 3).join(" #")]
      }));
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#qz-share").onclick = function () { api.shareLink(el.querySelector("#qz-share")); };
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "🍜", title: "나는 무슨 음식형 인간?",
      intro: "성격을 음식에 비유하면 어떤 맛일까? 10가지 질문으로 나의 음식형을 찾아봐요.",
      feedSrc: "foodtype", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
