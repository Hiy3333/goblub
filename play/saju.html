<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주 보기 — goblub</title>
  <meta name="description" content="만세력 정밀 절입시각으로 계산하는 나의 사주팔자" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=neon6" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero">
      <h1>🔮 나의 사주팔자</h1>
      <p>생년월일시로 보는 사주 — 절기 경계까지 분 단위로 정확하게</p>
    </section>

    <section class="panel" id="input-panel">
      <h2>언제 태어났나요?</h2>
      <div class="field-row">
        <select id="in-year"></select>
        <select id="in-month"></select>
        <select id="in-day"></select>
      </div>
      <div class="field-row">
        <select id="in-hour">
          <option value="">태어난 시 몰라요</option>
        </select>
        <label for="in-min">분</label>
        <input type="number" id="in-min" min="0" max="59" value="0" style="width:70px" />
      </div>
      <div class="opt-row">
        <label><input type="radio" name="gender" value="" checked />성별 안 함</label>
        <label><input type="radio" name="gender" value="M" />남</label>
        <label><input type="radio" name="gender" value="F" />여</label>
        <label><input type="checkbox" id="in-truesolar" checked />진태양시 보정(-30분)</label>
      </div>
      <button class="btn-primary" id="btn-go">사주 보기</button>
      <p class="error-msg" id="err"></p>
    </section>

    <section class="panel" id="result-panel" style="display:none">
      <h2 id="r-title"></h2>
      <div class="pillar-grid" id="r-pillars"></div>
      <div class="oheng-bars" id="r-oheng"></div>
      <p id="r-ilgan" style="line-height:1.7"></p>
      <p id="r-oheng-txt" style="line-height:1.7; margin-top:10px; color:var(--ink-soft)"></p>
      <p id="r-strength" style="line-height:1.7; margin-top:10px"></p>
      <p id="r-sipseong" style="line-height:1.7; margin-top:10px"></p>
      <div id="r-daeun" style="margin-top:16px"></div>
      <div id="dosa-box" style="margin-top:18px; text-align:center">
        <button class="btn-primary" id="btn-dosa">🧙 고블럽 도사의 심층 풀이 듣기</button>
        <p id="dosa-status" class="fine-print" style="display:none"></p>
        <div id="dosa-text" style="display:none; white-space:pre-wrap; line-height:1.8; margin-top:12px; background:var(--cream); border-radius:14px; padding:18px; text-align:left"></div>
      </div>
      <div class="result-actions">
        <button class="btn-ghost" onclick="document.getElementById('result-panel').style.display='none'; document.getElementById('input-panel').scrollIntoView();">다시 보기</button>
      </div>
    </section>

    <p class="fine-print">사주는 재미로 봐주세요 🙂 절입시각 데이터: 만세력(KASI 검증) 기반</p>
  </main>

  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/saju.js"></script>
  <script src="js/dosa.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/feed.js"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      var data = null;

      fetch("data/saju-terms.json")
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function (d) { data = d; })
        .catch(function () { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); });

      // 셀렉트 채우기
      var y = $("in-year"), m = $("in-month"), d = $("in-day"), h = $("in-hour");
      for (var i = 2100; i >= 1900; i--) y.add(new Option(i + "년", i));
      y.value = 1995;
      for (i = 1; i <= 12; i++) m.add(new Option(i + "월", i));
      for (i = 1; i <= 31; i++) d.add(new Option(i + "일", i));
      for (i = 0; i <= 23; i++) h.add(new Option(i + "시", i));

      // 공유 프로필 프리필
      (function () {
        var p = window.GoblubProfile && GoblubProfile.get();
        if (!p) return;
        y.value = p.y; m.value = p.m; d.value = p.d;
        h.value = p.hour == null ? "" : p.hour;
        if (p.min) $("in-min").value = p.min;
        var g = document.querySelector('input[name="gender"][value="' + (p.gender || "") + '"]');
        if (g) g.checked = true;
      })();

      function showErr(msg) { var e = $("err"); e.textContent = msg; e.style.display = "block"; }

      $("btn-go").onclick = function () {
        $("err").style.display = "none";
        if (!data) { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); return; }
        var yy = +y.value, mm = +m.value, dd = +d.value;
        var date = new Date(yy, mm - 1, dd);
        if (date.getFullYear() !== yy || date.getMonth() !== mm - 1 || date.getDate() !== dd) {
          showErr("없는 날짜예요. 다시 확인해주세요!"); return;
        }
        var hour = h.value === "" ? null : +h.value;
        var min = Math.min(59, Math.max(0, +($("in-min").value || 0)));
        var gender = document.querySelector('input[name="gender"]:checked').value || null;
        var trueSolar = $("in-truesolar").checked;
        var r = Saju.compute(data, { y: yy, m: mm, d: dd, hour: hour, min: min },
          { trueSolar: trueSolar, gender: gender });
        lastCtx = { r: r, birth: { y: yy, m: mm, d: dd, hour: hour, min: min }, gender: gender, trueSolar: trueSolar };
        if (window.GoblubProfile) GoblubProfile.set({ y: yy, m: mm, d: dd, hour: hour, min: min, gender: gender || "" });
        $("dosa-text").style.display = "none";
        $("dosa-text").textContent = "";
        $("dosa-status").style.display = "none";
        $("btn-dosa").disabled = false;
        render(r);
        $("result-panel").style.display = "block";
        $("result-panel").scrollIntoView({ behavior: "smooth" });
        if (window.GoblubFeed) GoblubFeed.grant("saju");
      };

      function render(r) {
        $("r-title").textContent = zodiacEmoji(r.zodiac) + " " + r.zodiac + "띠의 사주";
        var roles = [["시주", r.pillars.hour], ["일주", r.pillars.day], ["월주", r.pillars.month], ["년주", r.pillars.year]];
        var html = "";
        roles.forEach(function (pair) {
          if (!pair[1]) {
            html += '<div class="pillar"><span class="role">' + pair[0] + '</span><span class="hanja">?</span><span class="hangul">몰라요</span></div>';
            return;
          }
          var t = Saju.pillarText(pair[1]);
          var roleKey = { "시주": "hour", "일주": "day", "월주": "month", "년주": "year" }[pair[0]];
          var ssGan = roleKey === "day" ? "나(일간)" : Saju.SIPSEONG[Saju.sipseong(r.ilgan, pair[1][0])];
          var ssJi = Saju.SIPSEONG[Saju.sipseong(r.ilgan, Saju.branchMainGan(pair[1][1]))];
          html += '<div class="pillar"><span class="role">' + pair[0] + '</span><span class="hanja">' + t.hanja +
            '</span><span class="hangul">' + t.hangul + '</span><span class="ss">' + ssGan + "<br>" + ssJi + "</span></div>";
        });
        $("r-pillars").innerHTML = html;

        var total = 0;
        ["목", "화", "토", "금", "수"].forEach(function (k) { total += r.oheng[k]; });
        var bars = "";
        ["목", "화", "토", "금", "수"].forEach(function (k) {
          var n = r.oheng[k];
          bars += '<div class="oheng-row"><span class="name">' + k + '</span><div class="bar oheng-' + k + '" style="width:' + (n / total * 100) + '%"></div><span class="cnt">' + (Math.round(n * 10) / 10) + "</span></div>";
        });
        $("r-oheng").innerHTML = bars;

        $("r-strength").textContent = "⚖️ " + SajuText.strengthDesc[r.strength.label];
        $("r-sipseong").textContent = r.topSipseong == null ? "" : "🧭 " + SajuText.sipseongDesc[r.topSipseong];

        var dv = $("r-daeun");
        if (r.daeun) {
          var dh = '<h2 style="font-size:1.05rem; margin-bottom:8px">🚉 대운 흐름 (' + (r.daeun.forward ? "순행" : "역행") +
            (r.daeun.approx ? " · 근사" : "") + ')</h2><div class="daeun-list">';
          r.daeun.list.forEach(function (du) {
            var t2 = Saju.pillarText([du.gan, du.ji]);
            dh += '<div class="daeun-item"><span class="age">' + du.age + '세~</span><span class="gj">' + t2.hanja +
              '</span><span class="ss">' + Saju.SIPSEONG[Saju.sipseong(r.ilgan, du.gan)] + "</span></div>";
          });
          dv.innerHTML = dh + "</div>";
        } else dv.innerHTML = "";

        $("r-ilgan").textContent = "🌱 나의 일간은 「" + Saju.GAN[r.ilgan] + "」 — " + SajuText.ilgan[r.ilgan];

        var most = "목", none = [];
        ["목", "화", "토", "금", "수"].forEach(function (k) {
          if (r.oheng[k] > r.oheng[most]) most = k;
          if (r.oheng[k] === 0) none.push(k);
        });
        var txt = SajuText.ohengMost[most];
        if (none.length) txt += " " + SajuText.ohengNone[none[0]];
        $("r-oheng-txt").textContent = txt;
      }

      var lastCtx = null;
      $("btn-dosa").onclick = function () {
        if (!lastCtx) return;
        var btn = $("btn-dosa"), txt = $("dosa-text"), st = $("dosa-status");
        btn.disabled = true;
        st.style.display = "block";
        st.textContent = "🧙 도사님이 팔자를 찬찬히 들여다보는 중…";
        txt.style.display = "block";
        txt.textContent = "";
        var payload = Dosa.buildPayload(lastCtx.r, lastCtx.birth, lastCtx.gender, lastCtx.trueSolar);
        Dosa.fetchReading(payload, {
          onChunk: function (t) { txt.textContent += t; },
          onDone: function (fromCache) {
            st.textContent = fromCache ? "🧙 (지난번에 봐드린 풀이예요)" : "🧙 풀이 끝! 재미로 봐주세요.";
          },
          onError: function (code, sec) {
            txt.style.display = "none";
            st.textContent =
              code === "not_configured" ? "도사님이 아직 수련 중이에요. 곧 찾아옵니다!" :
              code === "cooldown" ? "도사님이 숨 고르는 중… " + sec + "초 후에 다시 눌러주세요!" :
              "도사님이 지금 손님이 많아요. 잠시 후 다시 시도해 주세요.";
            btn.disabled = false;
          }
        });
      };

      function zodiacEmoji(z) {
        return { 쥐: "🐭", 소: "🐮", 호랑이: "🐯", 토끼: "🐰", 용: "🐲", 뱀: "🐍", 말: "🐴", 양: "🐑", 원숭이: "🐵", 닭: "🐔", 개: "🐶", 돼지: "🐷" }[z] || "🔮";
      }
    })();
  </script>
</body>
</html>
