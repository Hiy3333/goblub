<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전생 대환장 파티 — goblub</title>
  <meta name="description" content="사주 기운으로 발굴하는 선사시대·조선시대 두 전생 + 공유용 삽화" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass5" />
  <style>
    .life-card { background: var(--surface); border: 2px solid var(--line); border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; }
    .life-era { display: inline-block; background: var(--cream); border-radius: 999px; padding: 4px 12px; font-size: 0.82rem; color: var(--ink-soft); margin-bottom: 8px; }
    .life-title { font-size: 1.12rem; margin-bottom: 6px; }
    .life-body { color: var(--ink-soft); line-height: 1.7; white-space: pre-wrap; }
    .life-art { margin: 10px 0 6px; text-align: center; }
    .life-card.bad { border-color: rgba(255,110,199,0.55); }
    .summon { background: var(--purple); color: #1d0a40; border: none; border-radius: 999px; padding: 8px 16px;
      font-family: inherit; font-size: 0.9rem; cursor: pointer; margin-top: 10px; }
    .muncher { display: inline-block; font-size: 1.3rem; }
    .chew { animation: chew 0.18s ease infinite; }
    @keyframes chew { 50% { transform: rotate(14deg) scale(1.25); } }
    .svg-box { border: 2px dashed var(--line); border-radius: 16px; padding: 10px; margin-top: 8px; }
    .svg-box svg { width: 100%; height: auto; display: block; border-radius: 10px; }
    .svg-missing { border: 2px dashed var(--line); border-radius: 16px; padding: 22px 14px; margin-top: 8px;
      text-align: center; color: #8f7fc0; background: var(--surface); line-height: 1.6; }
    .svg-missing .big { font-size: 2rem; display: block; margin-bottom: 6px; }
    .art-hint { margin: 4px 0 12px; color: var(--ink-soft); background: #2c2064; border: 1.5px solid var(--line);
      border-radius: 12px; padding: 10px 14px; font-size: 0.92rem; }
    .digging { text-align: center; font-size: 2.6rem; }
    .digging .shovel { display: inline-block; animation: dig 0.7s ease infinite; }
    @keyframes dig { 50% { transform: rotate(-24deg) translateY(4px); } }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <h1>🔮 전생 대환장 파티</h1>
      <p>사주의 기운으로 발굴하는 선사시대·조선시대 두 전생 — 삽화까지 한 장씩</p>
    </section>

    <section class="panel" id="input-panel">
      <h2>언제 태어났나요?</h2>
      <div class="field-row">
        <select id="in-year"></select><select id="in-month"></select><select id="in-day"></select>
        <select id="in-hour"><option value="">시 몰라요</option></select>
        <input type="number" id="in-min" min="0" max="59" value="0" aria-label="분" title="분(0~59)" style="width:58px" />
      </div>
      <button class="btn-primary" id="btn-go">⛏️ 전생 발굴 시작</button>
      <p class="error-msg" id="err"></p>
    </section>

    <section class="panel" id="dig-panel" style="display:none">
      <p class="digging"><span class="shovel">⛏️</span><span class="dig-gob" data-goblub="40" style="display:inline-block;vertical-align:middle"></span></p>
      <p class="fine-print" id="dig-status">도사님이 전생 지층을 파내려가는 중…</p>
    </section>

    <div id="result-area" style="display:none">
      <div id="lives"></div>
      <section class="panel" id="finale-box" style="display:none">
        <h2>🧵 그래서 지금의 당신은</h2>
        <p class="result-desc" id="finale-text" style="line-height:1.8"></p>
      </section>
      <section class="panel" id="svg-panel" style="display:none">
        <div class="result-actions">
          <button class="btn-ghost" id="btn-retry">다시 발굴</button>
          <a class="btn-ghost" href="../index.html">🎡 다른 즐길거리 보기</a>
        </div>
      </section>
    </div>

    <p class="fine-print">전생은 재미로 봐주세요 🙂 업보는 셀프</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=5" data-root=".."></script>
  <script src="js/saju.js"></script>
  <script src="js/dosa.js?v=2"></script>
  <script src="js/feed.js?v=4"></script>
  <script src="js/goblub-art.js"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      var data = null;

      var y = $("in-year"), m = $("in-month"), d = $("in-day"), h = $("in-hour");
      for (var i = 2100; i >= 1900; i--) y.add(new Option(i + "년", i));
      y.value = 1995;
      for (i = 1; i <= 12; i++) m.add(new Option(i + "월", i));
      for (i = 1; i <= 31; i++) d.add(new Option(i + "일", i));
      for (i = 0; i <= 23; i++) h.add(new Option(i + "시", i));
      try {
        var mine = JSON.parse(localStorage.getItem("goblub_birth"));
        if (mine && mine.y) {
          y.value = mine.y; m.value = mine.m; d.value = mine.d;
          if (mine.hour != null) h.value = mine.hour;
          if (mine.min) $("in-min").value = mine.min;
        }
      } catch (e) {}

      function showErr(msg) { var e = $("err"); e.textContent = msg; e.style.display = "block"; }

      fetch("data/saju-terms.json")
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function (dd) { data = dd; })
        .catch(function () { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); });

      // ---- 응답 파서: @@LIFE / @@FIX / @@SVG(전생별) / @@FINALE ----
      function extractSvg(s) {
        var idx = s.indexOf("@@SVG");
        if (idx < 0) return { text: s, svg: null };
        var raw = s.slice(idx + 5);
        var a = raw.indexOf("<svg"), b = raw.lastIndexOf("</svg>");
        var svg = (a > -1 && b > -1) ? raw.slice(a, b + 6) : null;
        return { text: s.slice(0, idx), svg: svg };
      }

      function parseReading(text) {
        var finale = null;
        var fIdx = text.indexOf("@@FINALE");
        if (fIdx > -1) { finale = text.slice(fIdx + 8).trim(); text = text.slice(0, fIdx); }
        var lives = [];
        text.split("@@LIFE").forEach(function (chunk) {
          chunk = chunk.trim();
          if (!chunk) return;
          var nl = chunk.indexOf("\n");
          if (nl < 0) return;
          var head = chunk.slice(0, nl).replace(/^\|/, "").split("|");
          var ex = extractSvg(chunk.slice(nl + 1));
          var body = ex.text.trim();
          var fix = null;
          var fx = body.indexOf("@@FIX");
          if (fx > -1) { fix = body.slice(fx + 5).trim(); body = body.slice(0, fx).trim(); }
          lives.push({ era: (head[0] || "").trim(), emoji: (head[1] || "🌀").trim(),
            title: (head[2] || "이름 모를 전생").trim(), body: body, fix: fix, svg: ex.svg });
        });
        return { lives: lives, finale: finale };
      }

      function sanitizeSvg(svgText) {
        try {
          var doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
          if (doc.querySelector("parsererror")) return null;
          var root = doc.documentElement;
          Array.prototype.slice.call(doc.querySelectorAll("script, foreignObject, image, use")).forEach(function (n) { n.remove(); });
          Array.prototype.slice.call(doc.querySelectorAll("*")).forEach(function (el) {
            Array.prototype.slice.call(el.attributes).forEach(function (at) {
              if (/^on/i.test(at.name) || /(javascript:|http)/i.test(at.value)) el.removeAttribute(at.name);
            });
          });
          return root;
        } catch (e) { return null; }
      }

      // ---- 고블럽 씹어먹기 모션 ----
      function summonGoblub(card, bodyEl, fixText, btn) {
        btn.disabled = true;
        var muncher = document.createElement("span");
        muncher.className = "muncher chew";
        var gobImg = (window.GoblubArt ? GoblubArt.svg(30) : "👾");
        muncher.innerHTML = gobImg;
        btn.replaceWith(muncher);
        var text = bodyEl.textContent;
        var i = text.length;
        var eat = setInterval(function () {
          i = Math.max(0, i - 3);
          bodyEl.textContent = text.slice(0, i);
          if (i <= 0) {
            clearInterval(eat);
            muncher.classList.remove("chew");
            muncher.innerHTML = gobImg + '<span style="font-size:1.2rem;vertical-align:top">💨</span>';
            setTimeout(function () {
              muncher.innerHTML = gobImg + '<span style="font-size:1.2rem;vertical-align:top">✨</span>';
              var j = 0;
              var typeIn = setInterval(function () {
                j += 2;
                bodyEl.textContent = fixText.slice(0, j);
                if (j >= fixText.length) {
                  clearInterval(typeIn);
                  card.classList.remove("bad");
                  card.style.borderColor = "var(--mint)";
                }
              }, 28);
            }, 500);
          }
        }, 30);
      }

      // 전생 장면 SVG를 공유용 카드(제목+삽화+브랜딩)로 저장 — 미드나잇 시티팝 네온 룩
      function saveLifeImage(svgRoot, life, n) {
        var W = 720, H = 1280; // 9:16 — 인스타 스토리 비율
        var canvas = document.createElement("canvas");
        canvas.width = W; canvas.height = H;
        var g = canvas.getContext("2d");
        var NEON = "#9d6bff";
        function rr(x, y, w, h, r) {
          g.beginPath(); g.moveTo(x + r, y);
          g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
          g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
        }
        function wrap(text, x, y, maxW, lh) {
          var line = "", yy = y;
          for (var k = 0; k < text.length; k++) {
            var t2 = line + text[k];
            if (g.measureText(t2).width > maxW && line) { g.fillText(line, x, yy); line = text[k]; yy += lh; }
            else line = t2;
          }
          if (line) g.fillText(line, x, yy);
          return yy;
        }
        var clone = svgRoot.cloneNode(true);
        clone.setAttribute("width", "600"); clone.setAttribute("height", "600");
        clone.removeAttribute("style");
        var xml = new XMLSerializer().serializeToString(clone);
        var img = new Image();
        img.onload = function () {
          // 야경 그라데이션 배경
          var grd = g.createLinearGradient(0, 0, 0, H);
          grd.addColorStop(0, "#0d0a2b"); grd.addColorStop(0.45, "#1c1250"); grd.addColorStop(1, "#45227a");
          g.fillStyle = grd; g.fillRect(0, 0, W, H);
          // 시티 스카이라인 + 불빛 창문
          g.fillStyle = "#0a0620";
          [[0, 1150, 90, 130], [110, 1120, 70, 160], [200, 1160, 80, 120], [300, 1100, 65, 180], [385, 1140, 95, 140],
           [500, 1110, 70, 170], [590, 1155, 80, 125], [685, 1125, 60, 155]].forEach(function (b) { g.fillRect(b[0], b[1], b[2], b[3]); });
          var win = ["#ffd93d", "#ff6ec7", "#4deeea"];
          [[30, 1175], [135, 1150], [230, 1185], [325, 1130], [420, 1165], [525, 1140], [615, 1180], [705, 1155],
           [60, 1210], [160, 1190], [350, 1170], [550, 1185]].forEach(function (p, i) {
            g.fillStyle = win[i % 3]; g.globalAlpha = 0.85; g.fillRect(p[0], p[1], 7, 7); g.globalAlpha = 1;
          });
          // 네온 프레임 — 퍼플
          g.save(); g.shadowColor = NEON; g.shadowBlur = 24; g.strokeStyle = NEON; g.lineWidth = 5;
          rr(28, 28, W - 56, H - 56, 32); g.stroke(); g.restore();
          g.strokeStyle = "rgba(255,255,255,0.55)"; g.lineWidth = 1.5;
          rr(28, 28, W - 56, H - 56, 32); g.stroke();
          // 반짝이 장식
          g.textAlign = "center";
          g.fillStyle = "#ffd93d"; g.font = "30px sans-serif";
          g.save(); g.shadowColor = "#ffd93d"; g.shadowBlur = 14;
          g.fillText("✦", 96, 230); g.fillText("✧", W - 110, 190); g.fillText("✦", W - 90, 960); g.fillText("✧", 104, 930);
          g.restore();
          // 상단 네온 pill 배지
          var badge = (n + 1) + "번째 전생 · " + life.era;
          g.font = "28px 'Jua','Malgun Gothic',sans-serif";
          var bw = g.measureText(badge).width + 56;
          g.save(); g.shadowColor = NEON; g.shadowBlur = 16; g.strokeStyle = NEON; g.lineWidth = 3;
          rr((W - bw) / 2, 88, bw, 58, 29); g.stroke(); g.restore();
          g.fillStyle = "#fff";
          g.save(); g.shadowColor = NEON; g.shadowBlur = 10; g.fillText(badge, W / 2, 127); g.restore();
          // 타이틀 — 네온사인 글로우
          g.font = "48px 'Jua','Malgun Gothic',sans-serif"; g.fillStyle = "#ffffff";
          g.save(); g.shadowColor = NEON; g.shadowBlur = 26;
          g.fillText(life.emoji + " " + life.title, W / 2, 208); g.fillText(life.emoji + " " + life.title, W / 2, 208);
          g.restore();
          // 흰색 폴라로이드 패널(만화 삽화는 흰 배경 필수) + 글로우 테두리
          var px = 48, py = 248, pw = W - 96, ph = 656;
          g.save(); g.shadowColor = NEON; g.shadowBlur = 20; g.fillStyle = "#fff";
          rr(px, py, pw, ph, 20); g.fill(); g.restore();
          g.strokeStyle = "rgba(255,255,255,0.7)"; g.lineWidth = 1.5;
          rr(px, py, pw, ph, 20); g.stroke();
          g.drawImage(img, (W - 600) / 2, py + 14, 600, 600);
          // 본문 — 연보라
          g.fillStyle = "#cdbdf6"; g.font = "28px 'Jua','Malgun Gothic',sans-serif";
          wrap(life.body, W / 2, 964, W - 150, 44);
          // 하단 CTA
          g.font = "26px 'Jua','Malgun Gothic',sans-serif"; g.fillStyle = "#b9a8e8";
          g.fillText("🔮 goblub · 전생 대환장 파티", W / 2, H - 116);
          g.font = "28px 'Jua','Malgun Gothic',sans-serif"; g.fillStyle = "#4deeea";
          g.save(); g.shadowColor = "#4deeea"; g.shadowBlur = 12;
          g.fillText("나도 해보기 ▶ goblub.vercel.app", W / 2, H - 72);
          g.restore();
          var dl = function (url) { var a = document.createElement("a"); a.href = url; a.download = "goblub-jeonsaeng-" + (n + 1) + ".png"; document.body.appendChild(a); a.click(); a.remove(); };
          if (canvas.toBlob) canvas.toBlob(function (b) { if (!b) { dl(canvas.toDataURL("image/png")); return; } var u = URL.createObjectURL(b); dl(u); setTimeout(function () { URL.revokeObjectURL(u); }, 5000); }, "image/png");
          else dl(canvas.toDataURL("image/png"));
        };
        img.onerror = function () { alert("이미지 저장에 실패했어요. 다시 시도해 주세요."); };
        img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(xml);
      }

      function render(parsed) {
        var box = $("lives");
        box.innerHTML = "";
        var missingArt = 0;
        parsed.lives.forEach(function (life, n) {
          var card = document.createElement("section");
          card.className = "life-card" + (life.fix ? " bad" : "");
          card.innerHTML =
            '<span class="life-era">' + (n + 1) + "번째 전생 · " + life.era + "</span>" +
            '<p class="life-title">' + life.emoji + " " + life.title + "</p>" +
            '<div class="life-art"></div>' +
            '<p class="life-body"></p>';
          card.querySelector(".life-body").textContent = life.body;
          var svgRoot = life.svg ? sanitizeSvg(life.svg) : null;
          var art = card.querySelector(".life-art");
          if (svgRoot) {
            svgRoot.setAttribute("width", "100%");
            svgRoot.removeAttribute("height");
            svgRoot.style.cssText = "max-width:340px; display:block; margin:0 auto; border-radius:14px; background:#fff;";
            art.appendChild(svgRoot);
            var save = document.createElement("button");
            save.className = "btn-ghost";
            save.style.marginTop = "8px";
            save.textContent = "🖼 이 장면 이미지 저장";
            (function (sv, lf, idx) { save.onclick = function () { saveLifeImage(sv, lf, idx); }; })(svgRoot, life, n);
            art.appendChild(save);
          } else {
            missingArt++;
            art.innerHTML = '<div class="svg-missing"><span class="big">' + life.emoji +
              '</span>이 전생의 삽화는 도사님이 못 그렸어요<br>아래 <b>다시 발굴</b>을 누르면 새 삽화가 나올 수 있어요!</div>';
          }
          if (life.fix) {
            var btn = document.createElement("button");
            btn.className = "summon";
            btn.textContent = "🌀 고블럽 소환 — 이 업보 씹어먹기";
            btn.onclick = function () { summonGoblub(card, card.querySelector(".life-body"), life.fix, btn); };
            card.appendChild(btn);
          }
          box.appendChild(card);
        });
        if (missingArt) {
          var hint = document.createElement("p");
          hint.className = "art-hint";
          hint.innerHTML = "🎨 삽화 일부가 안 나왔어요. 아래 <b>다시 발굴</b>을 누르면 새로 그려드려요!";
          box.appendChild(hint);
        }
        if (parsed.finale) { $("finale-text").textContent = parsed.finale; $("finale-box").style.display = "block"; }
        $("svg-panel").style.display = "block";
        $("result-area").style.display = "block";
        if (window.GoblubFeed) GoblubFeed.grant("pastlife");
      }

      $("btn-go").onclick = function () {
        $("err").style.display = "none";
        if (!data) { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); return; }
        var yy = +y.value, mm = +m.value, dd = +d.value;
        var date = new Date(yy, mm - 1, dd);
        if (date.getFullYear() !== yy || date.getMonth() !== mm - 1 || date.getDate() !== dd) {
          showErr("없는 날짜예요. 다시 확인해주세요!"); return;
        }
        var min = h.value === "" ? 0 : Math.min(59, Math.max(0, +($("in-min").value || 0)));
        var birth = { y: yy, m: mm, d: dd, hour: h.value === "" ? null : +h.value, min: min };
        var r = Saju.compute(data, birth, { trueSolar: true });
        var payload = Dosa.buildPayload(r, birth, null, false);
        delete payload.daeun;
        $("input-panel").style.display = "none";
        $("dig-panel").style.display = "block";
        $("result-area").style.display = "none";
        var buffer = "";
        Dosa.fetchAI("/api/pastlife", { saju: payload }, "goblub_pl6_", {
          // 두 전생 모두 삽화가 있는 완전한 응답만 캐시(삽화 누락 결과가 고착되는 것 방지)
          accept: function (full) {
            var p = parseReading(full);
            return p.lives.length > 0 && p.lives.every(function (l) { return !!l.svg; });
          },
          onChunk: function (t) {
            buffer += t;
            var n = (buffer.match(/@@LIFE/g) || []).length;
            $("dig-status").textContent = n === 0 ? "도사님이 전생 지층을 파내려가는 중…" :
              n + "번째 전생 발굴! 계속 파는 중… ⛏️";
          },
          onDone: function () {
            $("dig-panel").style.display = "none";
            var parsed = parseReading(buffer);
            if (!parsed.lives.length) {
              $("input-panel").style.display = "block";
              showErr("전생 기록이 손상됐어요. 다시 발굴해 주세요!");
              return;
            }
            render(parsed);
          },
          onError: function (code, sec) {
            $("dig-panel").style.display = "none";
            $("input-panel").style.display = "block";
            showErr(
              code === "not_configured" ? "도사님이 아직 수련 중이에요. 곧 찾아옵니다!" :
              code === "cooldown" ? "도사님이 숨 고르는 중… " + sec + "초 후에 다시!" :
              "지층이 단단하네요. 잠시 후 다시 발굴해 주세요!");
          }
        });
      };

      $("btn-retry").onclick = function () {
        $("result-area").style.display = "none";
        $("input-panel").style.display = "block";
      };

    })();
  </script>
</body>
</html>
