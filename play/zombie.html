<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>좀비 아포칼립스 생존 유형 — goblub</title>
  <meta name="description" content="10가지 상황으로 보는 나의 좀비 아포칼립스 생존 유형 — 리더·전투·살림꾼·은둔·배신·첫날사망" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass3" />
  <style>
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0 4px; }
    .tag { background: var(--cream); border: 1.5px solid var(--line); border-radius: 999px; padding: 5px 12px; font-size: 0.9rem; color: var(--ink-soft); }
    .match-line { margin-top: 12px; color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=3" data-root=".."></script>
  <script src="js/feed.js?v=4"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var TYPES = {
      leader:   { emoji:"🛡️", name:"무리를 이끄는 리더형",     short:"리더",    desc:"패닉에 빠진 사람들 사이에서 혼자 침착하게 상황을 정리하고 있죠. 다들 당신만 보고 움직이는데, 정작 본인 체력은 하나도 안 챙기는 게 함정입니다.",
        tags:["타고난두목","위기에침착","다이끌어","책임감갑"], match:"supplier", clash:"traitor" },
      fighter:  { emoji:"🪓", name:"좀비 때려잡는 전투형",     short:"전투",    desc:"위협이 나타나면 일단 몸이 먼저 나가는 타입. 무리의 방패 역할을 자처하지만, 가끔은 무기보다 머리를 먼저 쓰는 연습도 필요합니다.",
        tags:["일단몸이먼저","방패자처","무기부터챙김","근손실없음"], match:"leader", clash:"hermit" },
      supplier: { emoji:"🎒", name:"팀의 생명줄 살림꾼형",     short:"살림꾼",  desc:"물, 식량, 배터리까지 야무지게 챙기는 진짜 생존 실세. 다들 당신 가방만 믿고 따라다니는데, 정작 본인 몫은 늘 제일 적게 챙깁니다.",
        tags:["가방이생명줄","야무진살림","내몫은늘꼴찌","진짜생존실세"], match:"leader", clash:"traitor" },
      hermit:   { emoji:"🏚️", name:"혼자 살아남는 은둔형",     short:"은둔",    desc:"무리보다는 나 혼자가 편한 스타일. 아무도 못 찾는 안전가옥을 귀신같이 찾아내지만, 정작 마지막에 문 두드릴 사람이 없어서 조금 외롭습니다.",
        tags:["혼자가편해","안전가옥귀신","무리는사양","은근외로움"], match:"supplier", clash:"fighter" },
      traitor:  { emoji:"🔪", name:"살기 위해선 뭐든 배신자형", short:"배신",    desc:"위기의 순간 계산이 제일 빠른 사람. 생존율은 확실히 높지만, 사태가 끝나고 나면 같이 살아남은 사람들 얼굴 보기가 좀 민망할 겁니다.",
        tags:["계산빠름","생존율갑","의리는패스","뒷맛은씁쓸"], match:"firstday", clash:"supplier" },
      firstday: { emoji:"💀", name:"호기심이 부른 첫날 사망형", short:"첫날사망", desc:"사이렌 울리자마자 창문 열고 밖부터 구경하는 스타일. 궁금한 건 못 참는 성격이 이번만큼은 수명을 크게 단축시킬 것 같습니다.",
        tags:["호기심천국","일단구경부터","못참는성격","수명단축각"], match:"traitor", clash:"leader" }
    };
    var ORDER = ["leader","fighter","supplier","hermit","traitor","firstday"];

    var QUESTIONS = [
      { q: "새벽 3시, 창밖에서 '우어어…' 소리. 원래 옆집 아저씨가 좀 그러시긴 하는데, 확인해보니 진짜 좀비 사태다!", choices: [
        { text: "폰 들고 나가서 좀비와 셀카부터 — 인증이 먼저다", scores: { firstday: 2 } },
        { text: "아파트 안내방송 마이크를 잡는다. '주민 여러분, 침착하십시오'", scores: { leader: 2 } },
        { text: "프라이팬 들고 현관 앞 1인 방어선 구축", scores: { fighter: 2 } },
        { text: "조용히 불 끄고 '이 집은 빈집입니다' 컨셉 유지", scores: { hermit: 2 } } ] },

      { q: "마트에 딱 하나 남은 카트. 저쪽에서 다른 생존자도 눈독 들이고 있다.", choices: [
        { text: "카트는 양보하고 장바구니 12개를 몸에 두르는 쪽을 택함", scores: { supplier: 2 } },
        { text: "상대가 통조림에 한눈판 사이 카트 끌고 유유히 퇴장", scores: { traitor: 2 } },
        { text: "'먼저 잡는 사람이 임자죠?' 전력질주 스피드 대결 신청", scores: { fighter: 2 } },
        { text: "카트 필요 없음. 어차피 혼자 다닐 거라 배낭 하나면 충분", scores: { hermit: 2 } } ] },

      { q: "일행 중 한 명이 '좀비도 사실 착할지 몰라'라며 대화를 시도하러 걸어간다.", choices: [
        { text: "'오? 통하려나?' 옆에서 팔짱 끼고 같이 구경", scores: { firstday: 2 } },
        { text: "목덜미 잡고 끌고 온다. '단체 행동 규칙 1조 낭독해봐'", scores: { leader: 2 } },
        { text: "말리진 않되 뒤에서 무기 들고 엄호 자세", scores: { fighter: 2 } },
        { text: "'이 무리랑 다니면 죽겠구나' 조용히 이탈 준비", scores: { hermit: 2, traitor: 1 } } ] },

      { q: "좀비들이 이상하게 나만 안 문다. 알고 보니 내가 마늘을 너무 먹어서(그런 설정이다).", choices: [
        { text: "이 능력으로 '좀비 구역 안전 통행' 유료 서비스 개업", scores: { traitor: 2 } },
        { text: "'내가 미끼가 된다. 다들 그 사이에 도망쳐!'", scores: { leader: 2 } },
        { text: "위험 구역 물자 회수 전담 셔틀을 자원함", scores: { supplier: 2 } },
        { text: "좀비 무리 한가운데로 산책 가서 어깨동무 시도", scores: { firstday: 2 } } ] },

      { q: "은신처 냉장고에 마지막 초코파이 1개. 그리고 그걸 목격한 6명.", choices: [
        { text: "6등분 칼질 장인 등판. 부스러기까지 공평 분배", scores: { supplier: 2 } },
        { text: "새벽에 몰래 냉장고를… 어? 이미 내 입안에 있네", scores: { traitor: 2 } },
        { text: "초코파이 포기 선언 후 그 논쟁 자체에서 이탈", scores: { hermit: 2 } },
        { text: "'팔씨름 토너먼트로 정하자' 제안 (본인 우승 확신)", scores: { fighter: 2 } } ] },

      { q: "라디오: '남쪽 캠프가 안전합니다.' 근데 어제는 분명 북쪽이 안전하댔는데?", choices: [
        { text: "지도 펴고 정보 교차검증 후 무리 투표에 부침", scores: { leader: 2 } },
        { text: "방송 자체를 안 믿음. 내 안전가옥 2층 증축이나 하련다", scores: { hermit: 2 } },
        { text: "'일단 남쪽 가보자! 아니면 어때, 궁금하잖아!'", scores: { firstday: 2 } },
        { text: "어느 쪽이 됐든 떠날 수 있게 비상 배낭 2세트 준비", scores: { supplier: 2 } } ] },

      { q: "한밤중 보초 근무 중, 문 두드리는 소리. '살려주세요… 사람이에요…'", choices: [
        { text: "규칙대로 진행. '손 보여주시고, 물린 자국 검사부터 할게요'", scores: { leader: 2 } },
        { text: "못 들은 척 스르륵 자리 이동. 우리 식량도 간당한데…", scores: { traitor: 2 } },
        { text: "문은 열어주되 프라이팬은 머리 위에서 대기", scores: { fighter: 2 } },
        { text: "문구멍에 눈 딱 붙이고 '누구세요~? 진짜 사람이에요~?'", scores: { firstday: 2 } } ] },

      { q: "옆 생존자 캠프가 우리 물자를 노린다는 소문이 돈다.", choices: [
        { text: "방어 훈련 개시. 내 프라이팬은 오늘부로 명검이다", scores: { fighter: 2 } },
        { text: "오히려 저쪽 캠프에 이직 면접 보러 감(연봉: 통조림)", scores: { traitor: 2 } },
        { text: "물자 분산 은닉 완료. 창고 위치는 나만 안다", scores: { supplier: 2 } },
        { text: "저쪽 대표에게 정상회담 제안 — 의제: 라면 반 나누기", scores: { leader: 2 } } ] },

      { q: "구조 헬기 등장! 남은 좌석은 1개, 우리 일행은 4명.", choices: [
        { text: "'미안!' …소리가 들릴 땐 이미 탑승 완료", scores: { traitor: 2 } },
        { text: "제일 약한 사람 태워 보내고 손 흔들어줌", scores: { leader: 2 } },
        { text: "'헬기? 난 저거 안 믿어.' 걸어서 살아남는 길 선택", scores: { hermit: 2 } },
        { text: "타는 사람 주머니에 비상식량 쑤셔 넣어 보냄", scores: { supplier: 2 } } ] },

      { q: "6개월 뒤, 생존자 다큐멘터리에 내가 나왔다. 화면 아래 소개 자막은?", choices: [
        { text: "'프라이팬의 전설 — 좀비 격퇴 137회'", scores: { fighter: 2 } },
        { text: "'목격담만 존재하는 유령 생존자'", scores: { hermit: 2 } },
        { text: "'1화에서 하차 (시청자 여러분이 많이 우셨습니다)'", scores: { firstday: 2 } },
        { text: "'전국 생존 캠프를 먹여 살린 물류왕'", scores: { supplier: 2 } } ] }
    ];

    function renderResult(totals, el, api) {
      var key = Quiz.top(totals, ORDER);
      var r = TYPES[key];
      var tagsHtml = '<div class="tags">' + r.tags.map(function (t) { return '<span class="tag">#' + t + '</span>'; }).join("") + '</div>';
      el.innerHTML =
        '<span class="result-emoji">' + r.emoji + "</span>" +
        '<p class="result-name">' + r.name + "</p>" +
        '<p class="result-desc">' + r.desc + "</p>" + tagsHtml +
        '<p class="match-line">💛 찰떡궁합: <b>' + TYPES[r.match].short + '</b> &nbsp;·&nbsp; ⚡ 상극: <b>' + TYPES[r.clash].short + '</b></p>' +
        '<div id="card-slot"></div>' +
        '<div class="result-actions">' +
        '<button class="btn-primary" id="qz-retry">다시하기</button>' +
        '<button class="btn-ghost" id="qz-share">링크 복사</button></div>';
      el.querySelector("#card-slot").appendChild(ShareCard.render({
        palette: "mint", emoji: r.emoji, badge: "좀비 생존 유형", title: r.name,
        lines: [r.desc, "#" + r.tags.slice(0, 3).join(" #")]
      }));
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#qz-share").onclick = function () { api.shareLink(el.querySelector("#qz-share")); };
      if (window.GoblubFeed && GoblubFeed.record) GoblubFeed.record("zombie", { emoji: r.emoji, title: (r.short || r.name), tags: r.tags });
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "🧟", title: "좀비 아포칼립스 생존 유형",
      intro: "좀비 사태가 터졌다. 사이렌이 울리고 세상이 뒤집혔다. 이 아수라장에서 너는 어떤 인간이 될까?",
      feedSrc: "zombie", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
