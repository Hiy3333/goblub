<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단톡방 캐릭터 테스트 — goblub</title>
  <meta name="description" content="10가지 상황으로 보는 나의 단톡방 캐릭터 — 도배왕·잠수함·드립러·눈팅유령·공지봇·이모티콘 장인" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass1" />
  <style>
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0 4px; }
    .tag { background: var(--cream); border: 1.5px solid #e8e2d4; border-radius: 999px; padding: 5px 12px; font-size: 0.9rem; color: var(--ink-soft); }
    .match-line { margin-top: 12px; color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=2" data-root=".."></script>
  <script src="js/feed.js?v=3"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var TYPES = {
      dobae:  { emoji:"🌊", name:"새벽 감성 도배왕",     short:"도배왕",    desc:"자정 넘으면 갑자기 텐션이 폭발해서 메시지를 폭풍처럼 쏟아내는 타입. 다음 날 아침 대화창 스크롤 압박에 스스로도 놀라지만, 방이 조용하면 못 견디는 그 활력 덕분에 단톡방이 안 죽고 살아있는 겁니다.",
        tags: ["새벽감성폭발","혼자5연속톡","의식의흐름","알림지옥제조기"], match:"drip", clash:"jamsu" },
      jamsu:  { emoji:"🤿", name:"읽씹 잠수함",         short:"잠수함",    desc:"읽음 표시는 뜨는데 답장은 안 오는 미스터리 그 자체. 사실 안 읽은 게 아니라 할 말을 고르다 타이밍을 놓친 것뿐이지만, 갑자기 3일 뒤에 '아까 그거'로 대화를 이어붙이는 능력만큼은 인정해야 합니다.",
        tags: ["읽씹아님바쁨","3일뒤아까그거","답장은늦어도진심","무음모드장인"], match:"ghost", clash:"dobae" },
      drip:   { emoji:"🎤", name:"드립 폭격기",         short:"드립러",    desc:"누가 무슨 말을 하든 3초 안에 드립으로 받아치는 반사신경의 소유자. 방 분위기를 살리는 일등 공신이지만, 가끔은 진지한 얘기 좀 하려는데 개그로 새버려서 다들 할 말을 잃게 만들기도 합니다.",
        tags: ["3초반사신경","분위기메이커","진지충전환러","드립각채굴기"], match:"dobae", clash:"notice" },
      ghost:  { emoji:"👻", name:"눈팅만 하는 유령",     short:"눈팅유령",  desc:"알림은 다 오는데 존재감은 제로, 며칠에 한 번 이모티콘 하나로 생존 신고하는 스타일. 정작 중요한 순간엔 조용히 다 보고 있다가 핵심만 콕 집어 한마디 던지는 은근한 존재감이 있습니다.",
        tags: ["존재감제로","생존신고전문","다보고있음","결정적순간한줄"], match:"jamsu", clash:"drip" },
      notice: { emoji:"📢", name:"단톡방 총무 공지봇",   short:"공지봇",    desc:"약속 날짜·장소·회비까지 정리해서 공지하는 이 방의 실질적 운영자. 다들 대충 넘어가려 할 때 혼자 디테일을 챙기는 책임감은 최고지만, 정작 본인 스케줄은 방장 노릇 하느라 못 챙기기 일쑤입니다.",
        tags: ["실질적방장","날짜장소회비정리","디테일책임감","정작본인일정은엉망"], match:"emoti", clash:"ghost" },
      emoti:  { emoji:"🐥", name:"이모티콘 장인",       short:"이모티콘",  desc:"할 말이 없어도 이모티콘 하나로 완벽하게 리액션을 완성하는 능력자. 텍스트보다 짤과 이모티콘이 먼저 나가는 통에 정작 진지한 대화가 필요할 땐 말문이 좀 막히기도 합니다.",
        tags: ["짤이먼저말은나중","이모티콘장인","리액션종결자","텍스트울렁증"], match:"notice", clash:"dobae" }
    };
    var ORDER = ["dobae","jamsu","drip","ghost","notice","emoti"];

    var QUESTIONS = [
      { q: "자고 일어나니 단톡방 알림 999+. 스크롤 올려보니 새벽에 누가 연애상담을 시작했던 모양이다.", choices: [
        { text: "지금이라도 참전한다. 내 연애사 3부작 대하드라마 연재 시작", scores: { dobae: 2 } },
        { text: "999개를 정독하고 아무 말도 남기지 않는다", scores: { ghost: 2 } },
        { text: "새벽 상담 내용을 3줄 요약본으로 정리해 올림", scores: { notice: 2 } },
        { text: "'결론: 헤어져.' + 완벽한 짤 한 장으로 상황 종료", scores: { drip: 2 } } ] },
      { q: "비상사태. 엄마한테 보낼 애교 메시지를 단톡방에 잘못 전송했다. '엄마 딸기 사줘잉🍓'", choices: [
        { text: "폰 전원을 끈다. 3일 뒤에 봅시다", scores: { jamsu: 2 } },
        { text: "'실수 아닌데? 너네한테 보낸 건데?' 뻔뻔 정면돌파", scores: { drip: 2 } },
        { text: "수습용 이모티콘 20연발로 화면 밀어내기", scores: { emoti: 2 } },
        { text: "더 큰 TMI 폭탄으로 화제 전환 — 내 흑역사 자진 연재", scores: { dobae: 2 } } ] },
      { q: "방장이 말없이 단톡방을 나갔다. 무정부 상태 돌입.", choices: [
        { text: "자연스럽게 왕좌에 앉는다. '단톡방 규칙 v2.0 공지합니다'", scores: { notice: 2 } },
        { text: "정권이 바뀌든 말든 눈팅 포지션 사수", scores: { ghost: 2 } },
        { text: "'이 구역의 새 왕은 나다' 드립으로 쿠데타 시도", scores: { drip: 2 } },
        { text: "어수선한 틈을 타 조용히 알림을 영구 음소거", scores: { jamsu: 2 } } ] },
      { q: "친구가 갑자기 나를 소환했다. '@나 이건 얘가 제일 잘 알걸?'", choices: [
        { text: "하필 그 순간부터 급격히 바빠짐 (3시간 뒤 답장 예정)", scores: { jamsu: 2 } },
        { text: "기다렸다는 듯 정리된 답변 + 참고 링크 3개 첨부", scores: { notice: 2 } },
        { text: "물음표 이모티콘으로 일단 시간 벌기", scores: { emoti: 2 } },
        { text: "태그 알림을 보고도 유령 모드 유지. 나는 없는 사람이다", scores: { ghost: 2 } } ] },
      { q: "단톡방 멤버들과 처음으로 오프라인에서 만나기로 했다.", choices: [
        { text: "만나기도 전에 설레서 D-3부터 카운트다운 중계 중", scores: { dobae: 2 } },
        { text: "실물 보고 '누구세요?' 소리 들을 예정 (채팅과 동일인 맞음)", scores: { ghost: 2 } },
        { text: "현장에서도 리액션은 최고, 말수는 최소", scores: { emoti: 2 } },
        { text: "시간·장소·메뉴 투표·지도 링크까지 이미 내가 다 셋팅함", scores: { notice: 2 } } ] },
      { q: "새벽 2시, 자려는데 갑자기 인생 최고의 아이디어가 떠올랐다.", choices: [
        { text: "바로 전송. 12연속. 답장은 바라지도 않음", scores: { dobae: 2 } },
        { text: "메모장에 적어두고 결국 아무한테도 안 보냄 (영원히)", scores: { jamsu: 2 } },
        { text: "아이디어를 드립으로 포장해서 투척 — 안 웃기면 없던 일", scores: { drip: 2 } },
        { text: "남의 새벽톡은 다 봐도 내 새벽톡은 존재하지 않는다", scores: { ghost: 2 } } ] },
      { q: "단톡방에서 나만 모르는 얘기가 한창 진행 중이다.", choices: [
        { text: "모르지만 일단 드립으로 낀다. 맥락은 나중에", scores: { drip: 2 } },
        { text: "모르는 얘기 감지 즉시 자동 잠수 모드 발동", scores: { jamsu: 2 } },
        { text: "'뭔데뭔데뭔데???' 3연타 전송", scores: { dobae: 2 } },
        { text: "스크롤 위로 올려 혼자 맥락 파악 후 깔끔 요약 공지", scores: { notice: 2 } } ] },
      { q: "친구가 야심차게 던진 개그에 방 전체가 싸늘하게 식었다.", choices: [
        { text: "영혼 없는 'ㅋㅋ' 이모티콘으로 심폐소생 시도", scores: { emoti: 2 } },
        { text: "그 개그를 더 웃긴 드립으로 덮어서 친구를 구출", scores: { drip: 2 } },
        { text: "이 타이밍에 방을 나갔다 들어온다 (알림 리셋 겸)", scores: { jamsu: 2 } },
        { text: "침묵. 원래 침묵은 내 전문 분야다", scores: { ghost: 2 } } ] },
      { q: "내가 올린 중요 공지 옆 '1'이 3일째 안 사라진다. 딱 한 명이 안 읽었다.", choices: [
        { text: "범인 색출 완료. 개인톡으로 공지 재전송 + 확인 요청", scores: { notice: 2 } },
        { text: "'야 마지막 1 누구야, 나와' 공개 소환", scores: { dobae: 2 } },
        { text: "궁금해 죽겠지만 이모티콘 올리며 딴청", scores: { emoti: 2 } },
        { text: "아… 그 1, 사실 부계정으로 접속한 나였다", scores: { jamsu: 2 } } ] },
      { q: "연말 단톡방 시상식이 열렸다. 내가 받게 될 상은?", choices: [
        { text: "'올해의 도배 대상' — 수상 소감만 스무 줄", scores: { dobae: 2 } },
        { text: "'베스트 드립 신인상' — 수상 소감도 드립", scores: { drip: 2 } },
        { text: "'유령 공로상' — 시상식에도 불참", scores: { ghost: 2 } },
        { text: "'이모티콘 소비 촉진 경제 공헌상'", scores: { emoti: 2 } } ] }
    ];

    function renderResult(totals, el, api) {
      var key = Quiz.top(totals, ORDER);
      var r = TYPES[key];
      var tagsHtml = '<div class="tags">' + r.tags.map(function (t) { return '<span class="tag">#' + t + '</span>'; }).join("") + '</div>';
      el.innerHTML =
        '<span class="result-emoji">' + r.emoji + "</span>" +
        '<p class="result-name">' + r.name + "</p>" +
        '<p class="result-desc">' + r.desc + "</p>" + tagsHtml +
        '<p class="match-line">💛 찰떡궁합: <b>' + TYPES[r.match].short + '</b> &nbsp;·&nbsp; ⚡ 상극: <b>' + TYPES[r.clash].short + '</b></p>' +
        '<div id="card-slot"></div>' +
        '<div class="result-actions">' +
        '<button class="btn-primary" id="qz-retry">다시하기</button>' +
        '<button class="btn-ghost" id="qz-share">링크 복사</button></div>';
      el.querySelector("#card-slot").appendChild(ShareCard.render({
        palette: "sky", emoji: r.emoji, badge: "단톡방 캐릭터", title: r.name,
        lines: [r.desc, "#" + r.tags.slice(0, 3).join(" #")]
      }));
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#qz-share").onclick = function () { api.shareLink(el.querySelector("#qz-share")); };
      if (window.GoblubFeed && GoblubFeed.record) GoblubFeed.record("chatroom", { emoji: r.emoji, title: (r.short || r.name), tags: r.tags });
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "💬", title: "단톡방 캐릭터 테스트",
      intro: "새 단톡방에 초대됐다. 알림이 울리기 시작한다. 이 방에서 나는 어떤 캐릭터일까?",
      feedSrc: "chatroom", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
