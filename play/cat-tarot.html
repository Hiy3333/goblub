<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>고양이 타로 — goblub</title>
<meta name="description" content="밤의 타로 카페, 오드아이 고양이 점술사가 네 고민을 카드 한 장에 비추어 읽어준다 — 하루 단 한 장" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg0:#0c0918; --bg1:#151027; --ink:#efe7d6; --ink-soft:#b6acc9;
  --gold:#e9c877; --gold-soft:#c9a75e; --violet:#a184e8; --line:rgba(233,200,119,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:
  radial-gradient(680px 460px at 50% -8%, rgba(150,110,60,.16), transparent 62%),
  radial-gradient(760px 560px at 50% 112%, rgba(110,60,170,.20), transparent 64%),
  linear-gradient(180deg,#0f0b1e 0%,#0c0918 60%,#0a0714 100%) fixed;
  color:var(--ink);font-family:'Gowun Batang','Nanum Myeongjo',serif;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:14px 14px 20px}
body.top{justify-content:flex-start}
.app{width:min(94vw,400px);display:flex;flex-direction:column;align-items:center}
.topbar{width:100%;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.topbar a{color:var(--ink-soft);font-size:.88rem;text-decoration:none;font-family:'Gowun Batang',serif}
.topbar a:hover{color:var(--gold)}
.topbar .t{font-family:'Nanum Myeongjo',serif;font-weight:800;color:var(--gold);font-size:1.12rem;
  letter-spacing:.02em;margin:0 auto;text-shadow:0 0 18px rgba(233,200,119,.35)}
.topbar .sp{width:44px}

/* 공통 무대 */
.screen{position:relative;width:100%;border-radius:20px;overflow:hidden;display:none;
  border:1px solid var(--line);box-shadow:0 24px 66px rgba(0,0,0,.72),0 0 40px rgba(120,70,200,.16)}
.screen.on{display:block}

/* ── 인트로 (고양이 + 고민 입력) ── */
#scIntro{background:#0c0918}
#scIntro .cat{display:block;width:100%;aspect-ratio:1/1;object-fit:cover}
#scIntro .veil{position:absolute;inset:0;background:linear-gradient(180deg,transparent 34%,rgba(10,7,20,.55) 60%,rgba(10,7,20,.96) 100%)}
#scIntro .box{position:absolute;left:0;right:0;bottom:0;padding:14px 16px 16px;z-index:2}
#scIntro .greet{font-family:'Nanum Myeongjo',serif;color:#fff3e2;font-size:1.02rem;line-height:1.6;
  text-shadow:0 2px 12px rgba(0,0,0,.85);margin-bottom:10px}
#scIntro .greet .nm{display:block;color:var(--gold);font-size:.8rem;margin-bottom:3px;letter-spacing:.04em}
#worry{width:100%;height:62px;resize:none;border-radius:12px;padding:10px 12px;
  background:rgba(20,14,34,.86);border:1px solid var(--line);color:var(--ink);
  font-family:'Gowun Batang',serif;font-size:.95rem;line-height:1.5;backdrop-filter:blur(3px)}
#worry:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(233,200,119,.16)}
#worry::placeholder{color:#8a7fa4}
.gobtn{margin-top:10px;width:100%;padding:13px;border-radius:13px;cursor:pointer;
  font-family:'Nanum Myeongjo',serif;font-weight:700;font-size:1.05rem;letter-spacing:.02em;
  color:#241a08;background:linear-gradient(180deg,#f2d488,#d8b055);border:1px solid rgba(255,235,180,.6);
  box-shadow:0 10px 26px rgba(180,140,50,.34),inset 0 2px 3px rgba(255,245,210,.6);
  transition:transform .1s, box-shadow .1s}
.gobtn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(180,140,50,.46)}
.gobtn:active{transform:translateY(1px)}

/* ── 펼침 영상 ── */
#scSpread{aspect-ratio:1/1;background:#000}
#scSpread video,#scSpread .still{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
#scSpread .still{background-size:cover;background-position:center;opacity:0;transition:opacity .35s}
#scSpread .still.on{opacity:1}
video::-webkit-media-controls,video::-webkit-media-controls-start-playback-button,
video::-webkit-media-controls-overlay-play-button{display:none!important;-webkit-appearance:none!important}
#scSpread .cap{position:absolute;left:0;right:0;bottom:14px;text-align:center;z-index:3;
  font-family:'Nanum Myeongjo',serif;color:#fff3e2;font-size:.98rem;text-shadow:0 2px 14px rgba(0,0,0,.9)}

/* ── 클로즈업 카드 선택 (테이블 장면) ── */
#scPick{aspect-ratio:1/1;background:#0b0716}
#scPick .tbg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;display:block}
#scPick .tveil{position:absolute;left:0;right:0;bottom:0;height:46%;z-index:2;pointer-events:none;
  background:linear-gradient(180deg,transparent,rgba(8,5,14,.35) 60%,rgba(8,5,14,.62))}
#scPick .cusay{position:absolute;left:0;right:0;top:13px;text-align:center;z-index:7;
  font-family:'Nanum Myeongjo',serif;font-size:1.02rem;color:var(--gold);
  text-shadow:0 2px 14px rgba(0,0,0,.95)}
.fan{position:absolute;left:50%;top:0;width:0;height:0;z-index:5}
.fan b{position:absolute;left:0;top:0;width:52px;height:83px;margin-left:-26px;border-radius:7px;
  cursor:pointer;transform-origin:50% 210%;transition:transform .18s ease, box-shadow .18s ease, filter .18s;
  background-image:var(--back);background-size:cover;background-position:center;
  border:1.5px solid rgba(233,200,119,.6);
  box-shadow:0 7px 15px rgba(0,0,0,.6);filter:brightness(.9)}
.fan b:hover{box-shadow:0 0 22px rgba(233,200,119,.95),0 10px 22px rgba(0,0,0,.55);
  border-color:var(--gold);filter:brightness(1.14);z-index:9}

/* ── 결과 ── */
#scResult{background:linear-gradient(180deg,#14102a,#0a0714);padding:20px 18px 22px;min-height:60vh}
#scResult .rcard{width:138px;height:207px;margin:2px auto 14px;border-radius:11px;display:block;
  object-fit:cover;box-shadow:0 0 46px rgba(233,200,119,.4),0 14px 34px rgba(0,0,0,.55);
  animation:flip .7s;background:#120d2c}
@keyframes flip{from{transform:rotateY(90deg);opacity:.2}to{transform:rotateY(0);opacity:1}}
#scResult .rname{font-family:'Nanum Myeongjo',serif;color:var(--ink);font-size:1.22rem;text-align:center}
#scResult .rorient{display:block;color:var(--violet);font-size:.82rem;margin-top:3px;text-align:center;letter-spacing:.04em}
#scResult .rkw{color:var(--gold-soft);font-size:.82rem;text-align:center;margin:4px 0 14px;letter-spacing:.03em}
#scResult .reading{color:var(--ink);font-size:.96rem;line-height:1.92;white-space:pre-wrap;
  border-top:1px solid var(--line);padding-top:14px;min-height:3em}
#scResult .reading .sub{display:block;color:var(--gold);font-family:'Nanum Myeongjo',serif;
  font-size:1rem;margin:15px 0 3px;letter-spacing:.02em}
#scResult .reading .sub:first-child{margin-top:0}
#scResult .status{color:var(--ink-soft);font-size:.9rem;text-align:center;padding:8px 0}
#scResult .oncebar{margin-top:18px;text-align:center;color:var(--gold-soft);font-size:.86rem;
  font-family:'Nanum Myeongjo',serif;border-top:1px dashed var(--line);padding-top:14px;line-height:1.7}
#scResult .worry-echo{color:var(--ink-soft);font-size:.84rem;text-align:center;margin-bottom:12px;
  font-style:italic;line-height:1.5}

.hintbar{margin-top:16px;color:var(--ink-soft);font-size:.83rem;text-align:center;line-height:1.7;max-width:340px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(233,200,119,.3);
  border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a href="fortune-hub.html">← 운세</a>
    <span class="t">고양이 타로</span>
    <span class="sp"></span>
  </div>

  <!-- ① 인트로: 고양이 + 고민 입력 -->
  <div class="screen on" id="scIntro">
    <img class="cat" src="img/cat/cat2-start.webp" alt="고양이 점술사" />
    <div class="veil"></div>
    <div class="box">
      <p class="greet"><span class="nm">점술묘 냐옹</span>어서 오라옹. 오늘 네 마음에 걸리는 게 뭐냥? 한 줄 적어보라옹 — 그걸 한 장에 비춰주지.</p>
      <textarea id="worry" maxlength="200" placeholder="예) 지금 하는 일을 계속해도 될까? / 그 사람과의 관계가 고민이야…"></textarea>
      <button class="gobtn" id="goBtn">🐾 카드 펼치기</button>
    </div>
  </div>

  <!-- ② 펼침 영상 -->
  <div class="screen" id="scSpread">
    <video id="vid" muted playsinline webkit-playsinline preload="auto"></video>
    <div class="still on" id="still"></div>
    <p class="cap" id="cap">고양이가 카드를 펼치는 중…</p>
  </div>

  <!-- ③ 클로즈업 카드 선택 (테이블 장면) -->
  <div class="screen" id="scPick">
    <video class="tbg" id="tvid" muted loop autoplay playsinline webkit-playsinline preload="auto"
           poster="img/cat/cat2-table.webp"></video>
    <div class="tveil"></div>
    <p class="cusay">…끌리는 카드를 하나 골라보라옹</p>
    <div class="fan" id="fan"></div>
  </div>

  <!-- ④ 결과 -->
  <div class="screen" id="scResult">
    <div class="worry-echo" id="worryEcho"></div>
    <img class="rcard" id="rimg" alt="" />
    <div class="rname" id="rname"></div>
    <span class="rorient" id="rorient"></span>
    <div class="rkw" id="rkw"></div>
    <div class="status" id="rstatus"><span class="spin"></span>고양이가 카드를 읽는 중…</div>
    <div class="reading" id="reading" style="display:none"></div>
    <div class="oncebar" id="oncebar" style="display:none">🌙 오늘의 카드는 하루에 딱 한 장.<br>내일 밤, 또 궁금한 게 생기면 오라옹.</div>
  </div>

  <p class="hintbar" id="hintbar">고민을 적고 카드를 펼치면, 끌리는 한 장을 고를 수 있다옹.</p>
</div>

<script src="js/dosa.js?v=ct2"></script>
<script>
var SPREAD="img/cat/cat2-spread.mp4", CAT_IDLE="img/cat/cat2-start.webp",
    TABLE="img/cat/cat2-tablecat.mp4",
    BACK="img/cat/cat2-back.webp?v=2", LOCK_KEY="goblub_cattarot_v2";

// 메이저 아르카나 22 [로마숫자, 이름, 키워드, 이모지]
var MAJOR=[
 ["0","바보 · The Fool","새로운 시작·모험·순수","🃏"],
 ["I","마법사 · The Magician","실현·재능·주도력","🪄"],
 ["II","여사제 · The High Priestess","직관·비밀·내면의 목소리","🌙"],
 ["III","여황제 · The Empress","풍요·창조·보살핌","🌷"],
 ["IV","황제 · The Emperor","안정·질서·책임","🏛️"],
 ["V","교황 · The Hierophant","전통·배움·조언","📜"],
 ["VI","연인 · The Lovers","사랑·선택·조화","💗"],
 ["VII","전차 · The Chariot","의지·전진·돌파","🐎"],
 ["VIII","힘 · Strength","용기·인내·부드러운 힘","🦁"],
 ["IX","은둔자 · The Hermit","성찰·고독·탐구","🏮"],
 ["X","운명의 수레바퀴 · Wheel of Fortune","전환점·순환·기회","🎡"],
 ["XI","정의 · Justice","균형·공정·인과","⚖️"],
 ["XII","매달린 사람 · The Hanged Man","멈춤·관점 전환·내려놓기","🙃"],
 ["XIII","죽음 · Death","끝과 시작·정리·변화","🦋"],
 ["XIV","절제 · Temperance","조화·중용·치유","🍵"],
 ["XV","악마 · The Devil","집착·유혹·속박","⛓️"],
 ["XVI","탑 · The Tower","붕괴·급변·해방","🗼"],
 ["XVII","별 · The Star","희망·치유·영감","⭐"],
 ["XVIII","달 · The Moon","불안·환상·무의식","🌘"],
 ["XIX","태양 · The Sun","성취·활력·기쁨","🌞"],
 ["XX","심판 · Judgement","각성·결단·부활","🎺"],
 ["XXI","세계 · The World","완성·통합·성취","🌍"]
];

var $=function(id){return document.getElementById(id);};
var scIntro=$("scIntro"), scSpread=$("scSpread"), scPick=$("scPick"), scResult=$("scResult"),
    vid=$("vid"), still=$("still"), fan=$("fan"), hintbar=$("hintbar");
var phase="intro", myWorry="", dayPlan=null;

still.style.backgroundImage="url('"+CAT_IDLE+"')";
fan.style.setProperty("--back","url('"+BACK+"')");

function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
// 날짜 시드 기반 결정론적 셔플/방향 — 같은 날은 같은 배치
function seedFromStr(s){ var h=2166136261; for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);} return h>>>0; }
function rng(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; var t=Math.imul(seed^seed>>>15,1|seed);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function show(sc){ [scIntro,scSpread,scPick,scResult].forEach(function(s){s.classList.remove("on");}); sc.classList.add("on");
  document.body.classList.toggle("top", sc===scResult); if(sc===scResult) window.scrollTo(0,0); }

// 이미 오늘 뽑았으면 결과로 직행
(function initLock(){
  try{
    var rec=JSON.parse(localStorage.getItem(LOCK_KEY));
    if(rec && rec.date===todayStr() && typeof rec.cardIdx==="number"){
      myWorry=rec.worry||""; revealResult(rec.cardIdx, rec.orient, true);
    }
  }catch(e){}
})();

$("goBtn").onclick=function(){
  myWorry=($("worry").value||"").trim();
  startSpread();
};

function startSpread(){
  phase="spread"; show(scSpread); hintbar.textContent="고양이가 앞발로 카드를 펼치는 중…";
  vid.onended=null; vid.onplaying=null; vid.loop=false; vid.src=SPREAD;
  vid.onplaying=function(){ still.classList.remove("on"); };
  vid.onended=function(){ toPick(); };
  var p=vid.play(); if(p&&p.catch) p.catch(function(){ toPick(); });
  setTimeout(function(){ if(phase==="spread") toPick(); }, 6500);
}

function toPick(){
  phase="pick";
  try{ vid.pause(); vid.removeAttribute("src"); vid.load(); }catch(e){}
  buildFan(); show(scPick);
  // 테이블 위 고양이 idle 영상 재생(무한 루프)
  var tvid=$("tvid");
  if(tvid && !tvid.src){ tvid.src=TABLE; }
  if(tvid){ var pp=tvid.play(); if(pp&&pp.catch) pp.catch(function(){}); }
  hintbar.textContent="테이블 위 카드 중 끌리는 한 장을 톡 눌러보라옹.";
}

// 14장(두 줄 아크) — 테이블 앞쪽에 펼쳐 놓기
function buildFan(){
  fan.innerHTML="";
  var rows=[{n:7, y:196, spreadX:150, curve:18, ang:28, z:2},
            {n:7, y:256, spreadX:172, curve:16, ang:25, z:1}];
  rows.forEach(function(row,ri){
    for(var i=0;i<row.n;i++){
      var t=(i/(row.n-1))-0.5;
      var x=t*row.spreadX + (ri===1? (row.spreadX/ (row.n-1))/2 *0 :0);
      var y=row.y - Math.cos(t*Math.PI)*0 + Math.abs(t)*Math.abs(t)*row.curve;
      var ang=t*row.ang;
      var b=document.createElement("b");
      b.style.zIndex=row.z*10 + i;
      var base="translate("+x+"px,"+y+"px) rotate("+ang+"deg)";
      b.style.transform=base;
      b.setAttribute("data-base",base);
      b.onmouseenter=(function(el,bx,by,ba){return function(){
        el.style.transform="translate("+bx+"px,"+(by-18)+"px) rotate("+ba+"deg)";};})(b,x,y,ang);
      b.onmouseleave=(function(el){return function(){ el.style.transform=el.getAttribute("data-base"); };})(b);
      b.onclick=(function(idx){return function(){ pick(idx); };})(ri*7+i);
      fan.appendChild(b);
    }
  });
}

// 위치 idx → 그날의 카드/방향(시드 셔플)
function planFor(pickIdx){
  var r=rng(seedFromStr(todayStr()+"|"+pickIdx));
  var cardIdx=Math.floor(r()*MAJOR.length);
  var orient=(r()<0.62)?"정방향":"역방향";     // 정방향 조금 더 잦게
  return {cardIdx:cardIdx, orient:orient};
}

function pick(pickIdx){
  if(phase!=="pick") return;
  phase="result";
  var pl=planFor(pickIdx);
  try{ localStorage.setItem(LOCK_KEY, JSON.stringify({date:todayStr(), cardIdx:pl.cardIdx, orient:pl.orient, worry:myWorry})); }catch(e){}
  revealResult(pl.cardIdx, pl.orient, false);
}

function revealResult(cardIdx, orient, fromLock){
  phase="result"; show(scResult);
  var c=MAJOR[cardIdx];
  var pad=(cardIdx<10?"0":"")+cardIdx;
  $("rimg").src="img/cat/arcana/"+pad+".webp?v=2";
  $("rname").textContent=c[0]+" · "+c[1];
  $("rorient").textContent="— "+orient+" —";
  $("rkw").textContent=c[2];
  $("worryEcho").textContent=myWorry ? "“"+myWorry+"”" : "오늘 하루의 운을 물었다옹";
  hintbar.textContent="";
  var readingEl=$("reading"), statusEl=$("rstatus"), onceBar=$("oncebar");
  readingEl.style.display="none"; readingEl.innerHTML=""; onceBar.style.display="none";
  statusEl.style.display="block"; statusEl.innerHTML='<span class="spin"></span>고양이가 카드를 읽는 중…';

  var acc="";
  Dosa.fetchAI("/api/cat-tarot",
    { tarot:{ worry:myWorry, card:c[1], keyword:c[2], orient:orient } },
    "goblub_ct_",
    {
      onChunk:function(t){ acc+=t; readingEl.style.display="block"; statusEl.style.display="none";
        readingEl.innerHTML=fmt(acc); },
      onDone:function(){ readingEl.style.display="block"; statusEl.style.display="none";
        readingEl.innerHTML=fmt(acc); onceBar.style.display="block"; },
      onError:function(code, sec){
        statusEl.style.display="block";
        statusEl.innerHTML = code==="not_configured" ? "점술묘가 아직 낮잠 중이라옹… 곧 깨어난다냥." :
          code==="cooldown" ? "숨 좀 고르고… "+sec+"초 뒤에 다시 보라옹." :
          "오늘은 손님이 많구나옹. 잠시 뒤 다시 와보라냥.";
        onceBar.style.display="block";
      }
    });
}

// 소제목 3개를 골드 헤딩으로
function fmt(s){
  var subs=["카드가 말하길","지금의 너에게","발자국 하나"];
  var out=s.replace(/</g,"&lt;");
  subs.forEach(function(h){ out=out.replace(h, '<span class="sub">'+h+'</span>'); });
  return out;
}
</script>
</body>
</html>
