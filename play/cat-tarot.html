<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>고양이 타로 — goblub</title>
<meta name="description" content="오드아이 흰 고양이 점술사가 앞발로 카드를 쭉 펼쳐준다 — 클로즈업된 카드 중 끌리는 한 장을 골라 오늘의 운을 보라옹" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:
  radial-gradient(600px 420px at 50% -6%, rgba(150,110,60,.18), transparent 62%),
  radial-gradient(700px 520px at 50% 108%, rgba(90,40,140,.22), transparent 64%),
  linear-gradient(180deg,#140f1e 0%,#0e0a18 60%,#0c0814 100%) fixed;
  color:#eee6ff;font-family:'Jua','Malgun Gothic',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 14px 44px}
.topbar{width:min(94vw,380px);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.topbar a{color:#b6a6df;font-size:.9rem;text-decoration:none}
.topbar .t{font-family:'Nanum Myeongjo',serif;font-weight:800;color:#ffd98a;font-size:1.15rem;
  margin-left:auto;margin-right:auto;text-shadow:0 0 16px rgba(220,160,80,.4)}
.topbar .sp{width:38px}

/* 공통 무대 */
.screen{position:relative;width:min(94vw,380px);border-radius:20px;overflow:hidden;background:#000;
  box-shadow:0 22px 64px rgba(0,0,0,.72),0 0 46px rgba(130,70,220,.22);
  border:1px solid rgba(150,110,200,.25);display:none}
.screen.on{display:block}

/* 고양이 무대(대사+펼침영상) — 정사각 */
#scCat{aspect-ratio:1/1}
#scCat video,#scCat .still{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
#scCat .still{background-size:cover;background-position:center;opacity:0;transition:opacity .35s}
#scCat .still.on{opacity:1}
video::-webkit-media-controls,video::-webkit-media-controls-start-playback-button,
video::-webkit-media-controls-overlay-play-button{display:none!important;-webkit-appearance:none!important}
/* 대사 말풍선 */
.say{position:absolute;left:12px;right:12px;bottom:12px;z-index:5;
  background:rgba(14,9,22,.82);border:1px solid rgba(180,140,90,.45);border-radius:14px;
  padding:13px 16px 14px;font-family:'Nanum Myeongjo',serif;font-size:1.02rem;color:#fff3e2;line-height:1.65;
  text-shadow:0 1px 8px rgba(0,0,0,.7);backdrop-filter:blur(3px);transition:opacity .25s}
.say .nm{display:block;color:#ffce7a;font-size:.82rem;margin-bottom:3px}
.tapHint{position:absolute;right:20px;bottom:20px;z-index:6;color:#ffe6a6;font-size:.82rem;
  animation:tb 1.2s ease-in-out infinite;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.9)}
@keyframes tb{50%{transform:translateX(5px)}}

/* 클로즈업 선택 무대 */
#scPick{aspect-ratio:1/1.06;background:
  radial-gradient(420px 300px at 50% 24%, rgba(120,80,190,.30), transparent 66%),
  radial-gradient(420px 320px at 50% 120%, rgba(70,30,110,.5), transparent 60%),
  linear-gradient(180deg,#1a1230,#0c0716)}
#scPick .cusay{position:absolute;left:0;right:0;top:16px;text-align:center;z-index:6;
  font-family:'Nanum Myeongjo',serif;font-size:1.05rem;color:#ffe7c2;
  text-shadow:0 2px 14px rgba(0,0,0,.9)}
/* 발 — 양옆에서 천천히 움직임 */
#scPick .paws{position:absolute;left:0;right:0;bottom:-4%;width:100%;z-index:4;pointer-events:none;
  filter:drop-shadow(0 -4px 16px rgba(0,0,0,.4));animation:pawbob 3.4s ease-in-out infinite}
@keyframes pawbob{0%,100%{transform:translateY(0) rotate(0deg)}
  30%{transform:translateY(-9px) rotate(-1deg)}70%{transform:translateY(-4px) rotate(1deg)}}
/* 펼쳐진 큰 카드(진짜 클릭 대상) */
.fan{position:absolute;left:50%;top:50%;width:0;height:0;z-index:5}
.fan b{position:absolute;left:0;top:0;width:70px;height:112px;margin:-56px 0 0 -35px;border-radius:9px;
  cursor:pointer;transform-origin:50% 150%;transition:transform .2s ease, box-shadow .2s ease;
  background:linear-gradient(160deg,#232a66 0%,#161a44 55%,#0e1030 100%);
  border:2px solid rgba(220,180,95,.8);box-shadow:0 8px 18px rgba(0,0,0,.5),inset 0 0 14px rgba(90,70,180,.4);
  display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:rgba(255,220,140,.92);
  text-shadow:0 0 10px rgba(255,200,110,.7)}
.fan b::after{content:"";position:absolute;inset:5px;border-radius:6px;border:1px solid rgba(220,180,95,.35)}
.fan b:hover{box-shadow:0 0 26px rgba(255,220,120,.95),0 10px 22px rgba(0,0,0,.55);
  border-color:#ffe6a0;z-index:9}

/* 결과 */
#scResult{aspect-ratio:1/1.06;background:linear-gradient(180deg,#160f26,#0b0714);
  display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:22px}
#scResult.on{display:flex}
#scResult .rc{width:34%;max-height:36%;aspect-ratio:2/3.4;border-radius:12px;border:2px solid rgba(255,210,120,.65);
  background:linear-gradient(160deg,#2a1c5a,#0d1130);display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;box-shadow:0 0 44px rgba(255,200,90,.42);animation:flip .6s}
@keyframes flip{from{transform:rotateY(90deg)}to{transform:rotateY(0)}}
#scResult h2{font-family:'Nanum Myeongjo',serif;color:#ffd98a;margin:14px 0 7px;font-size:1.22rem}
#scResult p{color:#cbc0ea;font-size:.92rem;line-height:1.75;max-width:290px}
#scResult .again{margin-top:16px;background:linear-gradient(180deg,#5a3a9a,#3a2268);color:#efe7ff;
  border:1px solid rgba(170,130,255,.5);border-radius:12px;padding:11px 24px;font-family:inherit;
  font-size:.98rem;cursor:pointer;box-shadow:0 0 20px rgba(120,70,210,.5)}

.hintbar{margin-top:18px;color:#8f83b4;font-size:.83rem;text-align:center;line-height:1.7;max-width:340px}
</style>
</head>
<body>
<div class="topbar">
  <a href="fortune-hub.html">← 운세</a>
  <span class="t">🔮 고양이 타로</span>
  <span class="sp"></span>
</div>

<!-- ① 고양이 대사 + ② 펼침 영상 (한 무대) -->
<div class="screen on" id="scCat">
  <video id="vid" muted playsinline webkit-playsinline preload="auto"></video>
  <div class="still on" id="still"></div>
  <p class="say" id="say"><span class="nm">🐱 점술묘 냐옹</span><span id="sayTxt"></span></p>
  <span class="tapHint" id="tapHint">탭 ▸</span>
</div>

<!-- ③ 클로즈업 카드 선택 -->
<div class="screen" id="scPick">
  <p class="cusay">…끌리는 카드를 하나 골라보라옹</p>
  <div class="fan" id="fan"></div>
  <img class="paws" id="paws" src="img/cat/cat2-paws.webp" alt="" />
</div>

<!-- ④ 결과 -->
<div class="screen" id="scResult">
  <div class="rc" id="rc">🌙</div>
  <h2 id="rname"></h2>
  <p id="rdesc"></p>
  <button class="again" onclick="toPick()">🐾 다시 뽑기</button>
</div>

<p class="hintbar" id="hintbar">화면을 탭하면 고양이가 이야기를 이어간다옹.</p>

<script>
var SPREAD="img/cat/cat2-spread.mp4";
var CAT_IDLE="img/cat/cat2-start.webp";    // 왼쪽 더미 시작 이미지
var vid=document.getElementById("vid"), still=document.getElementById("still"),
    sayBox=document.getElementById("say"), sayTxt=document.getElementById("sayTxt"),
    tapHint=document.getElementById("tapHint"), hintbar=document.getElementById("hintbar"),
    scCat=document.getElementById("scCat"), scPick=document.getElementById("scPick"),
    scResult=document.getElementById("scResult"), fan=document.getElementById("fan");

var LINES=[
 "…어서 오라옹. 밤이 깊었으니 점 보기 딱 좋은 시간이다냥.",
 "무엇이 궁금하냐옹? 마음속으로 딱 하나만 떠올려보라옹.",
 "정했으면 됐다냥. 그럼 이 몸이 카드를 쭈욱— 펼쳐주지."
];
var li=0, phase="talk";   // talk → spread → pick → result

var DECK=[
 ["🌞","태양 — The Sun","숨길 것 없이 다 잘 풀리는 날이다냥.<br>망설이지 말고 나가서 부딪혀보라옹."],
 ["⭐","별 — The Star","오래 바라던 게 슬슬 모양을 갖춘다냥.<br>지금 그 마음, 버리지 말라옹."],
 ["🌙","달 — The Moon","지금 보이는 게 전부가 아니다냥.<br>흐릿한 건 흐릿한 채로 두고 조금 더 기다려보라옹."],
 ["🔮","여사제 — High Priestess","네 직감이 이미 답을 알고 있다냥.<br>남 말보다 네 속을 믿어보라옹."],
 ["🎡","운명의 수레바퀴","곧 판이 한 번 돌아간다냥.<br>지금 자리에 너무 애쓰지 말라옹."],
 ["🗼","탑 — The Tower","무너지는 건 무너져야 할 것이었다냥.<br>붙잡지 말고 손을 놓아보라옹."],
 ["💗","연인 — The Lovers","마음 가는 쪽으로 한 발 내밀어도 좋다냥.<br>재보기만 하다간 놓친다옹."],
 ["🌿","힘 — Strength","세게 밀지 말고 부드럽게 다스리라냥.<br>오늘의 너에겐 그 편이 더 세다옹."],
 ["🏮","은둔자 — The Hermit","잠깐 혼자 있는 시간이 답을 준다냥.<br>불 하나 켜고 네 속을 들여다보라옹."],
 ["💰","별전 — Ace of Coins","작은 기회 하나가 손에 들어온다냥.<br>사소해 보여도 덥석 잡아보라옹."],
 ["🕊️","절제 — Temperance","한쪽으로 쏠리지 말라냥.<br>덜어낼 건 덜고 섞을 건 섞으면 풀린다옹."],
 ["🌟","심판 — Judgement","미뤄둔 걸 매듭지을 때다냥.<br>지난 일에 도장 한 번 쾅 찍고 가라옹."]
];
var GLYPH=["☾","✦","☾","✧","★","☽","✦","✧","☾","★","✦","✧"];

still.style.backgroundImage="url('"+CAT_IDLE+"')";
sayTxt.innerHTML=LINES[0];

// 고양이 무대 어디든 탭하면 대사 진행 → 마지막엔 펼치기
scCat.addEventListener("click", function(){
  if(phase!=="talk") return;
  li++;
  if(li<LINES.length){ sayTxt.innerHTML=LINES[li]; if(li===LINES.length-1) tapHint.textContent="탭하면 펼친다옹 ▸"; }
  else { startSpread(); }
});

function startSpread(){
  phase="spread"; tapHint.style.display="none"; hintbar.textContent="고양이가 앞발로 카드를 펼치는 중…";
  sayBox.style.opacity="0";
  vid.onended=null; vid.onplaying=null; vid.loop=false; vid.src=SPREAD;
  vid.onplaying=function(){ still.classList.remove("on"); };
  vid.onended=function(){ toPick(); };
  var p=vid.play(); if(p&&p.catch) p.catch(function(){ toPick(); });  // 재생 실패해도 진행
  // 안전장치: 영상이 끝 이벤트를 못 주면 6초 후 강제 진행
  setTimeout(function(){ if(phase==="spread") toPick(); }, 6500);
}

function toPick(){
  phase="pick";
  try{ vid.pause(); vid.removeAttribute("src"); vid.load(); }catch(e){}
  scCat.classList.remove("on"); scResult.classList.remove("on");
  buildFan(); scPick.classList.add("on");
  hintbar.textContent="펼쳐진 카드 중 끌리는 한 장을 톡 눌러보라옹.";
}

function buildFan(){
  fan.innerHTML="";
  var n=7, R=190;                     // 반지름(아크)
  for(var i=0;i<n;i++){
    var t=(i/(n-1))-0.5;              // -0.5 ~ 0.5
    var ang=t*54;                     // -27 ~ 27deg
    var rad=ang*Math.PI/180;
    var x=Math.sin(rad)*R, y=-Math.cos(rad)*R + R;   // 아크 좌표
    var b=document.createElement("b");
    b.textContent=GLYPH[i%GLYPH.length];
    b.style.transform="translate("+x+"px,"+(y-70)+"px) rotate("+ang+"deg)";
    b.setAttribute("data-base","translate("+x+"px,"+(y-70)+"px) rotate("+ang+"deg)");
    b.onmouseenter=(function(el,a,px,py){ return function(){
      el.style.transform="translate("+px+"px,"+(py-70-16)+"px) rotate("+a+"deg)"; }; })(b,ang,x,y);
    b.onmouseleave=(function(el){ return function(){ el.style.transform=el.getAttribute("data-base"); }; })(b);
    b.onclick=(function(k){ return function(){ pick(k); }; })(i);
    fan.appendChild(b);
  }
}

function pick(i){
  phase="result";
  var c=DECK[(i*5+3)%DECK.length];
  document.getElementById("rc").textContent=c[0];
  document.getElementById("rname").textContent=c[1];
  document.getElementById("rdesc").innerHTML=c[2];
  scPick.classList.remove("on"); scResult.classList.add("on");
  hintbar.textContent="다른 카드도 궁금하면 다시 뽑아보라옹.";
}
</script>
</body>
</html>
