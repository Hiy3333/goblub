<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>운세 — goblub</title>
  <meta name="description" content="내 사주 하나로 전부 — 오늘의 운세·연애운·재물운·궁합·타로·전생까지" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .profile-badge { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .profile-badge .who { font-size: 1.15rem; }
    .profile-badge .sub { color: var(--ink-soft); font-size: 0.9rem; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .menu-grid a { display: block; background: var(--cream); border-radius: 14px; padding: 16px 14px; text-align: center; }
    .menu-grid a:hover { background: #f4edda; }
    .menu-grid .mi { font-size: 1.8rem; display: block; margin-bottom: 6px; }
    .menu-grid .mt { font-size: 0.98rem; }
    .chew-gob { display: inline-block; animation: gchew 0.18s ease infinite; }
    @keyframes gchew { 50% { transform: rotate(14deg) scale(1.25); } }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <h1>🔮 운세</h1>
      <p>사주 프로필 한 번이면 — 오늘의 운세부터 궁합·타로·전생까지</p>
    </section>

    <section class="panel" id="input-panel">
      <h2>내 사주 프로필 (한 번만!)</h2>
      <div class="field-row">
        <select id="in-year"></select>
        <select id="in-month"></select>
        <select id="in-day"></select>
        <select id="in-hour"><option value="">태어난 시 몰라요</option></select>
        <input type="number" id="in-min" min="0" max="59" value="0" aria-label="분" title="분(0~59)" style="width:62px" />
      </div>
      <div class="opt-row">
        <label><input type="radio" name="gender" value="" checked />성별 안 함</label>
        <label><input type="radio" name="gender" value="M" />남</label>
        <label><input type="radio" name="gender" value="F" />여</label>
        <span style="font-size:0.85rem">(성별은 대운·궁합 풀이에만 쓰여요)</span>
      </div>
      <button class="btn-primary" id="btn-go">프로필 저장하고 운세 보기</button>
      <p class="error-msg" id="err"></p>
      <p class="fine-print" style="text-align:left">프로필은 이 브라우저에만 저장돼요. 서버로 전송되지 않아요.</p>
    </section>

    <section class="panel" id="profile-panel" style="display:none">
      <div class="profile-badge">
        <div>
          <p class="who" id="p-who"></p>
          <p class="sub" id="p-sub"></p>
        </div>
        <button class="btn-ghost" id="btn-edit">수정</button>
      </div>
    </section>

    <div id="result-area" style="display:none">
      <section class="panel">
        <h2 id="r-head"></h2>
        <p id="r-iljin" style="color:var(--ink-soft)"></p>
        <p id="r-mod" style="margin-top:8px; line-height:1.6"></p>
      </section>
      <section class="panel"><h2>🍀 오늘의 총운 <span class="stars" id="s-total"></span></h2><p class="result-desc" id="t-total"></p></section>
      <section class="panel"><h2>💘 오늘의 연애운 <span class="stars" id="s-love"></span></h2><p class="result-desc" id="t-love"></p></section>
      <section class="panel"><h2>💰 오늘의 재물운 <span class="stars" id="s-money"></span></h2><p class="result-desc" id="t-money"></p></section>
      <section class="panel"><h2>📚 오늘의 시험·집중운 <span class="stars" id="s-study"></span></h2><p class="result-desc" id="t-study"></p><div id="study-fix"></div></section>
      <section class="panel"><h2>📆 이번 달의 운세 <span class="stars" id="s-month"></span></h2><p class="result-desc" id="t-month"></p></section>
    </div>

    <section class="panel">
      <h2>🎪 더 깊이 보기</h2>
      <p class="result-desc" style="margin:8px 0 14px">프로필이 저장돼 있으면 어디서든 자동으로 채워져요.</p>
      <div class="menu-grid">
        <a href="saju.html"><span class="mi">🔮</span><span class="mt">사주팔자 심층</span></a>
        <a href="gunghap.html"><span class="mi">💑</span><span class="mt">우리 궁합</span></a>
        <a href="tarot.html"><span class="mi">🃏</span><span class="mt">타로</span></a>
        <a href="cookie.html"><span class="mi">🥠</span><span class="mt">오늘의 포춘쿠키</span></a>
        <a href="today.html"><span class="mi">📅</span><span class="mt">오늘의 사주</span></a>
        <a href="pastlife.html"><span class="mi">🌀</span><span class="mt">전생 대환장 파티</span></a>
      </div>
    </section>

    <p class="fine-print">운세는 재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/saju.js"></script>
  <script src="js/fortune.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/feed.js"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      var data = null;

      var y = $("in-year"), m = $("in-month"), d = $("in-day"), h = $("in-hour");
      for (var i = 2100; i >= 1900; i--) y.add(new Option(i + "년", i));
      y.value = 1995;
      for (i = 1; i <= 12; i++) m.add(new Option(i + "월", i));
      for (i = 1; i <= 31; i++) d.add(new Option(i + "일", i));
      for (i = 0; i <= 23; i++) h.add(new Option(i + "시", i));

      function showErr(msg) { var e = $("err"); e.textContent = msg; e.style.display = "block"; }
      function stars(n) { return "★★★★★".slice(0, n) + "☆☆☆☆☆".slice(0, 5 - n); }

      // 시험운이 나쁘면(≤2) 고블럽이 나쁜 기운을 씹어먹고 반전 운세로 바꿔줌
      function eatBadStudy(btn, f) {
        var bodyEl = $("t-study");
        var gob = window.GoblubArt ? GoblubArt.svg(32) : "👾";
        var m = document.createElement("span");
        m.className = "chew-gob";
        m.innerHTML = gob;
        btn.replaceWith(m);
        var text = bodyEl.textContent, i = text.length;
        var eat = setInterval(function () {
          i = Math.max(0, i - 3);
          bodyEl.textContent = text.slice(0, i);
          if (i <= 0) {
            clearInterval(eat);
            m.classList.remove("chew-gob");
            m.innerHTML = gob + ' <b style="color:var(--purple)">냠— 나쁜 기운 꿀꺽!</b>';
            setTimeout(function () {
              var fix = f.study.fix, j = 0;
              var typeIn = setInterval(function () {
                j += 2;
                bodyEl.textContent = fix.slice(0, j);
                if (j >= fix.length) {
                  clearInterval(typeIn);
                  $("s-study").textContent = stars(Math.min(5, f.study.score + 2)) + "✨";
                  m.innerHTML = gob + ' <b style="color:var(--purple)">반짝반짝 새 기운으로 바꿔놨어요! ✨</b>';
                }
              }, 26);
            }, 450);
          }
        }, 26);
      }

      function fillForm(p) {
        y.value = p.y; m.value = p.m; d.value = p.d;
        h.value = p.hour == null ? "" : p.hour;
        if (p.min) $("in-min").value = p.min;
        var g = document.querySelector('input[name="gender"][value="' + (p.gender || "") + '"]');
        if (g) g.checked = true;
      }

      function show(birth) {
        var f = Fortune.get(data, birth, new Date());
        var tt = Saju.pillarText(f.today.pillars.day);
        var meT = Saju.pillarText(f.me.pillars.day);
        var now = new Date();

        // 프로필 요약 배지
        $("p-who").textContent = meT.hanja + " " + meT.hangul + "일주 · " + f.me.zodiac + "띠";
        $("p-sub").textContent = birth.y + "년 " + birth.m + "월 " + birth.d + "일" +
          (birth.hour != null ? " " + birth.hour + "시" : "") +
          (birth.gender === "M" ? " · 남" : birth.gender === "F" ? " · 여" : "") +
          " · " + f.me.strength.label;

        $("r-head").textContent = (now.getMonth() + 1) + "월 " + now.getDate() + "일, " +
          birth.y + "년생 " + f.me.zodiac + "띠님의 운세";
        $("r-iljin").textContent = "오늘의 일진: " + tt.hanja + " (" + tt.hangul + ")";
        $("r-mod").textContent = f.modMsg || "";
        $("r-mod").style.display = f.modMsg ? "block" : "none";
        $("s-total").textContent = stars(f.total.score); $("t-total").textContent = f.total.text;
        $("s-love").textContent = stars(f.love.score); $("t-love").textContent = f.love.text;
        $("s-money").textContent = stars(f.money.score); $("t-money").textContent = f.money.text;
        $("s-study").textContent = stars(f.study.score); $("t-study").textContent = f.study.text;
        $("s-month").textContent = stars(f.month.score); $("t-month").textContent = f.month.text;

        var fixArea = $("study-fix");
        fixArea.innerHTML = "";
        if (f.study.score <= 2) {
          var eatBtn = document.createElement("button");
          eatBtn.className = "btn-primary";
          eatBtn.style.marginTop = "12px";
          eatBtn.textContent = "🌀 고블럽 소환 — 나쁜 기운 씹어먹기";
          eatBtn.onclick = function () { eatBadStudy(eatBtn, f); };
          fixArea.appendChild(eatBtn);
        }

        $("input-panel").style.display = "none";
        $("profile-panel").style.display = "block";
        $("result-area").style.display = "block";
        if (window.GoblubFeed) GoblubFeed.grant("fortune");
      }

      fetch("data/saju-terms.json")
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function (dd) {
          data = dd;
          var p = GoblubProfile.get();
          if (p) { fillForm(p); show(p); }
        })
        .catch(function () { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); });

      $("btn-go").onclick = function () {
        $("err").style.display = "none";
        if (!data) { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); return; }
        var yy = +y.value, mm = +m.value, dd2 = +d.value;
        var date = new Date(yy, mm - 1, dd2);
        if (date.getFullYear() !== yy || date.getMonth() !== mm - 1 || date.getDate() !== dd2) {
          showErr("없는 날짜예요. 다시 확인해주세요!"); return;
        }
        var gender = document.querySelector('input[name="gender"]:checked').value;
        var min = h.value === "" ? 0 : Math.min(59, Math.max(0, +($("in-min").value || 0)));
        var birth = { y: yy, m: mm, d: dd2, hour: h.value === "" ? null : +h.value, min: min, gender: gender };
        GoblubProfile.set(birth);
        show(birth);
      };

      $("btn-edit").onclick = function () {
        $("result-area").style.display = "none";
        $("profile-panel").style.display = "none";
        $("input-panel").style.display = "block";
      };
    })();
  </script>
</body>
</html>
