  <style>
    .cookie-stage { text-align: center; padding: 10px 0 4px; }
    .cookie { font-size: 6.4rem; line-height: 1.1; cursor: pointer; display: inline-block; transition: transform 0.18s; }
    .cookie:hover { transform: scale(1.08) rotate(-4deg); }
    .cookie.crack { animation: cookie-crack 0.6s ease forwards; pointer-events: none; }
    @keyframes cookie-crack {
      0% { transform: rotate(0); } 18% { transform: rotate(-9deg) scale(1.04); }
      38% { transform: rotate(9deg) scale(1.12); } 58% { transform: rotate(-7deg) scale(1.08); }
      100% { transform: scale(0.2) rotate(6deg); opacity: 0; } }
    .crack-hint { color: var(--ink-soft); margin-top: 8px; }
    .crumb { position: absolute; font-size: 1.2rem; opacity: 0; pointer-events: none; }
    .crumb.go { animation: crumb 0.7s ease forwards; }
    @keyframes crumb { 0% { opacity: 1; transform: translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.4); } }
    .slip { max-width: 440px; margin: 6px auto 0; background: var(--surface); border: 2px dashed var(--line); border-radius: 16px; padding: 24px 22px; opacity: 0; }
    .slip.show { opacity: 1; animation: slip-in 0.5s ease; }
    @keyframes slip-in { from { transform: translateY(14px) scale(0.96); } to { transform: none; } }
    .fortune { font-size: 1.2rem; line-height: 1.7; color: var(--ink); }
    .lucky { margin-top: 14px; color: var(--ink-soft); font-size: 0.95rem; line-height: 1.7; }
    @media (prefers-reduced-motion: reduce) { .cookie.crack, .slip.show, .crumb.go { animation-duration: 0.01s !important; } }
  </style>
</head>

    </section>

      function hash(s) { var h = 5381; for (var i = 0; i < s.length; i++) h = ((h << 5) + h + s.charCodeAt(i)) | 0; return h >>> 0; }

      var charm = CHARMS[Math.floor(seed / 7) % CHARMS.length];
      var soul = SOULFOODS[Math.floor(seed / 13) % SOULFOODS.length];

          (function (c) { setTimeout(function () { c.classList.add("go"); }, 120); setTimeout(function () { c.remove(); }, 1000); })(c);

        $("cookie").style.display = "none";
        $("fortune").textContent = "🥠 " + fortune;

        $("again").style.display = "block";

      try { opened = !!localStorage.getItem(dk); } catch (e) {}

        $("hint").style.display = "none";
        reveal();
      } else {
        function crack() {
          if ($("cookie").classList.contains("crack")) return;
          try { localStorage.setItem(dk, "1"); } catch (e) {}
          if (window.GoblubFeed) GoblubFeed.grant("cookie");
          $("hint").style.display = "none";
          $("cookie").classList.add("crack");
          crumbs();
          setTimeout(reveal, 600);
        }
        $("cookie").onclick = crack;
