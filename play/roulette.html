<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>복불복 룰렛 — goblub</title>
  <meta name="description" content="벌칙, 점심 메뉴, 청소 당번까지 — 빙글빙글 룰렛으로 정해버리자" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass3" />
  <style>
    .item-row { display:flex; gap:8px; margin-bottom:8px; }
    .item-row .idx { width:26px; flex:none; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-size:0.9rem; }
    .item-input { flex:1; min-width:0; font-family:inherit; font-size:0.98rem; padding:10px 12px; border:2px solid var(--line); border-radius:10px; background:var(--surface); color:var(--ink); }
    .item-input:focus { outline:none; border-color:var(--sky); box-shadow:0 0 10px color-mix(in srgb, var(--sky) 40%, transparent); }
    .item-del { width:42px; flex:none; background:var(--cream); border:1.5px solid var(--line); border-radius:10px; color:var(--ink-soft); font-size:1.3rem; line-height:1; cursor:pointer; }
    .item-del:hover:not(:disabled) { border-color:var(--coral); color:var(--coral); }
    .item-del:disabled { opacity:0.35; cursor:default; }
    #btn-add { width:100%; margin:4px 0 4px; }
    #btn-add:disabled { opacity:0.45; cursor:default; }
    .preset-row { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:12px; }
    .err-msg { text-align:center; color:var(--coral); font-weight:bold; margin:8px 0; }
    .wheel-wrap { position:relative; width:320px; max-width:84vw; aspect-ratio:1/1; margin:18px auto 8px; }
    .wheel-spin { width:100%; height:100%; transition: transform 4.2s cubic-bezier(.15,.86,.28,1); transform-origin:50% 50%; }
    .wheel-spin svg { width:100%; height:100%; display:block; }
    .wheel-pointer { position:absolute; top:-4px; left:50%; transform:translateX(-50%); font-size:2rem; z-index:3;
      color:var(--ink); filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); line-height:1; }
    .wheel-hub { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:48px; height:48px; border-radius:50%;
      background:var(--surface); box-shadow:0 2px 8px rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; font-size:1.5rem; z-index:2; }
    .wheel-empty { text-align:center; color:var(--ink-soft); padding:40px 0; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <h1>🎡 복불복 룰렛</h1>
      <p>벌칙, 점심 메뉴, 청소 당번까지 — 빙글빙글 돌려서 정해버리자</p>
    </section>

    <section class="panel">
      <h2 style="text-align:center">항목을 정하고 돌려보세요</h2>
      <div class="preset-row">
        <button class="btn-ghost" id="preset-1">🍗 벌칙</button>
        <button class="btn-ghost" id="preset-2">🍽 점심 메뉴</button>
        <button class="btn-ghost" id="preset-3">🧹 청소 당번</button>
      </div>
      <div id="item-list"></div>
      <button class="btn-ghost" id="btn-add" type="button">＋ 항목 추가</button>
      <p class="fine-print" style="text-align:center; margin:2px 0 0">칸에 하나씩 입력해요 (2~12개)</p>
      <p class="err-msg" id="err" style="display:none"></p>

      <div class="wheel-wrap" id="wheel-wrap">
        <span class="wheel-pointer">▼</span>
        <div class="wheel-spin" id="wheel-spin"><div class="wheel-empty" id="wheel-empty">항목을 넣고 돌려보세요 🎡</div></div>
        <span class="wheel-hub">🎯</span>
      </div>

      <div class="result-actions">
        <button class="btn-primary" id="btn-spin">🎡 돌리기!</button>
      </div>

      <div id="result-box" style="display:none; text-align:center; margin-top:14px">
        <span class="result-emoji">🎯</span>
        <p class="result-name" id="result-name"></p>
        <p class="fine-print" id="result-line"></p>
      </div>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=3" data-root=".."></script>
  <script src="js/feed.js?v=4"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      var SVGNS = "http://www.w3.org/2000/svg";
      var COLS = ["#ffb3b3", "#ffe79a", "#a9e3af", "#a8c8ff", "#dcbcff", "#ffcaa3",
        "#9fe0e0", "#f7bcda", "#cfe08f", "#f2a8a8", "#bcd2f2", "#efc9a0"];

      var PRESETS = {
        1: ["꿀밤 한 대", "애교 부리기", "다음 판 사기", "아무 노래 부르기", "물 원샷", "벌칙 면제!", "칭찬하기", "셀카 인증"],
        2: ["김밥", "라면", "국밥", "돈까스", "마라탕", "햄버거", "파스타", "아무거나"],
        3: ["설거지", "분리수거", "화장실", "바닥 쓸기", "오늘은 쉼", "걸레질"]
      };
      var MIN = 2, MAX = 12;
      var list = $("item-list");

      function rows() { return list.querySelectorAll(".item-row"); }
      function updateUI() {
        var n = rows().length;
        Array.prototype.forEach.call(list.querySelectorAll(".item-del"), function (b) { b.disabled = n <= MIN; });
        Array.prototype.forEach.call(list.querySelectorAll(".idx"), function (el, i) { el.textContent = (i + 1); });
        $("btn-add").disabled = n >= MAX;
      }
      function addRow(value) {
        if (rows().length >= MAX) return;
        var row = document.createElement("div"); row.className = "item-row";
        var idx = document.createElement("span"); idx.className = "idx";
        var inp = document.createElement("input"); inp.type = "text"; inp.className = "item-input";
        inp.maxLength = 20; inp.placeholder = "항목 입력"; inp.value = value || "";
        inp.addEventListener("input", build);
        var del = document.createElement("button"); del.type = "button"; del.className = "item-del";
        del.textContent = "−"; del.setAttribute("aria-label", "삭제");
        del.onclick = function () { if (rows().length > MIN) { row.remove(); updateUI(); build(); } };
        row.appendChild(idx); row.appendChild(inp); row.appendChild(del);
        list.appendChild(row);
        updateUI();
      }
      function setItems(arr) {
        list.innerHTML = "";
        var vals = (arr && arr.length) ? arr.slice(0, MAX) : ["", "", ""];
        while (vals.length < MIN) vals.push("");
        vals.forEach(function (v) { addRow(v); });
        build();
      }
      $("btn-add").onclick = function () { addRow(""); build(); };
      $("preset-1").onclick = function () { setItems(PRESETS[1]); };
      $("preset-2").onclick = function () { setItems(PRESETS[2]); };
      $("preset-3").onclick = function () { setItems(PRESETS[3]); };

      function readItems() {
        return Array.prototype.map.call(list.querySelectorAll(".item-input"), function (i) { return i.value.trim(); })
          .filter(function (s) { return s.length > 0; }).slice(0, MAX);
      }
      function showErr(m) { var e = $("err"); e.textContent = m; e.style.display = "block"; }
      function hideErr() { $("err").style.display = "none"; }

      var cx = 100, cy = 100, r = 96, rotation = 0;
      function P(a, rad) { var t = a * Math.PI / 180; return [cx + rad * Math.sin(t), cy - rad * Math.cos(t)]; }

      // 긴 항목을 조각 안에 다 들어가게 줄바꿈(공백 우선, 긴 단어는 강제 분할)
      function wrapLabel(text, maxLen, maxLines) {
        var words = text.split(/\s+/).filter(Boolean), lines = [], cur = "";
        words.forEach(function (w) {
          while (w.length > maxLen) { if (cur) { lines.push(cur); cur = ""; } lines.push(w.slice(0, maxLen)); w = w.slice(maxLen); }
          if (!cur) cur = w;
          else if ((cur + " " + w).length <= maxLen) cur += " " + w;
          else { lines.push(cur); cur = w; }
        });
        if (cur) lines.push(cur);
        if (lines.length > maxLines) { lines = lines.slice(0, maxLines); lines[maxLines - 1] = lines[maxLines - 1].slice(0, maxLen - 1) + "…"; }
        return lines.length ? lines : [""];
      }

      function build() {
        var items = readItems();
        var wrap = $("wheel-spin");
        if (items.length < 2) { wrap.innerHTML = '<div class="wheel-empty" id="wheel-empty">항목을 2개 이상 넣어보세요 🎡</div>'; return null; }
        var n = items.length, seg = 360 / n;
        var fs = n > 9 ? 7 : n > 6 ? 8.5 : 10;
        var svg = document.createElementNS(SVGNS, "svg");
        svg.setAttribute("viewBox", "0 0 200 200");
        for (var i = 0; i < n; i++) {
          var a1 = i * seg, a2 = (i + 1) * seg, p1 = P(a1, r), p2 = P(a2, r);
          var large = seg > 180 ? 1 : 0;
          var path = document.createElementNS(SVGNS, "path");
          path.setAttribute("d", "M" + cx + " " + cy + " L" + p1[0].toFixed(2) + " " + p1[1].toFixed(2) +
            " A" + r + " " + r + " 0 " + large + " 1 " + p2[0].toFixed(2) + " " + p2[1].toFixed(2) + " Z");
          path.setAttribute("fill", COLS[i % COLS.length]);
          path.setAttribute("stroke", "#17103e"); path.setAttribute("stroke-width", "1.5");
          svg.appendChild(path);
          var am = a1 + seg / 2, lp = P(am, r * 0.6);
          var maxLen = n > 8 ? 4 : n > 6 ? 5 : 6;
          var lines = wrapLabel(items[i], maxLen, 3);
          var lineH = fs * 1.12;
          var t = document.createElementNS(SVGNS, "text");
          t.setAttribute("x", lp[0].toFixed(2)); t.setAttribute("y", lp[1].toFixed(2));
          t.setAttribute("font-size", fs); t.setAttribute("font-family", "Jua, sans-serif");
          t.setAttribute("fill", "#38352f"); t.setAttribute("text-anchor", "middle");
          t.setAttribute("dominant-baseline", "central");
          var rot = (am > 90 && am < 270) ? am + 180 : am;
          t.setAttribute("transform", "rotate(" + rot.toFixed(1) + " " + lp[0].toFixed(2) + " " + lp[1].toFixed(2) + ")");
          for (var k = 0; k < lines.length; k++) {
            var ts = document.createElementNS(SVGNS, "tspan");
            ts.setAttribute("x", lp[0].toFixed(2));
            ts.setAttribute("dy", (k === 0 ? -(lines.length - 1) / 2 * lineH : lineH).toFixed(2));
            ts.textContent = lines[k];
            t.appendChild(ts);
          }
          svg.appendChild(t);
        }
        wrap.innerHTML = ""; wrap.appendChild(svg);
        wrap.style.transform = "rotate(" + rotation + "deg)";
        return items;
      }

      var LINES = ["고블럽의 선택은…!", "운명은 이미 정해졌습니다.", "이의 제기는 받지 않습니다!", "짜잔, 이걸로 결정!"];
      function showResult(text) {
        $("result-name").textContent = "🎯 " + text;
        $("result-line").textContent = LINES[Math.floor(Math.random() * LINES.length)];
        $("result-box").style.display = "block";
      }

      function spin() {
        hideErr(); $("result-box").style.display = "none";
        var items = build();
        if (!items) { showErr("항목을 2개 이상 적어주세요!"); return; }
        var btn = $("btn-spin"); btn.disabled = true;
        if (window.GoblubFeed) GoblubFeed.grant("roulette");
        var n = items.length, seg = 360 / n, winner = Math.floor(Math.random() * n);
        var want = (360 - (winner + 0.5) * seg) % 360;
        var jitter = (Math.random() - 0.5) * seg * 0.55;   // 살짝 비껴 멈추게(같은 칸 안)
        var cur = ((rotation % 360) + 360) % 360;
        var delta = (((want - cur + jitter) % 360) + 360) % 360;
        rotation += 360 * 6 + delta;                        // 6바퀴+
        $("wheel-spin").style.transform = "rotate(" + rotation + "deg)";
        setTimeout(function () { showResult(items[winner]); btn.disabled = false; }, 4300);
      }

      $("btn-spin").onclick = spin;
      setItems(); // 기본 3칸
    })();
  </script>
</body>
</html>
