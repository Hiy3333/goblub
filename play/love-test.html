<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연애세포 테스트 — goblub</title>
  <meta name="description" content="10가지 상황으로 보는 나의 연애 세포 — 밀당·직진·집착·모솔·츤데레·헌신" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=nb1" />
  <style>
    .tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 14px 0 4px; }
    .tag { background: var(--cream); border: 1.5px solid var(--line); border-radius: 999px; padding: 5px 12px; font-size: 0.9rem; color: var(--ink-soft); }
    .match-line { margin-top: 12px; color: var(--ink-soft); }
  </style>
</head>
<body class="nb">
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=5" data-root=".."></script>
  <script src="js/feed.js?v=4"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var CELLS = {
      mildang:  { emoji:"🎭", name:"밀당세포 우세형", short:"밀당세포", tags:["밀당의고수","여유로운척","답장은계산","티안내기달인"], desc:"좋아하면서도 절대 티 안 내죠. 여유로운 미소 뒤에서 답장 타이밍을 계산하는 당신… 근데 상대도 밀당 중이면 둘 다 평생 썸만 탑니다.", match:"tsundere", clash:"jikjin" },
      jikjin:   { emoji:"🚀", name:"직진세포 우세형", short:"직진세포", tags:["좋으면돌격","고백선빵","화끈본능","재고안따짐"], desc:"좋으면 바로 고백, 재고 따지는 시간에 이미 손 잡고 있음. 화끈해서 좋지만 상대가 아직 준비 안 됐을 땐 혼자 앞서가다 넘어지기도 합니다.", match:"mosol",    clash:"mildang" },
      jipchak:  { emoji:"🔗", name:"집착세포 우세형", short:"집착세포", tags:["사랑하면올인","읽씹은고문","애정과다","24시간연결"], desc:"사랑하면 올인, 읽씹 3분만 넘어가도 심장이 쿵. 애정이 넘치는 건 매력이지만 가끔은 상대에게 숨 쉴 틈도 좀 줘야 오래갑니다.", match:"heonsin",  clash:"jikjin" },
      mosol:    { emoji:"🌱", name:"모솔세포 우세형", short:"모솔세포", tags:["상상은결혼까지","실전은0","설렘만렙","표현법몰라"], desc:"머릿속 시뮬레이션은 이미 결혼까지 갔는데 현실은 대화 시작도 못 함. 상상력 하나는 국가대표급이니 이제 실전 배치만 하면 됩니다.", match:"jikjin",   clash:"jipchak" },
      tsundere: { emoji:"🐱", name:"츤데레세포 우세형", short:"츤데레세포", tags:["좋아할수록퉁명","속마음은반대","냉정한척","다들킴"], desc:"좋아할수록 말이 퉁명스러워지는 신기한 회로. 본인은 '냉정한 척'이라 믿지만 주변 사람들은 이미 다 눈치챘습니다.", match:"mildang", clash:"heonsin" },
      heonsin:  { emoji:"💝", name:"헌신세포 우세형", short:"헌신세포", tags:["다퍼주는사랑","상대가1순위","기념일수호신","나도좀챙겨"], desc:"사랑하면 다 퍼주는 타입, 상대 기념일이 내 기념일보다 중요. 마음은 참 예쁜데, 나 자신도 좀 챙기면서 사랑해도 됩니다.", match:"jipchak",  clash:"tsundere" }
    };
    var ORDER = ["mildang","jikjin","jipchak","mosol","tsundere","heonsin"];

    var QUESTIONS = [
      { q: "수상한 앱 알림: '짝사랑 상대가 3시간 뒤 당신에 대한 기억을 전부 잃습니다.' 지금 나는?", choices: [
        { text: "신발도 짝짝이로 신고 이미 뛰쳐나감 — 고백은 지금뿐", scores: { jikjin: 2 } },
        { text: "오히려 좋아. 기억 리셋되면 첫인상부터 다시 설계한다", scores: { mildang: 2 } },
        { text: "고백 대사 시뮬레이션 돌리다가 3시간 순삭", scores: { mosol: 2 } },
        { text: "'잃든가 말든가' 중얼거리며 알림만 서른 번 확인", scores: { tsundere: 2 } } ] },
      { q: "썸 상대가 좀비가 됐다. 근데 이상하게 나만 보면 얌전해진다. 당신의 선택은?", choices: [
        { text: "매일 도시락(?) 싸들고 곁을 지킴 — 좀비여도 내 사람", scores: { heonsin: 2 } },
        { text: "물리기 전에 고백부터. '좀비인 너도 좋아!'", scores: { jikjin: 2 } },
        { text: "오히려 좋아… 이제 아무도 못 뺏어가", scores: { jipchak: 2 } },
        { text: "일부러 하루는 안 가봄. 좀비도 애가 타야 하는 법", scores: { mildang: 2 } } ] },
      { q: "연애의 신 등장. '짝사랑 속마음 1분 열람권 vs 내 매력 2배 물약, 하나만 골라라.'", choices: [
        { text: "열람권! 1분 안에 스크롤 광클해서 통째로 외운다", scores: { jipchak: 2 } },
        { text: "속마음 봤다가 상처받을까 봐… 둘 다 정중히 거절", scores: { mosol: 2 } },
        { text: "물약 원샷하고 그 길로 직진", scores: { jikjin: 2 } },
        { text: "'딱히 필요 없거든?' 하며 물약을 슬쩍 주머니에", scores: { tsundere: 2 } } ] },
      { q: "데이트 중 갑자기 세상의 시간이 멈췄다. 나만 움직일 수 있다!", choices: [
        { text: "멈춘 상대 얼굴에 드는 햇빛을 손으로 가려주며 기다림", scores: { heonsin: 2 } },
        { text: "이때다! 상대 폰을 열어 내 카톡방 지분율 확인", scores: { jipchak: 2 } },
        { text: "지금은 안 떨려! 멈춘 상대 앞에서 고백 리허설 27회", scores: { mosol: 2 } },
        { text: "시간이 풀리기 직전, 멀리서 쿨하게 걸어오는 각도 세팅", scores: { mildang: 2 } } ] },
      { q: "짝사랑 상대가 내 폰을 주웠다. 배경화면이 하필 그 사람 사진. 현장 발각!", choices: [
        { text: "'동명이인이야.' 세상 무심한 얼굴로 폰만 회수", scores: { tsundere: 2 } },
        { text: "배경화면이 문제가 아니다. 전용 폴더 200장을 들켰는지가 관건", scores: { jipchak: 2 } },
        { text: "그 자리에서 영혼 이탈. 귀가 후 이사 매물 검색", scores: { mosol: 2 } },
        { text: "'어 맞아, 너야. 그래서 말인데 나랑 사귈래?'", scores: { jikjin: 2 } } ] },
      { q: "연애세포 정기검진 결과가 나왔다. 의사 고블럽이 처방전을 내민다. 내 처방은?", choices: [
        { text: "'적당히 튕기기' 스킬 — 이미 만렙이라 정중히 반납", scores: { mildang: 2 } },
        { text: "'퍼주기 억제제' — 처방받고 나오는 길에 상대 것까지 결제", scores: { heonsin: 2 } },
        { text: "'일단 사람 만나기' 기초 수강권 3개월", scores: { mosol: 2 } },
        { text: "'솔직해지는 약' — 복용 거부하고 병원에도 츤츤거림", scores: { tsundere: 2 } } ] },
      { q: "100일 기념일. 연인이 준 선물이 '반품 불가 초대형 곰인형(내 얼굴 프린팅)'이다.", choices: [
        { text: "감동의 눈물… 나도 월급 갈아서 보답 선물 3종 세트 준비", scores: { heonsin: 2 } },
        { text: "'이딴 걸 왜 사?' 하면서 평생 소장 + 매일 끌어안고 잠듦", scores: { tsundere: 2 } },
        { text: "좋은 아이디어다. 나도 상대 얼굴 프린팅 이불 제작 주문", scores: { jipchak: 2 } },
        { text: "고맙지만 리액션은 70%만. 다음 선물이 더 커져야 하니까", scores: { mildang: 2 } } ] },
      { q: "연인 폰에 '헬스장 김코치❤️' 라는 이름이 떠 있다. 나의 대응은?", choices: [
        { text: "3분 만에 김코치 SNS·나이·담당 지점까지 특정 완료", scores: { jipchak: 2 } },
        { text: "그 자리에서 화면 가리키며 '이거 뭐야?' 정면 돌파", scores: { jikjin: 2 } },
        { text: "'안 궁금해.' (그날 밤 침대에서 천장만 3시간 응시)", scores: { tsundere: 2 } },
        { text: "…까지 상상하다 현타. 나는 아직 연인이 없다", scores: { mosol: 2 } } ] },
      { q: "외계인이 지구 연애 문화 조사를 위해 나를 납치했다. '사랑이 무엇인가?' 내 대답은?", choices: [
        { text: "'다 퍼주고도 더 못 줘서 미안한 것'", scores: { heonsin: 2 } },
        { text: "'줄다리기. 당길 때와 풀 때를 아는 예술'", scores: { mildang: 2 } },
        { text: "'생각나면 이미 그 사람 앞에 서 있는 것'", scores: { jikjin: 2 } },
        { text: "'저도… 책으로만 배웠습니다(안경 고쳐 씀)'", scores: { mosol: 2 } } ] },
      { q: "인생 연애 시뮬레이션 게임이 끝났다. 엔딩 크레딧에 뜬 내 플레이 기록은?", choices: [
        { text: "'최단 루트 클리어 — 만남에서 고백까지 3일'", scores: { jikjin: 2 } },
        { text: "'호감도 조절의 장인 — 세이브/로드 200회'", scores: { mildang: 2 } },
        { text: "'호감도 999 초과로 시스템 오류 발생'", scores: { jipchak: 2 } },
        { text: "'선물하기 버튼 과다 사용으로 파산 엔딩'", scores: { heonsin: 2 } } ] }
    ];

    function renderResult(totals, el, api) {
      var key = Quiz.top(totals, ORDER);
      var r = CELLS[key];
      var tagsHtml = '<div class="tags">' + r.tags.map(function (t) { return '<span class="tag">#' + t + '</span>'; }).join("") + '</div>';

      el.innerHTML =
        '<span class="result-emoji">' + r.emoji + "</span>" +
        '<p class="result-name">' + r.name + "</p>" +
        '<p class="result-desc">' + r.desc + "</p>" + tagsHtml +
        '<p class="match-line">💞 환상의 짝꿍세포: <b>' + CELLS[r.match].short + "</b> &nbsp;·&nbsp; ⚡ 상극세포: <b>" + CELLS[r.clash].short + "</b></p>" +
        '<div id="card-slot"></div>' +
        '<div class="result-actions">' +
        '<button class="btn-primary" id="qz-retry">다시하기</button>' +
        '<button class="btn-ghost" id="qz-share">링크 복사</button></div>';

      el.querySelector("#card-slot").appendChild(ShareCard.render({
        palette: "coral", emoji: r.emoji, badge: "연애세포 테스트 결과", title: r.name,
        lines: [r.desc, "#" + r.tags.slice(0, 3).join(" #")]
      }));
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#qz-share").onclick = function () { api.shareLink(el.querySelector("#qz-share")); };
      if (window.GoblubFeed && GoblubFeed.record) GoblubFeed.record("love", { emoji: r.emoji, title: (r.short || r.name), tags: r.tags });
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "💘", title: "연애세포 테스트",
      intro: "당신의 연애를 좌우하는 6가지 세포. 10가지 상황 속 선택으로 내 안의 우세 세포를 찾아봐요!",
      feedSrc: "love", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
