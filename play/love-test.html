<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 안의 연애세포 회의 — goblub</title>
  <meta name="description" content="내 안의 연애세포들이 회의를 연다 — 우세 세포로 보는 나의 연애 본능" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .cell-bars { margin: 18px 0 6px; }
    .cell-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.95rem; }
    .cell-row .nm { width: 92px; flex: none; }
    .cell-row .track { flex: 1; background: #efe9db; border-radius: 999px; height: 14px; overflow: hidden; }
    .cell-row .fill { height: 14px; border-radius: 999px; background: linear-gradient(90deg, var(--coral), var(--purple)); }
    .cell-row .pct { width: 42px; flex: none; text-align: right; color: var(--ink-soft); }
    .match-line { margin-top: 10px; color: var(--ink-soft); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/feed.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var CELLS = {
      mildang:  { emoji:"🎭", name:"밀당세포 우세형", desc:"좋아하면서도 절대 티 안 내죠. 여유로운 미소 뒤에서 답장 타이밍을 계산하는 당신… 근데 상대도 밀당 중이면 둘 다 평생 썸만 탑니다.", match:"tsundere", clash:"jikjin" },
      jikjin:   { emoji:"🚀", name:"직진세포 우세형", desc:"좋으면 바로 고백, 재고 따지는 시간에 이미 손 잡고 있음. 화끈해서 좋지만 상대가 아직 준비 안 됐을 땐 혼자 앞서가다 넘어지기도 합니다.", match:"mosol",    clash:"mildang" },
      jipchak:  { emoji:"🔗", name:"집착세포 우세형", desc:"사랑하면 올인, 읽씹 3분만 넘어가도 심장이 쿵. 애정이 넘치는 건 매력이지만 가끔은 상대에게 숨 쉴 틈도 좀 줘야 오래갑니다.", match:"heonsin",  clash:"jikjin" },
      mosol:    { emoji:"🌱", name:"모솔세포 우세형", desc:"머릿속 시뮬레이션은 이미 결혼까지 갔는데 현실은 대화 시작도 못 함. 상상력 하나는 국가대표급이니 이제 실전 배치만 하면 됩니다.", match:"jikjin",   clash:"jipchak" },
      tsundere: { emoji:"🐱", name:"츤데레세포 우세형", desc:"좋아할수록 말이 퉁명스러워지는 신기한 회로. 본인은 '냉정한 척'이라 믿지만 주변 사람들은 이미 다 눈치챘습니다.", match:"mildang", clash:"heonsin" },
      heonsin:  { emoji:"💝", name:"헌신세포 우세형", desc:"사랑하면 다 퍼주는 타입, 상대 기념일이 내 기념일보다 중요. 마음은 참 예쁜데, 나 자신도 좀 챙기면서 사랑해도 됩니다.", match:"jipchak",  clash:"tsundere" }
    };
    var ORDER = ["mildang","jikjin","jipchak","mosol","tsundere","heonsin"];

    var QUESTIONS = [
      { q: "썸남에게 카톡이 왔다. 회의실이 술렁인다. 내 손가락은?", choices: [
        { text: "일부러 30분 뒤에 답장", scores: { mildang: 2 } },
        { text: "1초 컷 '나도 방금 생각했어!'", scores: { jikjin: 2, heonsin: 1 } },
        { text: "답장 열 번 썼다 지웠다", scores: { mosol: 2 } },
        { text: "'ㅇㅇ' 짧게 치고 심장은 두근", scores: { tsundere: 2 } } ] },
      { q: "상대가 읽고 답이 없다. 30분째. 나는?", choices: [
        { text: "프사·상메 전부 스캔 시작", scores: { jipchak: 2 } },
        { text: "쿨하게 내 할 일 함(속은 탐)", scores: { mildang: 1, tsundere: 2 } },
        { text: "'바쁜가 보다' 하고 진짜 잊음", scores: { mosol: 2 } },
        { text: "먼저 재밌는 짤 하나 더 보냄", scores: { jikjin: 2, heonsin: 1 } } ] },
      { q: "짝사랑 상대와 우연히 엘리베이터 단둘이. 회의 소집!", choices: [
        { text: "심장 터질 것 같아 층수 버튼만 응시", scores: { mosol: 2 } },
        { text: "괜히 무심한 척 딴 데 봄", scores: { tsundere: 2 } },
        { text: "'저희 어디서 뵀죠?' 먼저 말 걺", scores: { jikjin: 2 } },
        { text: "내릴 때까지 곁눈질로 관찰", scores: { jipchak: 1, mildang: 2 } } ] },
      { q: "소개팅 상대가 마음에 든다. 다음 만남 언제 잡지?", choices: [
        { text: "그 자리에서 바로 다음 약속 잡기", scores: { jikjin: 2, heonsin: 1 } },
        { text: "며칠 텀 두고 연락(궁금하게 만들기)", scores: { mildang: 2 } },
        { text: "상대가 먼저 물어볼 때까지 기다림", scores: { tsundere: 1, mosol: 2 } },
        { text: "약속 잡고 나서부터 매일 연락", scores: { jipchak: 2 } } ] },
      { q: "연인이 친구들이랑 밤늦게까지 논다고 연락 뜸하다. 나는?", choices: [
        { text: "'재밌게 놀아~' 쿨한 척 보내놓고 시계만 봄", scores: { tsundere: 2, mildang: 1 } },
        { text: "몇 시에 끝나는지, 누구랑 있는지 확인 또 확인", scores: { jipchak: 2 } },
        { text: "야식 사다 놓고 기다리는 편", scores: { heonsin: 2 } },
        { text: "나도 내 할 일 하며 신경 안 씀", scores: { mosol: 1, mildang: 1 } } ] },
      { q: "고백 타이밍, 회의실 분위기가 팽팽하다. 결론은?", choices: [
        { text: "오늘 무조건 끝장 본다", scores: { jikjin: 2 } },
        { text: "분위기 봐서 은근슬쩍 떠보기", scores: { mildang: 2 } },
        { text: "상대가 먼저 고백하게 만들 작전 짬", scores: { tsundere: 2 } },
        { text: "고백 문구만 100번째 수정 중", scores: { mosol: 2 } } ] },
      { q: "연인의 생일. 회의실 예산 담당 세포가 나선다.", choices: [
        { text: "한 달 월급 갈아 넣어 서프라이즈", scores: { heonsin: 2 } },
        { text: "위시리스트 스크린샷 저장해둔 지 오래", scores: { jipchak: 2 } },
        { text: "적당히 센스 있게, 무리는 안 함", scores: { mildang: 1, jikjin: 1 } },
        { text: "뭘 좋아할지 몰라서 계속 눈치만 봄", scores: { mosol: 2 } } ] },
      { q: "다툰 다음 날. 화해 담당 세포 투표 결과는?", choices: [
        { text: "먼저 전화해서 '미안해' 바로 인정", scores: { jikjin: 2, heonsin: 1 } },
        { text: "속으로는 화해하고 싶은데 입은 '흥'", scores: { tsundere: 2 } },
        { text: "상대 기분 풀릴 때까지 무한 대기", scores: { jipchak: 1, mosol: 1 } },
        { text: "일단 시간을 좀 두고 지켜봄", scores: { mildang: 2 } } ] },
      { q: "친구가 '너 연애할 때 어떤 스타일이야?'라고 묻는다. 세포들이 답 준비.", choices: [
        { text: "'다 퍼줘야 직성이 풀려'", scores: { heonsin: 2 } },
        { text: "'좋아해도 절대 먼저 표현 안 해'", scores: { tsundere: 2, mildang: 1 } },
        { text: "'꽂히면 그날부터 올인이지'", scores: { jipchak: 2 } },
        { text: "'그게... 나도 잘 몰라. 경험이 없어서'", scores: { mosol: 2 } } ] },
      { q: "마지막 회의 안건: 이상형이 나타났다. 최우선 행동은?", choices: [
        { text: "바로 연락처 물어보고 대시", scores: { jikjin: 2 } },
        { text: "일단 친해지고 서서히 다가감", scores: { mildang: 1, heonsin: 1 } },
        { text: "머릿속으로 연애 시나리오만 100개 완성", scores: { mosol: 2 } },
        { text: "관심 있으면서 괜히 무관심한 척", scores: { tsundere: 2 } } ] }
    ];

    function renderResult(totals, el, api) {
      var key = Quiz.top(totals, ORDER);
      var r = CELLS[key];
      var sum = 0; ORDER.forEach(function (k) { sum += (totals[k] || 0); });
      sum = sum || 1;
      var rows = ORDER.map(function (k) { return { k: k, v: totals[k] || 0 }; })
        .sort(function (a, b) { return b.v - a.v; }).slice(0, 4);
      var barsHtml = '<div class="cell-bars">' + rows.map(function (row) {
        var pct = Math.round(row.v / sum * 100);
        return '<div class="cell-row"><span class="nm">' + CELLS[row.k].emoji + " " +
          CELLS[row.k].name.replace(" 우세형", "") + '</span>' +
          '<span class="track"><span class="fill" style="width:' + pct + '%"></span></span>' +
          '<span class="pct">' + pct + '%</span></div>';
      }).join("") + "</div>";

      el.innerHTML =
        '<span class="result-emoji">' + r.emoji + "</span>" +
        '<p class="result-name">' + r.name + "</p>" +
        '<p class="result-desc">' + r.desc + "</p>" + barsHtml +
        '<p class="match-line">💞 환상의 짝꿍세포: <b>' + CELLS[r.match].name.replace(" 우세형", "") + "</b>" +
        ' · ⚡ 상극세포: <b>' + CELLS[r.clash].name.replace(" 우세형", "") + "</b></p>" +
        '<div id="card-slot"></div>' +
        '<div class="result-actions">' +
        '<button class="btn-primary" id="qz-retry">다시하기</button>' +
        '<button class="btn-ghost" id="qz-share">링크 복사</button></div>';

      el.querySelector("#card-slot").appendChild(ShareCard.render({
        palette: "coral", emoji: r.emoji, badge: "연애세포 회의 결과", title: r.name,
        lines: [r.desc, "짝꿍세포: " + CELLS[r.match].name.replace(" 우세형", "")]
      }));
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#qz-share").onclick = function () { api.shareLink(el.querySelector("#qz-share")); };
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "💘", title: "내 안의 연애세포 회의",
      intro: "당신의 연애를 좌우하는 6개의 세포. 지금부터 회의를 시작합니다. 어떤 세포가 마이크를 잡을까요?",
      feedSrc: "love", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
