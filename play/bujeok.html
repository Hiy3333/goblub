<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>귀곡의 부적 — goblub</title>
  <meta name="description" content="네 팔자의 용신을 봉한 귀곡의 개운부 — 저장해 지니고, 두 장을 겹치면 명부 대조(궁합)도 볼 수 있다" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass5" />
  <style>
    body.dark-mb { background:#0a0710 !important; }
    body.dark-mb main > section.panel { background: linear-gradient(180deg,#151020,#0d0912) !important;
      border:1px solid rgba(150,60,70,.4) !important; box-shadow: 0 18px 50px rgba(0,0,0,.6) !important; }
    .mb-title { font-family:'Nanum Myeongjo',serif; font-weight:800; color:#ffb08a; font-size:1.5rem;
      text-shadow:0 0 18px rgba(220,90,50,.4); margin-bottom:6px; }
    .mb-sub { color:#9a8ba8; font-size:.95rem; line-height:1.7; }
    .gwi-line { font-family:'Nanum Myeongjo',serif; color:#e8dcc8; background:rgba(30,16,20,.7);
      border:1px solid rgba(150,60,70,.4); border-left:3px solid #b0384a; border-radius:10px;
      padding:12px 16px; margin:16px auto; max-width:460px; font-size:1rem; line-height:1.8; }
    .gwi-line b { color:#ff8a5a; }
    #cv-wrap { display:flex; justify-content:center; margin:18px 0 8px; }
    #bujeok-cv { width:min(72vw,320px); height:auto; border-radius:10px;
      box-shadow:0 14px 44px rgba(0,0,0,.65), 0 0 44px rgba(160,40,30,.25); display:block; }
    .elem-chip { display:inline-block; background:rgba(160,40,30,.25); border:1px solid rgba(220,110,80,.5);
      color:#ffb08a; border-radius:999px; padding:5px 14px; font-size:.9rem; margin:4px 3px; font-family:'Nanum Myeongjo',serif; }
    .fine-print { color:#7a6f8a !important; }
  </style>
</head>
<body class="dark-mb">
  <div id="site-header"></div>
  <main>
    <section class="panel" style="text-align:center">
      <span style="font-size:2.6rem; display:block; filter:drop-shadow(0 0 14px rgba(220,90,50,.4))">🧧</span>
      <h1 class="mb-title">귀곡의 부적 — 開運符</h1>
      <p class="mb-sub">네 팔자에 모자란 기운(용신)을 부적에 봉해주마.<br>저장해 지니고 다녀라. 폰 배경으로 두면 더 좋다.</p>

      <div id="no-profile" style="display:none; margin-top:16px">
        <p class="mb-sub">아직 네 명부가 없구나.<br>먼저 귀곡에게 사주를 보여야 부적을 받을 수 있다.</p>
        <div class="result-actions" style="justify-content:center; margin-top:12px">
          <a class="btn-primary" href="saju-premium.html">🕯 귀곡에게 사주 보러 가기</a>
        </div>
      </div>

      <div id="works" style="display:none">
        <p class="gwi-line" id="gwi-msg"></p>
        <div id="cv-wrap"><canvas id="bujeok-cv"></canvas></div>
        <div id="elem-info"></div>
        <div class="result-actions" style="justify-content:center; margin-top:14px">
          <button class="btn-primary" id="btn-save">🧧 부적 저장하기 (PNG)</button>
          <a class="btn-ghost" href="myeongbu.html">🔮 명부 대조(궁합) 하러 가기</a>
        </div>
        <p class="fine-print" style="margin-top:12px">💡 부적 두 장을 <b>명부 대조</b>에 올리면 두 사람의 궁합을 볼 수 있어요 — 부적 속 귀곡의 인장(印)에 명(命)이 새겨져 있거든요.</p>
      </div>

      <p class="fine-print" style="margin-top:14px">부적은 재미로 지녀주세요 🙂</p>
    </section>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=5" data-root=".."></script>
  <script src="js/saju.js"></script>
  <script src="js/saju-deep.js"></script>
  <script src="js/bujeok.js?v=1"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      function birth() { try { var b = JSON.parse(localStorage.getItem("goblub_birth")); return (b && b.y) ? b : null; } catch (e) { return null; } }

      var b = birth();
      if (!b) { $("no-profile").style.display = "block"; return; }
      $("works").style.display = "block";

      fetch("data/saju-terms.json").then(function (r) { return r.json(); }).then(function (data) {
        var r = Saju.compute(data, { y: b.y, m: b.m, d: b.d, hour: b.hour, min: b.min || 0 }, { trueSolar: true, gender: b.gender || null });
        var deep = SajuDeep.facts(r, b, b.gender || null);
        var elem = (deep.yongshin && deep.yongshin.use[0]) || ["목","화","토","금","수"][Math.floor(r.ilgan / 2)];
        var el = BujeokArt.ELEM[elem];

        $("gwi-msg").innerHTML = "네 명(命)에 <b>" + elem + "(" + el.hj + ")</b> 기운이 목마르더군.<br>" +
          "이 부적에 봉해두었다. …잃어버리지 마라.";
        $("elem-info").innerHTML =
          '<span class="elem-chip">용신 · ' + elem + "(" + el.hj + ')</span>' +
          (deep.yongshin && deep.yongshin.use[1] ? '<span class="elem-chip">보조 · ' + deep.yongshin.use[1] + '</span>' : "") +
          '<span class="elem-chip">' + r.strength.label + " " + Saju.GAN[r.ilgan] + "일간</span>";

        var pillars = {};
        ["year","month","day","hour"].forEach(function (k) {
          if (r.pillars[k]) pillars[k] = { gan: r.pillars[k][0], ji: r.pillars[k][1] };
        });
        document.fonts.ready.then(function () {
          BujeokArt.render($("bujeok-cv"), { birth: b, elemKo: elem, pillars: pillars });
        });

        // 저장 전략(플랫폼별로 가장 확실한 경로):
        //  - 안드로이드/데스크톱: a[download]+blob 직접 다운로드(크롬·삼성브라우저 확실) + 안 됐을 때용 '길게 눌러 저장' 보조 버튼
        //  - iOS: 다운로드 UX가 어긋나므로 '길게 눌러 저장' 화면(사진 앱 저장)
        //  - 카톡 등 인앱: download 무시되므로 바로 '길게 눌러 저장'
        var UA = navigator.userAgent;
        var isIOS = /iPhone|iPad|iPod/i.test(UA);
        var isInApp = /KAKAOTALK|Instagram|FBAV|FBAN|Line\//i.test(UA);
        function longPressOverlay(url) {
          var ov = document.createElement("div");
          ov.style.cssText = "position:fixed;inset:0;z-index:99;background:rgba(5,4,10,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow:auto;";
          ov.innerHTML =
            '<p style="color:#ffb08a;font-family:\'Nanum Myeongjo\',serif;font-weight:800;margin-bottom:12px;font-size:1.05rem">🧧 부적을 <span style="color:#ff5a3a">길게 꾹</span> 눌러라</p>' +
            '<img src="' + url + '" style="max-height:64vh;max-width:86vw;border-radius:10px;box-shadow:0 14px 44px rgba(0,0,0,.7)" alt="부적" />' +
            '<p style="color:#e8dcc8;font-family:\'Nanum Myeongjo\',serif;margin:14px 0 0;text-align:center;line-height:1.7;font-size:.95rem">누르고 있으면 메뉴가 뜬다<br>→ <b style="color:#ff8a5a">[이미지 저장 / 사진에 추가]</b> 선택</p>' +
            '<button style="margin-top:16px;background:rgba(40,26,40,.9);color:#e0d4e8;border:1px solid rgba(150,80,90,.5);border-radius:10px;padding:11px 22px;font-family:inherit;font-size:1rem;cursor:pointer">닫기</button>';
          ov.querySelector("button").onclick = function () { ov.remove(); };
          document.body.appendChild(ov);
        }
        $("btn-save").onclick = function () {
          var cv = $("bujeok-cv");
          if (isIOS || isInApp) { longPressOverlay(cv.toDataURL("image/png")); return; }
          // 안드로이드·데스크톱: 직접 다운로드
          cv.toBlob(function (blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url; a.download = "gwigok-bujeok.png";
            document.body.appendChild(a); a.click(); a.remove();
            setTimeout(function () { URL.revokeObjectURL(url); }, 15000);
            // 다운로드가 안 된 경우를 위한 보조 안내(안드로이드만)
            if (/Android/i.test(UA)) {
              var tip = $("save-tip");
              if (!tip) {
                tip = document.createElement("p"); tip.id = "save-tip"; tip.className = "fine-print";
                tip.style.marginTop = "10px";
                tip.innerHTML = '📥 알림바 또는 갤러리·다운로드 폴더를 확인해라. 저장이 안 보이면 → <a href="#" id="lp-alt" style="color:var(--sky)">길게 눌러 저장하기</a>';
                $("btn-save").parentElement.insertAdjacentElement("afterend", tip);
                document.getElementById("lp-alt").onclick = function (e) {
                  e.preventDefault();
                  longPressOverlay(cv.toDataURL("image/png"));
                };
              }
            }
          }, "image/png");
        };
      });
    })();
  </script>
</body>
</html>
