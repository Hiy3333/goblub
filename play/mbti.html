  <style>
    .portal { width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 18px;
      background: conic-gradient(var(--coral), var(--yellow), var(--mint), var(--sky), var(--purple), var(--coral));
      animation: spin 6s linear infinite; filter: blur(1px); }
    .portal:hover { animation-duration: 1.2s; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .visual-card { font-size: 3.4rem; text-align: center; padding: 26px 10px; border-radius: 18px; margin-bottom: 16px; letter-spacing: 6px; }
    .choice-btn:hover { animation: wiggle 0.3s ease; border-color: var(--sky); }
    @keyframes wiggle { 25% { transform: rotate(-1.2deg); } 75% { transform: rotate(1.2deg); } }
    .copy-q { background: none; border: none; color: var(--ink-soft); font-family: inherit; font-size: 0.85rem; cursor: pointer; margin-top: 4px; }
    .meme-title { text-align: center; font-size: 1.15rem; color: var(--ink-soft); margin-bottom: 6px; }
    .stat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .stat-row .name { width: 7.2em; font-size: 0.92rem; }
    .stat-row .track { flex: 1; background: var(--line); border-radius: 999px; height: 12px; overflow: hidden; }
    .stat-row .fill { height: 12px; border-radius: 999px; background: linear-gradient(90deg, var(--mint), var(--sky)); }
    .stat-row .val { width: 2.4em; text-align: right; color: var(--ink-soft); font-size: 0.88rem; }
    .bubble { background: var(--cream); border-radius: 14px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.95rem; }
  </style>
</head>

        var m = "";
        m += (s.E || 0) >= (s.I || 0) ? "E" : "I";

        m += (s.T || 0) >= (s.F || 0) ? "T" : "F";
        m += (s.J || 0) >= (s.P || 0) ? "J" : "P";
        return m;

        // MBTI 4글자 — 초대형 시안 네온
        g.font = "96px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#ffffff";
        g.save(); g.shadowColor = "#4deeea"; g.shadowBlur = 30;
        g.fillText(type, W / 2, 632); g.fillText(type, W / 2, 632);
        g.restore();
        // 타이틀 — 핑크 글로우
        g.font = "42px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#ffffff";
        g.save(); g.shadowColor = "#ff6ec7"; g.shadowBlur = 22;
        g.fillText(r.title, W / 2, 712);
        g.restore();
        // 밈 타이틀 줄바꿈 — 연보라
        g.font = "30px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#cdbdf6";
        var words = r.memeTitle.split(" ");
        var lines = [], line = "";
        words.forEach(function (w) {
          var t = line ? line + " " + w : w;
          if (g.measureText("「" + t + "」").width > 580) { lines.push(line); line = w; }
          else line = t;
        });
        if (line) lines.push(line);
        lines.forEach(function (l, i2) {
          var txt = (i2 === 0 ? "「" : "") + l + (i2 === lines.length - 1 ? "」" : "");
          g.fillText(txt, W / 2, 800 + i2 * 48);
        });
        // 하단 CTA
        g.font = "26px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#b9a8e8";
        g.fillText("🌃 goblub · 대환장 놀이터", W / 2, H - 116);
        g.font = "28px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#4deeea";
        g.save(); g.shadowColor = "#4deeea"; g.shadowBlur = 12;
        g.fillText("나도 해보기 ▶ goblub.vercel.app", W / 2, H - 72);
        g.restore();
        c.toBlob(function (blob) {
          if (!blob) { window.open(c.toDataURL("image/png")); return; }
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "goblub-mbti-" + type + ".png";
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
        }, "image/png");
      };

      // 해시 진입
      var h = (location.hash || "").replace("#", "").toUpperCase();
      if (/^[EI][SN][TF][JP]$/.test(h) && RESULTS[h]) renderResult(h, false);
      else show("intro");
    })();
  </script>
</body>
</html>
