<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 무지개 좌표 — goblub</title>
  <meta name="description" content="조용히 나를 비추는 거울 — 끌림의 스펙트럼 자기탐색" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .spectrum-bar { position:relative; height:20px; border-radius:999px; margin:22px 8px 14px;
      background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#b983ff); }
    .spectrum-marker { position:absolute; top:50%; width:26px; height:26px; margin-left:-13px;
      transform:translateY(-50%); border-radius:50%; background:#fff; border:3px solid #38352f; box-shadow:0 2px 6px rgba(0,0,0,.2); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">이 테스트는 진단이 아닌 자기탐색 도구예요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var QN = 10; // 문항 수(아래 QUESTIONS와 일치). 선택지 s:0~4 = 이성쪽 ~ 동성쪽

    var QUESTIONS = [
      { q:"지금까지 설레거나 반했던 상대를 떠올리면, 주로 누구였나요?", choices:[
        { text:"거의 다 이성(다른 성별)이었어요", scores:{ s:0 } },
        { text:"대부분 이성, 가끔 동성도 있었어요", scores:{ s:1 } },
        { text:"이성·동성 둘 다 비슷했어요", scores:{ s:2 } },
        { text:"대부분 동성, 가끔 이성도 있었어요", scores:{ s:3 } },
        { text:"거의 다 동성(같은 성별)이었어요", scores:{ s:4 } } ] },
      { q:"길이나 모임에서 '매력 있다' 하고 눈이 한 번 더 가는 사람은?", choices:[
        { text:"주로 이성", scores:{ s:0 } },
        { text:"이성이 더 많지만 동성도 가끔", scores:{ s:1 } },
        { text:"성별과 상관없이, 끌리면 끌려요", scores:{ s:2 } },
        { text:"동성이 더 많지만 이성도 가끔", scores:{ s:3 } },
        { text:"주로 동성", scores:{ s:4 } } ] },
      { q:"데이트나 연애를 상상하면, 옆에 있는 상대는?", choices:[
        { text:"대부분 이성", scores:{ s:0 } },
        { text:"주로 이성, 가끔 동성", scores:{ s:1 } },
        { text:"이성일 때도, 동성일 때도 있어요", scores:{ s:2 } },
        { text:"주로 동성, 가끔 이성", scores:{ s:3 } },
        { text:"대부분 동성", scores:{ s:4 } } ] },
      { q:"로맨스 영화·드라마에서 더 두근거리며 몰입되는 관계는?", choices:[
        { text:"이성 주인공들의 로맨스", scores:{ s:0 } },
        { text:"주로 이성 로맨스, 가끔 동성 케미도", scores:{ s:1 } },
        { text:"이성이든 동성이든 케미만 좋으면 다", scores:{ s:2 } },
        { text:"주로 동성 케미, 가끔 이성 로맨스도", scores:{ s:3 } },
        { text:"동성 주인공들의 로맨스", scores:{ s:4 } } ] },
      { q:"'이 사람 좋다'는 마음이 들 때, 상대의 성별은 주로?", choices:[
        { text:"늘 이성이에요", scores:{ s:0 } },
        { text:"보통 이성, 드물게 동성", scores:{ s:1 } },
        { text:"성별은 별로 중요하지 않아요", scores:{ s:2 } },
        { text:"보통 동성, 드물게 이성", scores:{ s:3 } },
        { text:"늘 동성이에요", scores:{ s:4 } } ] },
      { q:"친구에게 내 이상형을 설명한다면?", choices:[
        { text:"\"난 이성 중에 이런 사람이 좋아\"", scores:{ s:0 } },
        { text:"\"주로 이성인데 예외도 있어\"", scores:{ s:1 } },
        { text:"\"성별보다 사람 자체가 중요해\"", scores:{ s:2 } },
        { text:"\"주로 동성인데 예외도 있어\"", scores:{ s:3 } },
        { text:"\"난 동성 중에 이런 사람이 좋아\"", scores:{ s:4 } } ] },
      { q:"손을 잡거나 가까이 있고 싶은 상대를 떠올리면?", choices:[
        { text:"주로 이성", scores:{ s:0 } },
        { text:"이성 쪽이 더 편해요, 가끔 동성도", scores:{ s:1 } },
        { text:"성별과 상관없이 마음이 통하면", scores:{ s:2 } },
        { text:"동성 쪽이 더 편해요, 가끔 이성도", scores:{ s:3 } },
        { text:"주로 동성", scores:{ s:4 } } ] },
      { q:"'진짜 멋지다/예쁘다, 좋아' 싶은 연예인은 주로?", choices:[
        { text:"거의 이성", scores:{ s:0 } },
        { text:"이성이 많지만 동성도", scores:{ s:1 } },
        { text:"이성·동성 골고루", scores:{ s:2 } },
        { text:"동성이 많지만 이성도", scores:{ s:3 } },
        { text:"거의 동성", scores:{ s:4 } } ] },
      { q:"먼 미래, 평생을 함께할 짝을 그려보면?", choices:[
        { text:"자연스럽게 이성이 그려져요", scores:{ s:0 } },
        { text:"주로 이성이지만 마음은 열려 있어요", scores:{ s:1 } },
        { text:"성별은 따로 정해두지 않았어요", scores:{ s:2 } },
        { text:"주로 동성이지만 마음은 열려 있어요", scores:{ s:3 } },
        { text:"자연스럽게 동성이 그려져요", scores:{ s:4 } } ] },
      { q:"지금 이 순간, 솔직하게 내 마음이 향하는 쪽은?", choices:[
        { text:"이성 쪽으로 또렷하게", scores:{ s:0 } },
        { text:"이성 쪽에 가깝게", scores:{ s:1 } },
        { text:"어느 쪽으로도 열려 있게", scores:{ s:2 } },
        { text:"동성 쪽에 가깝게", scores:{ s:3 } },
        { text:"동성 쪽으로 또렷하게", scores:{ s:4 } } ] }
    ];

    function spectrumPos(totals){
      var max = QN * 4; // 이론상 최대
      return Math.round((totals.s || 0) / max * 100); // 0~100
    }
    var ZONES = [ // 구간별 다정한 메시지(등급/우열 아님)
      { upTo:15, msg:"한쪽 색이 선명한 당신. 그 또렷함도 당신다움이에요." },
      { upTo:40, msg:"기울되 열려 있는 무지개. 지금의 좌표가 편안하면 그걸로 충분해요." },
      { upTo:60, msg:"한가운데를 유영하는 넓은 스펙트럼. 어디든 당신의 자리예요." },
      { upTo:85, msg:"반대편으로 기운 다정한 무지개. 오늘의 마음을 믿어봐요." },
      { upTo:100, msg:"또 다른 색이 선명한 당신. 그 선명함이 참 멋져요." }
    ];
    function zoneMsg(pos){ for (var i=0;i<ZONES.length;i++) if (pos<=ZONES[i].upTo) return ZONES[i].msg; return ZONES[ZONES.length-1].msg; }

    function renderResult(totals, el, api){
      var pos = spectrumPos(totals);
      el.innerHTML =
        '<span class="result-emoji">🌈</span>'+
        '<p class="result-name">나의 무지개 좌표</p>'+
        '<div class="spectrum-bar"><span class="spectrum-marker" style="left:'+pos+'%"></span></div>'+
        '<p class="result-desc">'+zoneMsg(pos)+'</p>'+
        '<div id="card-slot"></div>'+
        '<div class="result-actions">'+
        '<button class="btn-ghost" id="opt-card">🖼 오늘의 무지개 카드 만들기</button>'+
        '<button class="btn-primary" id="qz-retry">다시하기</button></div>'+
        '<p class="fine-print" style="margin-top:14px">이 테스트는 자기탐색용이며 진단이 아니에요. 결과는 저장되지 않습니다.</p>';
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#opt-card").onclick = function(){
        if (el.querySelector("#card-slot").childNodes.length) return;
        el.querySelector("#card-slot").appendChild(ShareCard.render({
          palette:"purple", emoji:"🌈", badge:"나의 무지개 좌표", title:"오늘의 무지개",
          lines:[zoneMsg(pos)]   // 수치/라벨은 카드에 크게 넣지 않음(아웃팅 방지)
        }));
      };
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "🌈", title: "나의 무지개 좌표",
      intro: "누구에게 끌리고 설레는지는 사람마다 무지개처럼 달라요. 정답도, 더 좋고 나쁨도 없어요. 10가지 질문에 편하게 답하면 오늘의 내가 무지개의 어디쯤인지 살짝 비춰드려요.",
      questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
