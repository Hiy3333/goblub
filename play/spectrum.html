<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 무지개 좌표 — goblub</title>
  <meta name="description" content="조용히 나를 비추는 거울 — 끌림의 스펙트럼 자기탐색" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .spectrum-bar { position:relative; height:20px; border-radius:999px; margin:22px 8px 14px;
      background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#b983ff); }
    .spectrum-marker { position:absolute; top:50%; width:26px; height:26px; margin-left:-13px;
      transform:translateY(-50%); border-radius:50%; background:#fff; border:3px solid #38352f; box-shadow:0 2px 6px rgba(0,0,0,.2); }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">이 테스트는 진단이 아닌 자기탐색 도구예요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script>
    var QN = 12; // 문항 수(아래 QUESTIONS와 일치)

    var QUESTIONS = [
      { q:"영화 속 로맨스, 나도 모르게 몰입되는 커플은?", choices:[
        { text:"A와 B", scores:{ s:0 } },
        { text:"어느 쪽이든 케미가 좋으면", scores:{ s:2 } },
        { text:"C와 D", scores:{ s:4 } },
        { text:"솔직히 로맨스보다 스토리", scores:{ s:2 } } ] },
      { q:"길을 걷다 나도 모르게 시선이 한 번 더 가는 쪽은?", choices:[
        { text:"딱 정해진 한쪽", scores:{ s:0 } },
        { text:"그쪽에 좀 더 기우는 편", scores:{ s:1 } },
        { text:"반반, 그때그때 달라", scores:{ s:2 } },
        { text:"반대쪽에 더 기우는 편", scores:{ s:3 } } ] },
      { q:"친구가 소개팅을 주선해준다면, 가장 먼저 묻고 싶은 건?", choices:[
        { text:"성격이나 취향 (성별은 이미 정해둔 쪽)", scores:{ s:0 } },
        { text:"일단 사진부터, 마음이 가면 성별은 안 봄", scores:{ s:2 } },
        { text:"성격이나 취향 (반대쪽으로)", scores:{ s:4 } },
        { text:"그냥 재밌는 사람이면 다 좋음", scores:{ s:2 } } ] },
      { q:"심쿵했던 순간을 떠올려보면, 그 기억 속 상대는?", choices:[
        { text:"늘 같은 쪽이었던 것 같다", scores:{ s:0 } },
        { text:"대체로 한쪽이지만 예외도 있었다", scores:{ s:1 } },
        { text:"양쪽 다 있었다", scores:{ s:2 } },
        { text:"돌아보니 반대쪽이 더 많았다", scores:{ s:3 } } ] },
      { q:"연예인 이상형 월드컵, 결승까지 남는 얼굴들은 주로?", choices:[
        { text:"한 방향으로 쭉 취향이 통일", scores:{ s:0 } },
        { text:"가끔 낯선 조합이 올라오기도", scores:{ s:1 } },
        { text:"의외로 폭이 넓어서 나도 놀람", scores:{ s:2 } },
        { text:"예상 밖의 방향이 자꾸 올라옴", scores:{ s:4 } } ] },
      { q:"'이 사람과 사귀면 어떨까' 진지하게 그려본 상대는?", choices:[
        { text:"늘 같은 쪽으로만 그려진다", scores:{ s:0 } },
        { text:"주로 그쪽이지만 상상은 자유롭게", scores:{ s:1 } },
        { text:"양쪽 다 자연스럽게 그려진다", scores:{ s:2 } },
        { text:"요즘은 반대쪽이 더 자주 그려진다", scores:{ s:3 } } ] },
      { q:"설렘의 스위치가 켜지는 포인트는 주로?", choices:[
        { text:"정해진 이상형 조건이 뚜렷함", scores:{ s:0 } },
        { text:"조건보다는 분위기나 케미", scores:{ s:2 } },
        { text:"사람 자체, 성별은 크게 안 따짐", scores:{ s:2 } },
        { text:"예상 못한 쪽에서 설렐 때가 많음", scores:{ s:4 } } ] },
      { q:"단체 사진을 보면 나도 모르게 눈이 먼저 가는 사람은?", choices:[
        { text:"거의 항상 같은 쪽", scores:{ s:0 } },
        { text:"대체로 같은 쪽, 가끔 딴 데도", scores:{ s:1 } },
        { text:"딱히 정해져 있지 않다", scores:{ s:2 } },
        { text:"오히려 반대쪽에 시선이 자주 감", scores:{ s:3 } } ] },
      { q:"'만약 그 사람이 반대쪽 성별이었다면?' 하는 상상, 해본 적 있다면?", choices:[
        { text:"딱히 상상해본 적 없다", scores:{ s:0 } },
        { text:"장난삼아 한두 번 정도", scores:{ s:1 } },
        { text:"의외로 자연스럽게 그려진다", scores:{ s:2 } },
        { text:"오히려 그쪽이 더 편하게 그려진다", scores:{ s:3 } } ] },
      { q:"연애 상상 속 미래의 짝, 가장 먼저 그려지는 모습은?", choices:[
        { text:"성별부터 뚜렷하게 정해져 있다", scores:{ s:0 } },
        { text:"성격이 먼저 그려지고 성별은 나중", scores:{ s:2 } },
        { text:"딱히 성별을 그려본 적이 없다", scores:{ s:2 } },
        { text:"오히려 낯선 쪽이 먼저 그려진다", scores:{ s:4 } } ] },
      { q:"'너는 이런 사람 좋아할 것 같아'라는 친구의 말에 나는?", choices:[
        { text:"대체로 정확하게 맞힌다", scores:{ s:0 } },
        { text:"반은 맞고 반은 틀린다", scores:{ s:2 } },
        { text:"의외로 자주 틀린다, 나도 나를 잘 모름", scores:{ s:2 } },
        { text:"정반대로 예상해야 오히려 맞는다", scores:{ s:4 } } ] },
      { q:"오늘 하루, 마음이 자꾸 향하는 방향을 한마디로 표현하면?", choices:[
        { text:"늘 그렇듯 한쪽으로 또렷하게", scores:{ s:0 } },
        { text:"한쪽에 가깝지만 마음은 열려 있게", scores:{ s:1 } },
        { text:"양쪽 다 넓게 열려 있는 기분으로", scores:{ s:2 } },
        { text:"오늘따라 반대쪽으로 마음이 향하게", scores:{ s:3 } } ] }
    ];

    function spectrumPos(totals){
      var max = QN * 4; // 이론상 최대
      return Math.round((totals.s || 0) / max * 100); // 0~100
    }
    var ZONES = [ // 구간별 다정한 메시지(등급/우열 아님)
      { upTo:15, msg:"한쪽 색이 선명한 당신. 그 또렷함도 당신다움이에요." },
      { upTo:40, msg:"기울되 열려 있는 무지개. 지금의 좌표가 편안하면 그걸로 충분해요." },
      { upTo:60, msg:"한가운데를 유영하는 넓은 스펙트럼. 어디든 당신의 자리예요." },
      { upTo:85, msg:"반대편으로 기운 다정한 무지개. 오늘의 마음을 믿어봐요." },
      { upTo:100, msg:"또 다른 색이 선명한 당신. 그 선명함이 참 멋져요." }
    ];
    function zoneMsg(pos){ for (var i=0;i<ZONES.length;i++) if (pos<=ZONES[i].upTo) return ZONES[i].msg; return ZONES[ZONES.length-1].msg; }

    function renderResult(totals, el, api){
      var pos = spectrumPos(totals);
      el.innerHTML =
        '<span class="result-emoji">🌈</span>'+
        '<p class="result-name">나의 무지개 좌표</p>'+
        '<div class="spectrum-bar"><span class="spectrum-marker" style="left:'+pos+'%"></span></div>'+
        '<p class="result-desc">'+zoneMsg(pos)+'</p>'+
        '<div id="card-slot"></div>'+
        '<div class="result-actions">'+
        '<button class="btn-ghost" id="opt-card">🖼 오늘의 무지개 카드 만들기</button>'+
        '<button class="btn-primary" id="qz-retry">다시하기</button></div>'+
        '<p class="fine-print" style="margin-top:14px">이 테스트는 자기탐색용이며 진단이 아니에요. 결과는 저장되지 않습니다.</p>';
      el.querySelector("#qz-retry").onclick = api.restart;
      el.querySelector("#opt-card").onclick = function(){
        if (el.querySelector("#card-slot").childNodes.length) return;
        el.querySelector("#card-slot").appendChild(ShareCard.render({
          palette:"purple", emoji:"🌈", badge:"나의 무지개 좌표", title:"오늘의 무지개",
          lines:[zoneMsg(pos)]   // 수치/라벨은 카드에 크게 넣지 않음(아웃팅 방지)
        }));
      };
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "🌈", title: "나의 무지개 좌표",
      intro: "정답도 등급도 없어요. 끌림의 스펙트럼 위, 오늘의 나는 어디쯤일까 — 조용히 나를 비추는 거울이에요.",
      questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
