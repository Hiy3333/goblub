<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 궁합 — goblub</title>
  <meta name="description" content="두 사람의 사주로 보는 궁합 점수와 풀이, 연애운 증폭 부적까지" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=glass5" />
  <style>
    .person-box { border: 2px dashed var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
    .person-box h3 { font-size: 1.05rem; margin-bottom: 10px; }
    .score-big { text-align: center; font-size: 3.2rem; margin: 6px 0 0; }
    .score-grade { text-align: center; font-size: 1.4rem; margin-bottom: 12px; }
    .gauge { background: var(--cream); border-radius: 999px; height: 16px; margin: 10px 0 18px; overflow: hidden; }
    .gauge > div { height: 16px; border-radius: 999px; background: linear-gradient(90deg, var(--coral), var(--purple)); transition: width 0.6s; }
    .pair { display: flex; justify-content: center; gap: 18px; margin-bottom: 14px; }
    .pair .pillar { min-width: 100px; }
    .cat-line { line-height: 1.7; margin-bottom: 8px; }
    .cat-line .pt { color: var(--ink-soft); font-size: 0.88rem; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="hero">
      <h1>💑 우리 궁합</h1>
      <p>두 사람의 사주팔자로 보는 케미 — 절기 경계까지 정확한 만세력 기반</p>
    </section>

    <section class="panel" id="input-panel">
      <div class="person-box">
        <h3>🙋 나</h3>
        <div class="field-row">
          <select id="a-year"></select><select id="a-month"></select><select id="a-day"></select>
          <select id="a-hour"><option value="">시 몰라요</option></select>
          <input type="number" id="a-min" min="0" max="59" value="0" aria-label="분" title="분(0~59)" style="width:58px" />
        </div>
      </div>
      <div class="person-box">
        <h3>💘 상대방</h3>
        <div class="field-row">
          <select id="b-year"></select><select id="b-month"></select><select id="b-day"></select>
          <select id="b-hour"><option value="">시 몰라요</option></select>
          <input type="number" id="b-min" min="0" max="59" value="0" aria-label="분" title="분(0~59)" style="width:58px" />
        </div>
      </div>
      <button class="btn-primary" id="btn-go">궁합 보기</button>
      <p class="error-msg" id="err"></p>
      <p class="fine-print" style="text-align:left">두 분의 정보는 이 브라우저에서만 계산되고 저장되지 않아요.</p>
    </section>

    <section class="panel" id="result-panel" style="display:none">
      <p class="score-big" id="r-score"></p>
      <p class="score-grade" id="r-grade"></p>
      <div class="gauge"><div id="r-gauge" style="width:0%"></div></div>
      <div class="pair" id="r-pair"></div>
      <div id="r-cats"></div>
      <p class="cat-line" id="r-advice" style="margin-top:10px"></p>
      <p class="cat-line" id="r-today" style="margin-top:14px"></p>
      <p class="cat-line" id="r-month"></p>

      <div id="gh-dosa" style="margin-top:18px; text-align:center">
        <div class="result-actions">
          <button class="btn-primary" id="btn-bujeok">🧧 연애운 증폭 부적 받기</button>
          <button class="btn-ghost" id="btn-ghdosa">🧙 도사의 궁합 리포트</button>
          <a class="btn-ghost" href="letter.html" style="border-color:var(--coral); color:var(--coral)">💌 이 케미로 마음 배달 보내기</a>
          <button class="btn-ghost" id="btn-retry">다시 보기</button>
          <a class="btn-ghost" href="../index.html">🎡 다른 즐길거리 보기</a>
        </div>
        <p id="gh-status" class="fine-print" style="display:none"></p>
        <div id="gh-text" style="display:none; white-space:pre-wrap; line-height:1.8; margin-top:12px; background:var(--cream); border-radius:14px; padding:18px; text-align:left"></div>
      </div>
    </section>

    <p class="fine-print">궁합은 재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js?v=5" data-root=".."></script>
  <script src="js/saju.js"></script>
  <script src="js/gunghap.js"></script>
  <script src="js/dosa.js?v=2"></script>
  <script src="js/feed.js?v=4"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      var data = null, last = null;

      function fillSelects(prefix) {
        var y = $(prefix + "-year"), m = $(prefix + "-month"), d = $(prefix + "-day"), h = $(prefix + "-hour");
        for (var i = 2100; i >= 1900; i--) y.add(new Option(i + "년", i));
        y.value = 1995;
        for (i = 1; i <= 12; i++) m.add(new Option(i + "월", i));
        for (i = 1; i <= 31; i++) d.add(new Option(i + "일", i));
        for (i = 0; i <= 23; i++) h.add(new Option(i + "시", i));
      }
      fillSelects("a"); fillSelects("b");

      // 운세 페이지에 저장된 내 생일 프리필
      try {
        var mine = JSON.parse(localStorage.getItem("goblub_birth"));
        if (mine && mine.y) {
          $("a-year").value = mine.y; $("a-month").value = mine.m; $("a-day").value = mine.d;
          if (mine.hour != null) $("a-hour").value = mine.hour;
          if (mine.min) $("a-min").value = mine.min;
        }
      } catch (e) {}

      function showErr(msg) { var e = $("err"); e.textContent = msg; e.style.display = "block"; }

      function readBirth(prefix) {
        var yy = +$(prefix + "-year").value, mm = +$(prefix + "-month").value, dd = +$(prefix + "-day").value;
        var date = new Date(yy, mm - 1, dd);
        if (date.getFullYear() !== yy || date.getMonth() !== mm - 1 || date.getDate() !== dd) return null;
        var hv = $(prefix + "-hour").value;
        var mv = hv === "" ? 0 : Math.min(59, Math.max(0, +($(prefix + "-min").value || 0)));
        return { y: yy, m: mm, d: dd, hour: hv === "" ? null : +hv, min: mv };
      }

      fetch("data/saju-terms.json")
        .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(function (d) { data = d; })
        .catch(function () { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); });

      $("btn-go").onclick = function () {
        $("err").style.display = "none";
        if (!data) { showErr("데이터를 불러오지 못했어요. 새로고침 해주세요."); return; }
        var ba = readBirth("a"), bb = readBirth("b");
        if (!ba || !bb) { showErr("없는 날짜가 있어요. 다시 확인해주세요!"); return; }
        var rA = Saju.compute(data, ba, { trueSolar: true });
        var rB = Saju.compute(data, bb, { trueSolar: true });
        var s = Gunghap.score(rA, rB);
        var now = new Date();
        var rT = Saju.compute(data, { y: now.getFullYear(), m: now.getMonth() + 1, d: now.getDate(), hour: 12, min: 0 }, {});
        var luck = Gunghap.coupleLuck(rA, rB, rT);
        last = { rA: rA, rB: rB, ba: ba, bb: bb, s: s };
        render(rA, rB, s);
        renderLuck(luck);
        $("gh-text").style.display = "none"; $("gh-text").textContent = "";
        $("gh-status").style.display = "none"; $("btn-ghdosa").disabled = false;
        $("input-panel").style.display = "none";
        $("result-panel").style.display = "block";
        if (window.GoblubFeed) GoblubFeed.grant("gunghap");
      };

      function pillarBox(label, r) {
        var t = Saju.pillarText(r.pillars.day);
        return '<div class="pillar"><span class="role">' + label + '</span><span class="hanja">' + t.hanja +
          '</span><span class="hangul">' + t.hangul + " · " + r.zodiac + "띠</span></div>";
      }

      function render(rA, rB, s) {
        $("r-score").textContent = s.total + "점";
        $("r-grade").textContent = "「" + s.grade + "」";
        setTimeout(function () { $("r-gauge").style.width = s.total + "%"; }, 50);
        $("r-pair").innerHTML = pillarBox("나", rA) + '<div style="align-self:center; font-size:1.6rem">❤️</div>' + pillarBox("상대", rB);
        var T = Gunghap.TEXTS;
        $("r-cats").innerHTML =
          '<p class="cat-line">🌟 일간 케미 <span class="pt">(' + s.ilgan.pt + "/" + s.ilgan.max + ")</span> — " + T.ilgan[s.ilgan.type] + "</p>" +
          '<p class="cat-line">🏠 일지 케미 <span class="pt">(' + s.ilji.pt + "/" + s.ilji.max + ")</span> — " + T.ilji[s.ilji.type] + "</p>" +
          '<p class="cat-line">⚖️ 오행 케미 <span class="pt">(' + s.oheng.pt + "/" + s.oheng.max + ")</span> — " + T.oheng[s.oheng.type] + "</p>" +
          '<p class="cat-line">🐭 띠 케미 <span class="pt">(' + s.tti.pt + "/" + s.tti.max + ")</span> — " + T.tti[s.tti.type] + "</p>" +
          '<p class="cat-line" style="margin-top:10px">' + T.grade[s.grade] + "</p>";
        $("r-advice").textContent = T.advice[s.grade];
      }

      function stars(n) { return "★★★★★".slice(0, n) + "☆☆☆☆☆".slice(0, 5 - n); }

      function renderLuck(luck) {
        $("r-today").innerHTML = '📅 오늘의 궁합 <span class="stars">' + stars(luck.day.score) + "</span> — " + luck.day.text;
        $("r-month").innerHTML = '🗓️ 이번 달 궁합 <span class="stars">' + stars(luck.month.score) + "</span> — " + luck.month.text;
      }

      $("btn-retry").onclick = function () {
        $("result-panel").style.display = "none";
        $("input-panel").style.display = "block";
      };

      // 🧧 부적 카드
      $("btn-bujeok").onclick = function () {
        if (!last) return;
        var tA = Saju.pillarText(last.rA.pillars.day), tB = Saju.pillarText(last.rB.pillars.day);
        var c = document.createElement("canvas");
        c.width = 720; c.height = 1280;
        var g = c.getContext("2d");
        var W = 720, H = 1280, neon = "#ff2e6e";
        function rr(x, y, w, h, rad) {
          g.beginPath(); g.moveTo(x + rad, y);
          g.arcTo(x + w, y, x + w, y + h, rad); g.arcTo(x + w, y + h, x, y + h, rad);
          g.arcTo(x, y + h, x, y, rad); g.arcTo(x, y, x + w, y, rad); g.closePath();
        }
        // 어두운 야경 배경
        var grd = g.createLinearGradient(0, 0, 0, H);
        grd.addColorStop(0, "#0d0a2b"); grd.addColorStop(0.45, "#1c1250"); grd.addColorStop(1, "#45227a");
        g.fillStyle = grd; g.fillRect(0, 0, W, H);
        // 시티 스카이라인
        g.fillStyle = "#0a0620";
        [[0, 1150, 90, 130], [110, 1120, 70, 160], [200, 1160, 80, 120], [300, 1100, 65, 180], [385, 1140, 95, 140],
         [500, 1110, 70, 170], [590, 1155, 80, 125], [685, 1125, 60, 155]].forEach(function (b) { g.fillRect(b[0], b[1], b[2], b[3]); });
        var win = ["#ffd93d", "#ff6ec7", "#4deeea"];
        [[30, 1175], [135, 1150], [230, 1185], [325, 1130], [420, 1165], [525, 1140], [615, 1180], [705, 1155]].forEach(function (p, wi) {
          g.fillStyle = win[wi % 3]; g.globalAlpha = 0.85; g.fillRect(p[0], p[1], 7, 7); g.globalAlpha = 1;
        });
        // 이중 네온 프레임 — 바깥 레드핑크 굵게 + 안쪽 가는 흰 선
        g.save(); g.shadowColor = neon; g.shadowBlur = 30; g.strokeStyle = neon; g.lineWidth = 8;
        rr(26, 26, W - 52, H - 52, 30); g.stroke(); g.stroke(); g.restore();
        g.strokeStyle = "rgba(255,255,255,0.7)"; g.lineWidth = 1.5;
        rr(48, 48, W - 96, H - 96, 22); g.stroke();
        // 반짝이 장식
        g.textAlign = "center"; g.fillStyle = "#ffd93d"; g.font = "30px sans-serif";
        g.save(); g.shadowColor = "#ffd93d"; g.shadowBlur = 14;
        g.fillText("✦", 120, 210); g.fillText("✦", W - 110, 560); g.fillText("✧", W - 130, 170); g.fillText("✧", 130, 620);
        g.restore();
        // 세로 부적 글씨 — 네온 사인
        g.fillStyle = "#ffffff";
        g.font = "84px 'Jua', 'Malgun Gothic', serif";
        var title = "戀愛運上昇符";
        g.save(); g.shadowColor = neon; g.shadowBlur = 34;
        for (var i = 0; i < title.length; i++) { g.fillText(title[i], 360, 200 + i * 100); g.fillText(title[i], 360, 200 + i * 100); }
        g.restore();
        g.save(); g.shadowColor = neon; g.shadowBlur = 12; g.fillStyle = neon; g.globalAlpha = 0.35;
        for (var i2 = 0; i2 < title.length; i2++) g.fillText(title[i2], 360, 200 + i2 * 100);
        g.restore(); g.globalAlpha = 1;
        // 띠 이모지 조합
        var ZE = { 쥐: "🐭", 소: "🐮", 호랑이: "🐯", 토끼: "🐰", 용: "🐲", 뱀: "🐍", 말: "🐴", 양: "🐑", 원숭이: "🐵", 닭: "🐔", 개: "🐶", 돼지: "🐷" };
        g.font = "84px 'Segoe UI Emoji', sans-serif";
        g.save(); g.shadowColor = neon; g.shadowBlur = 26;
        g.fillText((ZE[last.rA.zodiac] || "🐭") + " ❤️ " + (ZE[last.rB.zodiac] || "🐭"), 360, 880);
        g.restore();
        // 일주 한자
        g.font = "54px 'Jua', 'Malgun Gothic', serif"; g.fillStyle = "#ffffff";
        g.save(); g.shadowColor = "#9d6bff"; g.shadowBlur = 18;
        g.fillText(tA.hanja + "  ♥  " + tB.hanja, 360, 968);
        g.restore();
        // 점수 + 등급 — 노랑 네온
        g.font = "52px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#ffd93d";
        g.save(); g.shadowColor = "#ffd93d"; g.shadowBlur = 24;
        g.fillText(last.s.total + "점 · " + last.s.grade, 360, 1048); g.fillText(last.s.total + "점 · " + last.s.grade, 360, 1048);
        g.restore();
        // 축원 두 줄 — 연보라
        var bless = Gunghap.blessing(last.s);
        g.font = "28px 'Jua', 'Malgun Gothic', sans-serif";
        g.fillStyle = "#cdbdf6";
        g.fillText(bless[0], 360, 1112);
        g.fillText(bless[1], 360, 1156);
        // 하단 CTA
        g.font = "28px 'Jua', 'Malgun Gothic', sans-serif"; g.fillStyle = "#4deeea";
        g.save(); g.shadowColor = "#4deeea"; g.shadowBlur = 12;
        g.fillText("나도 해보기 ▶ goblub.vercel.app", 360, H - 68);
        g.restore();
        c.toBlob(function (blob) {
          if (!blob) { window.open(c.toDataURL("image/png")); return; }
          var a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "goblub-bujeok-" + last.s.total + ".png";
          document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function () { URL.revokeObjectURL(a.href); }, 5000);
        }, "image/png");
      };

      // 🧙 도사의 궁합 리포트
      $("btn-ghdosa").onclick = function () {
        if (!last) return;
        var btn = $("btn-ghdosa"), txt = $("gh-text"), st = $("gh-status");
        btn.disabled = true;
        st.style.display = "block";
        st.textContent = "🧙 도사님이 두 사주를 나란히 펼쳐보는 중…";
        txt.style.display = "block"; txt.textContent = "";
        var payload = {
          a: Dosa.buildPayload(last.rA, last.ba, null, false),
          b: Dosa.buildPayload(last.rB, last.bb, null, false),
          score: { total: last.s.total, grade: last.s.grade,
            ilgan: last.s.ilgan.type, ilji: last.s.ilji.type,
            oheng: last.s.oheng.type, tti: last.s.tti.type }
        };
        Dosa.fetchGunghap(payload, {
          onChunk: function (t) { txt.textContent += t; },
          onDone: function (fromCache) {
            st.textContent = fromCache ? "🧙 (지난번에 봐드린 리포트예요)" : "🧙 리포트 끝! 재미로 봐주세요.";
          },
          onError: function (code, sec) {
            txt.style.display = "none";
            st.textContent =
              code === "not_configured" ? "도사님이 아직 수련 중이에요. 곧 찾아옵니다!" :
              code === "cooldown" ? "도사님이 숨 고르는 중… " + sec + "초 후에 다시!" :
              "도사님이 지금 손님이 많아요. 잠시 후 다시 시도해 주세요.";
            btn.disabled = false;
          }
        });
      };
    })();
  </script>
</body>
</html>
