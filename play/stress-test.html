<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스트레스 몬스터 변신 — goblub</title>
  <meta name="description" content="스트레스 받으면 튀어나오는 내 안의 몬스터 — 고블럽이 냠 먹어드립니다" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css?v=neon1" />
  <style>
    .mon-stage { text-align:center; min-height:120px; margin:10px 0; }
    .mon-emoji { font-size:4.5rem; display:inline-block; }
    .mon-emoji.eaten { animation: mon-shrink .5s ease forwards; }
    @keyframes mon-shrink { to { transform: scale(0); opacity:0; } }
    .gob-muncher { display:inline-block; }
    .gob-muncher.chew { animation: gob-chew .45s ease 3; }
    @keyframes gob-chew { 30% { transform: scale(1.15) rotate(-5deg);} 65%{ transform: scale(1.1) rotate(5deg);} }
    .cure-line { color: var(--mint, #6bffa0); font-size:1.05rem; margin-top:8px; }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <section class="panel"><div id="quiz"></div></section>
    <p class="fine-print" style="margin-top:20px">재미로 봐주세요 🙂</p>
  </main>
  <div id="site-footer"></div>
  <script src="../js/common.js" data-root=".."></script>
  <script src="js/feed.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/sharecard.js"></script>
  <script src="js/goblub-art.js"></script>
  <script>
    var MONS = {
      pokbal:{emoji:"🌋",name:"폭발몬",desc:"참을 인 세 번은커녕 한 번도 못 참고 그대로 터지는 타입. 화끈하게 분출하고 나면 뒤끝은 없지만, 터지는 순간 옆 사람이 파편에 맞을 수 있어요. 화산도 분화구가 필요하듯, 터지기 전에 미리 빼는 안전밸브 하나쯤은 마련해두세요.",cure:"고블럽이 화를 냠— 이제 심호흡 세 번, 물 한 잔."},
      jamsu:{emoji:"🌊",name:"잠수몬",desc:"힘들면 일단 연락부터 끊고 물속으로 숨어버리는 타입. 혼자만의 시간이 회복에 도움되는 건 맞지만, 너무 오래 잠수 타면 걱정하던 사람들도 지쳐서 물 밖으로 안 나오게 됩니다. 가끔은 숨만 쉬러라도 수면 위로 올라와 주세요.",cure:"고블럽이 잠수를 냠— 한 사람에게만 '나 힘들어' 한마디."},
      nunmul:{emoji:"💧",name:"눈물몬",desc:"감정이 차오르면 말보다 눈물이 먼저 나오는 타입. 참는 것보다 훨씬 건강한 배출법이지만, 정작 왜 우는지는 본인도 정리가 안 될 때가 많아요. 실컷 울고 난 뒤엔 꼭 원인 한 줄 정리해보는 습관을 들여보세요.",cure:"고블럽이 눈물을 냠— 실컷 울었으면 따뜻한 거 먹기."},
      meokbo:{emoji:"🍔",name:"먹보몬",desc:"스트레스는 입으로 푸는 게 국룰인 타입. 먹는 순간엔 세상 행복하지만 배부름이 가시면 스트레스는 고스란히 그대로 남아있는 경우가 많죠. 먹는 즐거움은 지키되, 배달앱 켜기 전에 노래 한 곡만 먼저 틀어보길.",cure:"고블럽이 폭식을 냠— 대신 좋아하는 노래 한 곡."},
      yemin:{emoji:"🌵",name:"예민몬",desc:"스트레스 받으면 온몸에 가시부터 돋는 타입. 별거 아닌 말에도 발끈하고, 정작 본인도 왜 이렇게 날카로운지 몰라 당황하죠. 가시가 돋았다는 건 위험 신호니, 사람 만나기 전에 혼자 쿨다운할 시간을 꼭 확보하세요.",cure:"고블럽이 가시를 냠— 30분만 알림 끄고 혼자."},
      eoreum:{emoji:"🧊",name:"얼음몬",desc:"버거워지면 그대로 얼어붙어 아무것도 못 하는 타입. 게으른 게 아니라 뇌가 잠시 정지 버튼을 누른 것뿐인데, 자책까지 더해지면 얼음이 더 두꺼워져요. 완벽하게 녹이려 하지 말고 딱 손톱만큼만 움직여보세요.",cure:"고블럽이 무기력을 냠— 딱 5분, 제일 작은 일 하나만."}
    };
    var MORDER = ["pokbal","jamsu","nunmul","meokbo","yemin","eoreum"];

    var QUESTIONS = [
      { q:"팀플 조원이 또 잠수를 탔다. 마감은 내일. 지금 나는?", choices:[
        { text:"단톡방에 대문자로 '지금 어디임?!'", scores:{ pokbal:2 } },
        { text:"조용히 나 혼자 다 해버림", scores:{ eoreum:1, jamsu:2 } },
        { text:"화장실에서 몰래 눈물 찔끔", scores:{ nunmul:2 } },
        { text:"배달앱부터 켠다", scores:{ meokbo:2 } } ] },
      { q:"상사가 다 보는 앞에서 나만 지적한다. 심장이 쿵!", choices:[
        { text:"얼굴이 화끈, 그 자리에서 바로 따지고 싶다", scores:{ pokbal:2 } },
        { text:"눈물이 왈칵. 억울해서 참기 힘들다", scores:{ nunmul:2 } },
        { text:"머릿속이 하얘지고 아무 말도 안 나온다", scores:{ eoreum:2 } },
        { text:"괜히 사소한 걸로 옆 사람한테 짜증 남", scores:{ yemin:2 } } ] },
      { q:"주말 약속이 갑자기 취소됐다. 혼자가 된 오후, 나는?", choices:[
        { text:"연락 다 끊고 이불 속으로 잠수", scores:{ jamsu:2 } },
        { text:"배달 음식 3인분 시켜서 혼자 다 먹음", scores:{ meokbo:2 } },
        { text:"괜히 서러워서 혼자 훌쩍임", scores:{ nunmul:1, jamsu:1 } },
        { text:"아무것도 하기 싫어 그냥 누워만 있음", scores:{ eoreum:2 } } ] },
      { q:"단톡방에서 나를 저격하는 듯한 메시지를 봤다.", choices:[
        { text:"바로 캡처해서 '이거 나 얘기임?' 전송", scores:{ pokbal:2 } },
        { text:"메시지를 스무 번쯤 다시 읽으며 예민해짐", scores:{ yemin:2 } },
        { text:"조용히 방 나가기 버튼을 누른다", scores:{ jamsu:2 } },
        { text:"머리가 멍해져서 폰만 붙잡고 굳어버림", scores:{ eoreum:1, nunmul:1 } } ] },
      { q:"중요한 발표 전날 밤, 스트레스 몬스터가 슬슬 등장한다.", choices:[
        { text:"별거 아닌 일에도 예민하게 날 세움", scores:{ yemin:2 } },
        { text:"긴장 풀겠다며 야식 폭풍 흡입", scores:{ meokbo:2 } },
        { text:"연습은 안 하고 방 청소하며 현실도피", scores:{ jamsu:1, eoreum:1 } },
        { text:"이불킥하며 혼자 분노 게이지 상승", scores:{ pokbal:2 } } ] },
      { q:"친구가 별생각 없이 던진 농담이 마음에 콱 박혔다.", choices:[
        { text:"그날 밤 이불 속에서 서럽게 운다", scores:{ nunmul:2 } },
        { text:"괜히 다른 일에 날카롭게 반응함", scores:{ yemin:2 } },
        { text:"그 친구 연락을 며칠간 은근슬쩍 피함", scores:{ jamsu:2 } },
        { text:"당장 전화해서 '그거 무슨 뜻이야?' 따짐", scores:{ pokbal:1, yemin:1 } } ] },
      { q:"할 일이 산더미인데 손도 대기 싫은 날. 몸은 이미 몬스터.", choices:[
        { text:"책상 앞에 앉아만 있고 멍— 아무것도 못함", scores:{ eoreum:2 } },
        { text:"과자 한 봉지 다 비우고서야 정신 차림", scores:{ meokbo:2 } },
        { text:"괜히 물건 던지듯 짜증 내며 시작함", scores:{ pokbal:1, yemin:1 } },
        { text:"폰 무음으로 돌려놓고 다 회피", scores:{ jamsu:2 } } ] },
      { q:"연인과 다툰 다음 날 아침. 스트레스 몬스터 컨디션은?", choices:[
        { text:"먼저 연락 안 하고 며칠 잠수", scores:{ jamsu:2 } },
        { text:"베개에 얼굴 묻고 펑펑 운다", scores:{ nunmul:2 } },
        { text:"사소한 일에도 계속 예민하게 반응", scores:{ yemin:2 } },
        { text:"아침 댓바람부터 폭발해서 전화로 따짐", scores:{ pokbal:2 } } ] },
      { q:"번아웃 직전, 몸이 먼저 신호를 보낸다.", choices:[
        { text:"'다 그만둘래!' 소리부터 지르고 봄", scores:{ pokbal:2 } },
        { text:"손가락 하나 까딱하기 싫어 침대와 한몸", scores:{ eoreum:2 } },
        { text:"이유 없이 계속 뭔가를 우물거리며 먹음", scores:{ meokbo:2 } },
        { text:"괜히 눈물부터 핑 돈다", scores:{ nunmul:1, eoreum:1 } } ] },
      { q:"오랜만에 친구들이 '너 스트레스 받으면 어떤 사람이야?' 라고 묻는다.", choices:[
        { text:"'터지기 전엔 멀쩡, 터지면 화산이야'", scores:{ pokbal:2 } },
        { text:"'연락 안 되면 그냥 충전 중인 거야'", scores:{ jamsu:2 } },
        { text:"'울면서 스트레스 배출하는 스타일'", scores:{ nunmul:2 } },
        { text:"'예민 지수 폭발, 건드리면 위험'", scores:{ yemin:2 } } ] }
    ];

    function renderResult(totals, el, api){
      var key = Quiz.top(totals, MORDER), r = MONS[key];
      if (window.GoblubFeed && GoblubFeed.record) GoblubFeed.record("stress", { emoji: r.emoji, title: r.name });
      el.innerHTML =
        '<span class="result-emoji">'+r.emoji+'</span>'+
        '<p class="result-name">스트레스 받으면… '+r.name+' 변신!</p>'+
        '<p class="result-desc">'+r.desc+'</p>'+
        '<div class="mon-stage"><span class="mon-emoji" id="mon">'+r.emoji+'</span></div>'+
        '<div class="result-actions"><button class="btn-primary" id="summon">🌀 고블럽 소환 — 이 몬스터 먹어치우기</button></div>'+
        '<div id="after" style="display:none">'+
          '<p class="cure-line" id="cure"></p>'+
          '<div id="card-slot"></div>'+
          '<div class="result-actions">'+
          '<button class="btn-primary" id="qz-retry">다시하기</button>'+
          '<button class="btn-ghost" id="qz-share">링크 복사</button></div>'+
        '</div>';

      el.querySelector("#summon").onclick = function(){
        var btn=this; btn.disabled=true;
        var stage=el.querySelector(".mon-stage");
        var gob=document.createElement("span");
        gob.className="gob-muncher chew";
        gob.innerHTML = (window.GoblubArt ? GoblubArt.svg(74) : "👾");
        stage.insertBefore(gob, stage.firstChild);
        setTimeout(function(){ el.querySelector("#mon").classList.add("eaten"); }, 500);
        setTimeout(function(){
          gob.classList.remove("chew");
          el.querySelector("#cure").textContent = "🌟 "+r.cure;
          el.querySelector("#after").style.display="block";
          el.querySelector("#card-slot").appendChild(ShareCard.render({
            palette:"yellow", emoji:r.emoji, badge:"나의 스트레스 몬스터", title:r.name,
            lines:[r.desc, r.cure]
          }));
          el.querySelector("#qz-retry").onclick=api.restart;
          el.querySelector("#qz-share").onclick=function(){ api.shareLink(el.querySelector("#qz-share")); };
        }, 1400);
      };
    }

    Quiz.init(document.getElementById("quiz"), {
      emoji: "🌋", title: "스트레스 몬스터 변신",
      intro: "스트레스 받으면 내 안에서 튀어나오는 몬스터가 있다. 10문항으로 정체를 밝히고, 고블럽이 냠 먹어드립니다.",
      feedSrc: "stress", questions: QUESTIONS, renderResult: renderResult
    });
  </script>
</body>
</html>
