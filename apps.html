<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>앱 다운로드 — goblub</title>
  <meta name="description" content="goblub이 만든 모바일 앱 모음과 다운로드 링크" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=neon1" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="hero">
      <h1>📱 앱 다운로드</h1>
      <p>직접 만든 앱들이에요. 다운로드 버튼은 곧 열립니다!</p>
    </section>

    <section class="card-grid">
      <article class="card tint-coral">
        <span class="icon">💰</span>
        <h2>가계부 앱</h2>
        <p>간단하게 쓰는 안드로이드 가계부</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>

      <article class="card tint-mint">
        <span class="icon">✈️</span>
        <h2>Moment Trip</h2>
        <p>여행의 순간을 기록하는 앱</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>

      <article class="card tint-sky">
        <span class="icon">🌡️</span>
        <h2>마음온도</h2>
        <p>오늘 내 마음의 온도를 재보는 자가성찰 웹앱</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>

      <article class="card tint-purple">
        <span class="icon" data-goblub="52"></span>
        <h2>Goblub</h2>
        <p>나쁜 감정을 먹어주는 친구</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>

      <article class="card tint-yellow">
        <span class="icon">⚡</span>
        <h2>Line now</h2>
        <p>지금 즉시 만남 앱</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>

      <article class="card tint-coral">
        <span class="icon">🎁</span>
        <h2>Poresent</h2>
        <p>원하는 사진을 주고 받는 앱</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>

      <article class="card tint-mint">
        <span class="icon">⛑️</span>
        <h2>Golden time</h2>
        <p>신체적, 정신적으로 힘들 때 즉시 도움 받는 앱</p>
        <button class="btn-download" disabled>준비 중</button>
      </article>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="play/js/goblub-art.js"></script>
  <script src="js/common.js" data-root="."></script>
</body>
</html>
